<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>登录 - O-Drive</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <div style="height: 100vh; display: flex; align-items: center; justify-content: center;">
        <div class="modal" style="display: block;">
            <h2 style="text-align: center; margin-bottom: 20px;">管理员登录</h2>
            <input type="password" id="password" class="form-input" placeholder="输入管理员密码" onkeypress="if(event.key==='Enter')login()">
            <button class="btn btn-primary" style="width: 100%; justify-content: center;" onclick="login()">进入云盘</button>
        </div>
    </div>
    <script>
        async function login() {
            const password = document.getElementById('password').value;
            const res = await fetch('/api/login', {
                method: 'POST',
                body: JSON.stringify({ password })
            });
            const data = await res.json();
            if (data.success) window.location.href = '/';
            else alert(data.message);
        }
    </script>
</body>
</html>
