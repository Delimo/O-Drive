<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>分享文件 - O-Drive</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="stylesheet" href="/main.css">
    <link rel="stylesheet" href="/explorer.css">
    <link rel="stylesheet" href="/share.css">
</head>
<body class="share-page bg-background text-slate-900">
    <main class="share-shell">
        <header class="share-header">
            <a href="/" class="brand-link flex items-center gap-2 text-lg font-bold text-slate-900 tracking-tight">

        </header>
        <section id="shareCard" class="share-card">

        </section>
    </main>
    <script type="module" src="/js/share-app.js"></script>

</html>
