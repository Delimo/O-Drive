<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>O-Drive</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/main.css">
    <link rel="stylesheet" href="/style.css">
    <link rel="stylesheet" href="/explorer.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script>
        tailwind.config = { theme: { extend: { colors: { primary: '#3b82f6', background: '#020617', surface: '#0f172a', border: '#1e293b' } } } }
    </script>
</head>
<body class="flex flex-col h-screen overflow-hidden">
    <div id="toastContainer" class="fixed top-5 left-1/2 -translate-x-1/2 z-[1000] flex flex-col gap-2 pointer-events-none text-center"></div>
    <main class="container">
        <!-- Header (模块化) -->
        <header class="header-card mt-4 flex items-center">
            <a href="/" class="flex items-center gap-2 text-lg font-bold text-white tracking-tight">
                <span class="text-2xl text-primary">☁️</span> <span>O-Drive</span>
            </a>
            <div class="flex items-center gap-4">
                <div class="relative group hidden md:block text-slate-300">
                    <span class="absolute left-3 top-1/2 -translate-y-1/2 opacity-40 text-xs">🔍</span>
                    <input type="search" id="searchInput" placeholder="搜索..." onkeypress="if(event.key==='Enter')Actions.handleSearch()" class="bg-background border border-border rounded-lg py-1.5 pl-9 pr-3 text-sm focus:outline-none focus:border-primary w-40 focus:w-60 transition-all text-white">
                </div>
                <div id="authButtons" class="flex gap-2"></div>
            </div>
        </header>

        <!-- Toolbar -->
        <div class="toolbar">
            <div id="breadcrumb" class="flex items-center gap-1 text-sm font-medium text-primary whitespace-nowrap overflow-hidden"></div>
            <div class="flex items-center gap-2 flex-shrink-0">
                <div id="batchTools" class="items-center">
                    <button class="btn" onclick="Actions.toggleSelectAll()" id="selectAllBtn">全选</button>
                    <button class="btn hidden" id="singleRenameBtn" onclick="Actions.startRenameSelected()">更名</button>
                    <button class="btn" onclick="Actions.setClipboard('move')">移动</button>
                    <button class="btn" onclick="Actions.setClipboard('copy')">复制</button>
                    <button class="btn btn-danger" onclick="Actions.batchDelete()">删除</button>
                </div>
                <div id="pasteGroup" class="hidden items-center gap-2">
                    <button id="pasteBtn" class="btn btn-primary font-bold" onclick="Actions.executePaste()">粘贴</button>
                    <button id="cancelPasteBtn" class="btn" onclick="Actions.clearClipboard()">取消</button>
                </div>
                <button class="btn admin-only" onclick="document.getElementById('fileInput').click()">上传</button>
                <button class="btn admin-only" onclick="UI.showModal('mkdirModal')">新建</button>
                <div class="hidden sm:flex items-center gap-2">
                    <button id="sortBtn" class="btn" onclick="Actions.toggleSortMode()">名称</button>
                    <button id="viewBtn" class="btn" onclick="Actions.toggleViewMode()">视图</button>
                </div>
                <input type="file" id="fileInput" hidden multiple onchange="Actions.uploadFiles(this.files)">
            </div>
        </div>

        <!-- Explorer Card -->
        <div class="explorer-card">
            <div id="fileList" class="custom-scroll"></div>
        </div>

        <!-- Footer (全量精致版) -->
        <footer class="footer">
            <div class="footer-info">
                项目：<a href="https://github.com/Delimo/O-Drive" target="_blank" class="footer-brand">O-Drive</a> 
                | 
                作者：<a href="https://github.com/Delimo" target="_blank" class="footer-brand">Delimo</a>
            </div>
            <div class="footer-powered">Powered by Cloudflare Pages</div>
            <div class="footer-copyright">© <span id="year-display"></span> O-Drive. All rights reserved.</div>
        </footer>
    </main>

    <!-- Modals & Scripts (略) -->
    <!-- ... (此处保持之前全量代码中的 Modals 和完整的 Actions/UI 脚本即可) ... -->
    <script>
        /* 这里仅贴出 init 中修复年份的逻辑，请确保在你的脚本中应用 */
        // 在 Actions.init 底部加入：
        const startYear = 2026; const currentYear = new Date().getFullYear();
        document.getElementById('year-display').textContent = currentYear > startYear ? `${startYear} - ${currentYear}` : startYear;
    </script>
</body>
</html>
