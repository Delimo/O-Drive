<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>O-Drive</title>
    <link rel="stylesheet" href="/style.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>.admin-only { display: none; }</style>
</head>
<body>
    <!-- [UI] 顶栏 -->
    <div class="header">
        <div class="header-content">
            <div class="header-left"><a class="logo-box" href="/"><span>☁️</span><span>O-Drive</span></a></div>
            <div class="header-right">
                <div class="search-bar"><span class="search-icon">🔍</span><input type="search" id="searchInput" placeholder="搜索..." onkeypress="if(event.key==='Enter')Actions.search()"></div>
                <div id="authButtons"></div>
            </div>
        </div>
    </div>

    <div class="container">
        <!-- [UI] 操作工具栏 -->
        <div class="toolbar">
            <div class="tools-left" id="breadcrumb"></div>
            <div id="batchTools">
                <button class="btn btn-sm" style="background:none; border:none" onclick="Actions.selectAll()">全选</button>
                <div style="width:1px; height:14px; background:var(--border-color)"></div>
                <button class="btn btn-sm" style="background:none; border:none" onclick="Actions.setClipboard('move')">移动</button>
                <button class="btn btn-sm" style="background:none; border:none" onclick="Actions.setClipboard('copy')">复制</button>
                <button class="btn btn-sm btn-danger" style="background:none; border:none" onclick="Actions.batchDelete()">删除</button>
            </div>
            <div class="tools-right">
                <button id="pasteBtn" class="btn btn-primary" onclick="Actions.executePaste()" style="display:none">粘贴</button>
                <button class="btn admin-only" onclick="document.getElementById('fileInput').click()">上传</button>
                <button class="btn admin-only" onclick="Actions.showMkdir()">新建文件夹</button>
                <input type="file" id="fileInput" hidden multiple onchange="Actions.uploadFiles(this.files)">
                <div style="width:1px; height:16px; background:var(--surface-light); margin:0 4px;"></div>
                <button id="sortBtn" class="tool-btn" onclick="Actions.toggleSort()">名称排序</button>
                <button id="viewBtn" class="tool-btn" onclick="Actions.toggleView()">网格视图</button>
            </div>
        </div>

        <!-- [UI] 文件资源管理器 -->
        <div class="explorer-card"><div id="fileList"></div></div>

        <!-- [UI] 底部 -->
        <footer class="footer">
            <div>项目：<a href="https://github.com/Delimo/O-Drive" target="_blank">O-Drive</a> | 作者：<a href="https://github.com/Delimo" target="_blank">Delimo</a></div>
            <div>Powered by Cloudflare Pages</div>
            <div>&copy; 2026 O-Drive. All rights reserved.</div>
        </footer>
    </div>

    <!-- [UI] 各种模态框 -->
    <div id="loginModal" class="modal-overlay">
        <div class="login-card">
            <button onclick="UI.closeModal('loginModal')" style="position:absolute;right:20px;top:20px;background:none;border:none;color:#666;font-size:24px;cursor:pointer;">&times;</button>
            <h1 style="font-size:22px; text-align:center; margin-bottom:30px;">管理端登录</h1>
            <div class="input-wrapper"><span class="el-icon">👤</span><input type="text" id="adminUser" placeholder="用户名"></div>
            <div class="input-wrapper"><span class="el-icon">🔒</span><input type="password" id="adminPass" placeholder="密码" onkeypress="if(event.key==='Enter')Actions.login()"></div>
            <button class="btn btn-primary" style="width:100%; height:44px;" onclick="Actions.login()">登录</button>
            <p id="loginError" style="color:var(--error); text-align:center; margin-top:15px; font-size:12px;"></p>
        </div>
    </div>
    <div id="mkdirModal" class="modal-overlay"><div class="modal"><h3>新建文件夹</h3><input type="text" id="folderNameInput" class="form-input" placeholder="名称"><button class="btn btn-primary" style="width:100%" onclick="Actions.submitMkdir()">创建</button><button class="btn" style="width:100%; margin-top:8px;" onclick="UI.closeModal('mkdirModal')">取消</button></div></div>
    <div id="previewModal" class="modal-overlay" onclick="UI.closePreview()"><div class="preview-modal" onclick="event.stopPropagation()"><div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;"><h3 id="previewTitle">预览</h3><div style="display:flex; gap:10px;"><button id="editBtn" class="btn btn-sm" style="display:none" onclick="Actions.toggleEdit()">编辑</button><button id="saveBtn" class="btn btn-sm btn-primary" style="display:none" onclick="Actions.saveEdit()">保存</button><button onclick="UI.closePreview()" style="background:none; border:none; color:var(--text-muted); cursor:pointer; font-size:28px;">&times;</button></div></div><div id="previewContent" class="preview-body"></div></div></div>

    <script>
        /**
         * ============================================================================
         * 1. 状态管理 (State Module)
         * ============================================================================
         */
        const State = {
            currentPath: '/',
            userRole: 'guest',
            viewMode: localStorage.getItem('viewMode') || 'grid',
            sortBy: localStorage.getItem('sortBy') || 'name',
            fileData: { folders: [], files: [] },
            selectedPaths: [],
            clipboard: null,
            isSearching: false,
            currentPreviewPath: '',
            sortModes: ['name', 'time', 'size'],
            sortNames: { name: '名称排序', time: '时间排序', size: '大小排序' }
        };

        /**
         * ============================================================================
         * 2. 界面渲染模块 (UI Module)
         * ============================================================================
         */
        const UI = {
            refreshAll() {
                this.renderAuth();
                this.renderBreadcrumb();
                this.renderFileList();
                this.updateBatchTools();
            },

            renderAuth() {
                const btnBox = document.getElementById('authButtons');
                if (State.userRole === 'admin') {
                    document.querySelectorAll('.admin-only').forEach(el => el.style.display = 'inline-flex');
                    btnBox.innerHTML = `<a href="/admin.html" class="btn">控制面板</a><button class="btn" onclick="Actions.logout()">退出</button>`;
                } else {
                    document.querySelectorAll('.admin-only').forEach(el => el.style.display = 'none');
                    btnBox.innerHTML = `<button class="btn btn-primary" onclick="UI.showModal('loginModal')">登录</button>`;
                }
            },

            renderBreadcrumb() {
                if(State.isSearching) return;
                const box = document.getElementById('breadcrumb');
                const parts = State.currentPath.split('/').filter(p => p);
                let html = `<span class="breadcrumb-item" onclick="Actions.navigateTo('/')">🏠 根目录</span>`;
                if (parts.length > 3) {
                    html += `<span style="opacity:0.5"> / </span><span>...</span>`;
                    parts.slice(-2).forEach((p, i) => {
                        const path = '/' + parts.slice(0, parts.length - 2 + i + 1).join('/') + '/';
                        html += `<span style="opacity:0.5"> / </span><span class="breadcrumb-item" onclick="Actions.navigateTo('${path}')">${p}</span>`;
                    });
                } else {
                    let acc = '';
                    parts.forEach(p => { acc += '/' + p; html += `<span style="opacity:0.5"> / </span><span class="breadcrumb-item" onclick="Actions.navigateTo('${acc}/')">${p}</span>`; });
                }
                box.innerHTML = html;
            },

            renderFileList() {
                const list = document.getElementById('fileList');
                document.getElementById('sortBtn').textContent = State.sortNames[State.sortBy];
                document.getElementById('viewBtn').textContent = State.viewMode === 'grid' ? '网格视图' : '列表视图';
                
                list.className = State.viewMode === 'grid' ? 'grid-layout' : 'list-layout';
                list.innerHTML = '';
                
                if (State.viewMode === 'list') {
                    list.innerHTML = `<div class="list-header"><div class="col-name">名称</div><div class="col-size">大小</div><div class="col-time">修改时间</div><div class="col-acts">操作</div></div>`;
                }

                if (State.currentPath !== '/' && !State.isSearching) {
                    list.appendChild(this.createParentItem());
                }

                const folders = [...(State.fileData.folders || [])].sort((a,b) => a.name.localeCompare(b.name));
                const files = [...(State.fileData.files || [])].sort((a,b) => State.sortBy==='time'?(b.time-a.time):State.sortBy==='size'?(b.rawSize-a.rawSize):a.name.localeCompare(b.name));
                
                folders.forEach(item => list.appendChild(this.createFileElement(item, true)));
                files.forEach(item => list.appendChild(this.createFileElement(item, false)));
            },

            createParentItem() {
                const div = document.createElement('div'); div.className = 'file-item';
                const parent = Utils.getParentPath(State.currentPath);
                if (State.viewMode === 'grid') {
                    div.innerHTML = `<div class="file-main"><div class="file-icon">📁</div><div class="file-name">..</div></div><div class="file-info">返回上级</div>`;
                } else {
                    div.innerHTML = `<div class="col-name"><div class="file-icon">📁</div><div class="file-name">..</div></div><div class="col-size">-</div><div class="col-time">-</div><div class="col-acts"></div>`;
                }
                div.ondblclick = () => Actions.navigateTo(parent);
                return div;
            },

            createFileElement(item, isFolder) {
                const div = document.createElement('div');
                div.className = 'file-item';
                if (State.selectedPaths.includes(item.fullKey)) div.classList.add('selected');
                
                const acts = !isFolder ? `<button class="btn btn-sm" onclick="Actions.preview('${item.path}','${item.name}')">预览</button><button class="btn btn-sm" onclick="Actions.download('${item.path}')">下载</button>` : '';
                const timeStr = isFolder ? '-' : Utils.formatDate(item.time);
                const sizeStr = isFolder ? '文件夹' : item.sizeFormatted;

                if (State.viewMode === 'grid') {
                    div.innerHTML = `<div class="file-main"><div class="file-icon">${isFolder?'📁':Utils.getFileIcon(item.name)}</div><div class="file-name">${item.name}</div></div><div class="file-info">${sizeStr}</div><div class="file-actions" onclick="event.stopPropagation()">${acts}</div>`;
                } else {
                    div.innerHTML = `<div class="col-name"><div class="file-icon">${isFolder?'📁':Utils.getFileIcon(item.name)}</div><div class="file-name">${item.name}</div></div><div class="file-info col-size">${sizeStr}</div><div class="file-info col-time">${timeStr}</div><div class="file-actions col-acts" onclick="event.stopPropagation()">${acts}</div>`;
                }

                div.onclick = (e) => { if (State.userRole === 'admin') Actions.toggleSelect(item.fullKey, div); };
                div.ondblclick = () => { if(isFolder) Actions.navigateTo(item.path); else if(Utils.isPreviewable(item.name)) Actions.preview(item.path, item.name); };
                
                if (State.userRole === 'admin') {
                    const nameEl = div.querySelector('.file-name');
                    nameEl.ondblclick = (e) => Actions.startRename(item.fullKey, item.name, nameEl, e);
                }
                return div;
            },

            updateBatchTools() {
                const bt = document.getElementById('batchTools');
                const pb = document.getElementById('pasteBtn');
                bt.style.display = (State.userRole === 'admin' && State.selectedPaths.length > 0) ? 'flex' : 'none';
                pb.style.display = (State.userRole === 'admin' && State.clipboard) ? 'inline-flex' : 'none';
                if (State.clipboard) pb.textContent = `粘贴 (${State.clipboard.paths.length})`;
            },

            showModal(id) { document.getElementById(id).classList.add('active'); },
            closeModal(id) { document.getElementById(id).classList.remove('active'); },
            closePreview() { document.getElementById('previewContent').innerHTML = ''; this.closeModal('previewModal'); }
        };

        /**
         * ============================================================================
         * 3. 业务逻辑模块 (Actions Module)
         * ============================================================================
         */
        const Actions = {
            async login() {
                const username = document.getElementById('adminUser').value;
                const password = document.getElementById('adminPass').value;
                const res = await fetch('/api/login', { method:'POST', body: JSON.stringify({username, password}) });
                if((await res.json()).success) window.location.reload();
                else document.getElementById('loginError').textContent = '用户名或密码错误';
            },

            async logout() { await fetch('/api/logout'); window.location.reload(); },

            async loadFiles() {
                const res = await fetch(State.currentPath === '/' ? '/api/files' : `/api/files${State.currentPath.replace(/\/$/, '')}`);
                State.fileData = await res.json();
                UI.refreshAll();
            },

            navigateTo(path) {
                State.currentPath = path.endsWith('/') ? path : path + '/';
                State.selectedPaths = [];
                State.isSearching = false;
                this.loadFiles();
            },

            async search() {
                const q = document.getElementById('searchInput').value.trim();
                if (!q) return this.clearSearch();
                State.isSearching = true;
                const res = await fetch(`/api/search?q=${encodeURIComponent(q)}&scope=${encodeURIComponent(State.currentPath)}`);
                State.fileData = { folders: [], files: (await res.json()).files || [] };
                UI.refreshAll();
                document.getElementById('breadcrumb').innerHTML = `<span style="color:var(--primary)">🔍 搜索: "${q}"</span>`;
            },

            clearSearch() { State.isSearching = false; document.getElementById('searchInput').value = ''; this.loadFiles(); },

            toggleSelect(key) {
                const idx = State.selectedPaths.indexOf(key);
                if (idx > -1) State.selectedPaths.splice(idx, 1);
                else State.selectedPaths.push(key);
                UI.renderFileList(); UI.updateBatchTools();
            },

            selectAll() {
                State.selectedPaths = [...State.fileData.folders, ...State.fileData.files].map(i => i.fullKey);
                UI.renderFileList(); UI.updateBatchTools();
            },

            setClipboard(action) {
                State.clipboard = { action, paths: [...State.selectedPaths] };
                State.selectedPaths = [];
                UI.refreshAll();
            },

            async executePaste() {
                await fetch('/api/paste', { method: 'POST', body: JSON.stringify({ ...State.clipboard, targetDir: State.currentPath }) });
                State.clipboard = null; this.loadFiles();
            },

            async batchDelete() {
                if (confirm(`确认删除选中的 ${State.selectedPaths.length} 项吗？`)) {
                    await fetch('/api/batch-delete', { method: 'POST', body: JSON.stringify({ paths: State.selectedPaths }) });
                    this.loadFiles();
                }
            },

            startRename(key, oldName, el, e) {
                e.stopPropagation();
                const input = document.createElement('input');
                input.className = 'rename-input'; input.value = oldName;
                el.replaceWith(input); input.focus(); input.select();
                const save = async () => {
                    if (input.value && input.value !== oldName) {
                        await fetch(`/api/files/${key}`, { method: 'PUT', body: JSON.stringify({ newName: input.value }) });
                        this.loadFiles();
                    } else { input.replaceWith(el); }
                };
                input.onblur = save; input.onkeypress = (ev) => { if(ev.key==='Enter') save(); };
            },

            async preview(path, name) {
                State.currentPreviewPath = path;
                const content = document.getElementById('previewContent');
                const title = document.getElementById('previewTitle');
                const editBtn = document.getElementById('editBtn');
                const saveBtn = document.getElementById('saveBtn');
                
                UI.showModal('previewModal');
                editBtn.style.display = 'none'; saveBtn.style.display = 'none';
                title.textContent = "加载中..."; content.innerHTML = '<div style="color:var(--text-muted); padding:50px;">正在努力加载内容...</div>';

                const ext = name.split('.').pop().toLowerCase();
                try {
                    if (['jpg','jpeg','png','gif','webp'].includes(ext)) {
                        content.innerHTML = `<img src="/api/preview${path}" class="preview-media" style="object-fit:contain;">`;
                    } else if (['mp4','webm'].includes(ext)) {
                        content.innerHTML = `<video src="/api/preview${path}" class="preview-media" controls autoplay></video>`;
                    } else if (['mp3','wav'].includes(ext)) {
                        content.innerHTML = `<audio src="/api/preview${path}" controls autoplay style="width:80%; margin-top:100px;"></audio>`;
                    } else if (ext === 'pdf') {
                        content.innerHTML = `<iframe src="/api/preview${path}" style="width:100%; height:100%; border:none; background:#fff;"></iframe>`;
                    } else {
                        const res = await fetch(`/api/preview${path}`);
                        const text = await res.text();
                        if (State.userRole === 'admin') editBtn.style.display = 'inline-flex';
                        if (ext === 'md') content.innerHTML = `<div class="markdown-body" style="color:var(--text); padding:40px; width:100%; text-align:left;">${marked.parse(text)}</div>`;
                        else content.innerHTML = `<pre id="textContent" style="color:var(--text); padding:30px; width:100%; white-space:pre-wrap; font-size:13px; font-family:monospace; text-align:left;">${text}</pre>`;
                    }
                    title.textContent = name;
                } catch (e) { content.innerHTML = `<div style="color:var(--error); padding:50px;">预览失败</div>`; }
            },

            toggleEdit() {
                const pre = document.getElementById('textContent') || document.querySelector('.markdown-body');
                const textarea = document.createElement('textarea');
                textarea.className = 'edit-textarea'; textarea.id = 'editArea';
                textarea.value = pre.innerText || pre.textContent;
                document.getElementById('previewContent').innerHTML = '';
                document.getElementById('previewContent').appendChild(textarea);
                document.getElementById('editBtn').style.display = 'none';
                document.getElementById('saveBtn').style.display = 'inline-flex';
            },

            async saveEdit() {
                const content = document.getElementById('editArea').value;
                const res = await fetch(`/api/save-text${State.currentPreviewPath}`, { method: 'POST', body: JSON.stringify({ content }) });
                if ((await res.json()).success) { UI.closePreview(); this.loadFiles(); }
            },

            toggleView() { State.viewMode = State.viewMode==='grid'?'list':'grid'; localStorage.setItem('viewMode', State.viewMode); UI.renderFileList(); },
            toggleSort() { let idx = State.sortModes.indexOf(State.sortBy); State.sortBy = State.sortModes[(idx + 1) % State.sortModes.length]; localStorage.setItem('sortBy', State.sortBy); UI.renderFileList(); },
            download(path) { window.open(`/api/download${path}`); },
            showMkdir() { UI.showModal('mkdirModal'); },
            async submitMkdir() { const n = document.getElementById('folderNameInput').value; if(!n) return; await fetch(`/api/mkdir${State.currentPath.replace(/\/$/,'')}`, { method:'POST', body: JSON.stringify({folderName:n}) }); UI.closeModal('mkdirModal'); this.loadFiles(); },
            async uploadFiles(files) { if(State.userRole!=='admin') return; const target = State.currentPath==='/'?'/api/files':`/api/files${State.currentPath.replace(/\/$/,'')}`; for (let f of files) { const fd = new FormData(); fd.append('file', f); await fetch(target, { method: 'POST', body: fd }); } this.loadFiles(); }
        };

        /**
         * ============================================================================
         * 4. 工具模块 (Utils Module)
         * ============================================================================
         */
        const Utils = {
            getParentPath(p) { const pts = p.split('/').filter(x=>x); pts.pop(); return '/' + pts.join('/') + (pts.length? '/':''); },
            formatDate(ts) { return ts ? new Date(ts).toLocaleString('zh-CN', { timeZone: 'Asia/Shanghai', hour12: false }) : '-'; },
            getFileIcon(n) { const ext = n.split('.').pop().toLowerCase(); return ['jpg','jpeg','png','webp','gif'].includes(ext)?'🖼️':['mp4','webm'].includes(ext)?'🎬':['mp3','wav'].includes(ext)?'🎵':ext==='pdf'?'📕':['zip','rar','7z'].includes(ext)?'📦':'📄'; },
            isPreviewable(n) { const ext = n.split('.').pop().toLowerCase(); return ['jpg','jpeg','png','gif','webp','mp4','webm','mp3','wav','txt','pdf','md','js','css','html','json','py','sh','sql','php','yml','yaml'].includes(ext); }
        };

        // 初始化启动
        initAuth();
    </script>
</body>
</html>
