<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>O-Drive</title>
    <link rel="stylesheet" href="/style.css">
    <link rel="stylesheet" href="/explorer.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>.admin-only { display: none; }</style>
</head>
<body>
    <div id="toastContainer" class="toast-container"></div>
    
    <div class="header">
        <div class="header-content">
            <div class="header-left"><a class="logo-box" href="/"><span>☁️</span><span>O-Drive</span></a></div>
            <div class="header-right">
                <div class="search-bar"><span class="search-icon">🔍</span><input type="search" id="searchInput" placeholder="搜索..." onkeypress="if(event.key==='Enter')Actions.handleSearch()"></div>
                <div id="authButtons"></div>
            </div>
        </div>
    </div>

    <div class="container">
        <div class="toolbar">
            <div class="tools-left" id="breadcrumb"></div>
            <div id="batchTools">
                <button id="selectAllBtn" class="btn btn-sm" style="background:none; border:none" onclick="Actions.toggleSelectAll()">全选</button>
                <div style="width:1px; height:14px; background:var(--border-color)"></div>
                <button id="singleRenameBtn" class="btn btn-sm" style="background:none; border:none; display:none" onclick="Actions.startRenameSelected()">重命名</button>
                <button class="btn btn-sm" style="background:none; border:none" onclick="Actions.setClipboard('move')">移动</button>
                <button class="btn btn-sm" style="background:none; border:none" onclick="Actions.setClipboard('copy')">复制</button>
                <button class="btn btn-sm btn-danger" style="background:none; border:none" onclick="Actions.batchDelete()">删除</button>
            </div>
            <div class="tools-right">
                <button id="pasteBtn" class="btn btn-primary" onclick="Actions.executePaste()" style="display:none">粘贴</button>
                <button class="btn admin-only" onclick="document.getElementById('fileInput').click()">上传</button>
                <button class="btn admin-only" onclick="UI.showModal('mkdirModal')">新建文件夹</button>
                <input type="file" id="fileInput" hidden multiple onchange="Actions.uploadFiles(this.files)">
                <div style="width:1px; height:16px; background:var(--surface-light); margin:0 4px;"></div>
                <button id="sortBtn" class="tool-btn" onclick="Actions.toggleSortMode()">名称排序</button>
                <button id="viewBtn" class="tool-btn" onclick="Actions.toggleViewMode()">网格视图</button>
            </div>
        </div>
        <div class="explorer-card"><div id="fileList"></div></div>
        <footer class="footer">
            <div>项目：<a href="https://github.com/Delimo/O-Drive" target="_blank">O-Drive</a> | 作者：<a href="https://github.com/Delimo" target="_blank">Delimo</a></div>
            <div>Powered by Cloudflare Pages &copy; 2026 O-Drive.</div>
        </footer>
    </div>

    <!-- Modals -->
    <div id="loginModal" class="modal-overlay">
        <div class="login-card">
            <button onclick="UI.closeModal('loginModal')" class="modal-close">&times;</button>
            <h1>管理端登录</h1>
            <div class="input-wrapper"><input type="text" id="adminUser" placeholder="用户名"></div>
            <div class="input-wrapper"><input type="password" id="adminPass" placeholder="密码" onkeypress="if(event.key==='Enter')Actions.doLogin()"></div>
            <button class="btn btn-primary" style="width:100%; height:44px;" onclick="Actions.doLogin()">登录</button>
            <p id="loginError" style="color:var(--error); text-align:center; margin-top:15px; font-size:12px;"></p>
        </div>
    </div>
    <div id="mkdirModal" class="modal-overlay"><div class="mkdir-card"><button class="modal-close" onclick="UI.closeModal('mkdirModal')">&times;</button><h1 class="modal-title">新建文件夹</h1><div class="input-wrapper"><input type="text" id="folderNameInput" placeholder="请输入文件夹名称" onkeypress="if(event.key==='Enter')Actions.submitMkdir()"></div><button class="btn btn-primary" style="width:100%; height:44px;" onclick="Actions.submitMkdir()">创建</button></div></div>
    <div id="previewModal" class="modal-overlay" onclick="UI.closePreview()"><div class="preview-modal" onclick="event.stopPropagation()"><div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;"><h3 id="previewTitle">预览</h3><div style="display:flex; gap:10px;"><button id="editBtn" class="btn btn-sm" style="display:none" onclick="Actions.toggleEditMode()">编辑</button><button id="saveBtn" class="btn btn-sm btn-primary" style="display:none" onclick="Actions.saveTextContent()">保存</button><button onclick="UI.closePreview()" style="background:none; border:none; color:var(--text-muted); cursor:pointer; font-size:28px; line-height:1">&times;</button></div></div><div id="previewContent" class="preview-body"></div></div></div>
    <div id="uploadManager" class="upload-manager"><div class="upload-header"><span>上传任务</span><button onclick="UI.closeUploadManager()" style="background:none; border:none; color:#fff; cursor:pointer;">&times;</button></div><div id="uploadList" class="upload-list"></div></div>

    <script>
        let State = { currentPath: '/', userRole: 'guest', viewMode: localStorage.getItem('viewMode') || 'list', sortBy: localStorage.getItem('sortBy') || 'name', fileData: { folders: [], files: [] }, selectedPaths: [], clipboard: null, isSearching: false, currentPreviewPath: '' };
        const sortModes = ['name', 'time', 'size'], sortNames = { name: '名称排序', time: '时间排序', size: '大小排序' };

        const Message = {
            show(msg, type = 'info') { const container = document.getElementById('toastContainer'); const div = document.createElement('div'); div.className = `toast toast-${type}`; div.textContent = msg; container.appendChild(div); setTimeout(() => div.remove(), 3000); },
            success(msg) { this.show(msg, 'success'); },
            error(msg) { this.show(msg, 'error'); }
        };

        const UI = {
            showModal(id) { document.getElementById(id).classList.add('active'); },
            closeModal(id) { document.getElementById(id).classList.remove('active'); },
            closePreview() { document.getElementById('previewContent').innerHTML = ''; this.closeModal('previewModal'); },
            closeUploadManager() { document.getElementById('uploadManager').style.display = 'none'; },
            updateAuth() {
                const btnBox = document.getElementById('authButtons');
                if (State.userRole === 'admin') {
                    document.querySelectorAll('.admin-only').forEach(el => el.style.display = 'inline-flex');
                    btnBox.innerHTML = `<a href="/admin.html" class="btn">控制面板</a><button class="btn" onclick="Actions.logout()">退出</button>`;
                } else {
                    document.querySelectorAll('.admin-only').forEach(el => el.style.display = 'none');
                    btnBox.innerHTML = `<button class="btn btn-primary" onclick="UI.showModal('loginModal')">登录</button>`;
                }
            },
            renderBreadcrumb() {
                if(State.isSearching) return;
                const box = document.getElementById('breadcrumb'); const parts = State.currentPath.split('/').filter(p => p);
                let html = `<span class="breadcrumb-item" onclick="Actions.navigateTo('/')">🏠 根目录</span>`;
                if (parts.length > 3) {
                    html += `<span style="opacity:0.5"> / </span><span>...</span>`;
                    parts.slice(-2).forEach((p, i) => { const path = '/' + parts.slice(0, parts.length - 2 + i + 1).join('/') + '/'; html += `<span style="opacity:0.5"> / </span><span class="breadcrumb-item" onclick="Actions.navigateTo('${path}')">${p}</span>`; });
                } else { let acc = ''; parts.forEach(p => { acc += '/' + p; html += `<span style="opacity:0.5"> / </span><span class="breadcrumb-item" onclick="Actions.navigateTo('${acc}/')">${p}</span>`; }); }
                box.innerHTML = html;
            },
            updateFileList() {
                const list = document.getElementById('fileList'); document.getElementById('sortBtn').textContent = sortNames[State.sortBy];
                document.getElementById('viewBtn').textContent = State.viewMode === 'grid' ? '网格视图' : '列表视图';
                list.className = State.viewMode === 'grid' ? 'grid-layout' : 'list-layout'; list.innerHTML = '';
                if (State.viewMode === 'list') list.innerHTML = `<div class="list-header"><div class="col-name">名称</div><div class="col-size">大小</div><div class="col-time">修改时间</div><div class="col-acts">操作</div></div>`;
                if (State.currentPath !== '/' && !State.isSearching) {
                    const parent = Utils.getParentPath(State.currentPath); const div = document.createElement('div'); div.className = 'file-item';
                    if (State.viewMode === 'grid') div.innerHTML = `<div class="file-main"><div class="file-icon">📁</div><div class="file-name">..</div></div><div class="file-info">返回上级</div>`;
                    else div.innerHTML = `<div class="col-name"><div class="file-icon">📁</div><div class="file-name">..</div></div><div class="col-size">-</div><div class="col-time">-</div><div class="col-acts"></div>`;
                    div.ondblclick = () => Actions.navigateTo(parent); list.appendChild(div);
                }
                const folders = [...(State.fileData.folders || [])].filter(f => f.name !== '').sort((a,b) => a.name.localeCompare(b.name));
                const files = [...(State.fileData.files || [])].filter(f => f.name !== '').sort((a,b) => State.sortBy==='time'?(b.time-a.time):State.sortBy==='size'?(b.rawSize-a.rawSize):a.name.localeCompare(b.name));
                [...folders, ...files].forEach(item => {
                    const isFolder = !item.sizeFormatted; const div = document.createElement('div'); div.className = 'file-item';
                    div.dataset.key = item.fullKey; if (State.selectedPaths.includes(item.fullKey)) div.classList.add('selected');
                    const acts = !isFolder ? `<button class="btn btn-sm" onclick="Actions.openPreview('${item.path}','${item.name}')">预览</button><button class="btn btn-sm" onclick="Actions.downloadFile('${item.path}')">下载</button>` : '';
                    if (State.viewMode === 'grid') div.innerHTML = `<div class="file-main"><div class="file-icon">${isFolder?'📁':Utils.getFileIcon(item.name)}</div><div class="file-name">${item.name}</div></div><div class="file-info">${isFolder?'文件夹':item.sizeFormatted}</div><div class="file-actions" onclick="event.stopPropagation()">${acts}</div>`;
                    else div.innerHTML = `<div class="col-name"><div class="file-icon">${isFolder?'📁':Utils.getFileIcon(item.name)}</div><div class="file-name">${item.name}</div></div><div class="file-info col-size">${isFolder?'文件夹':item.sizeFormatted}</div><div class="file-info col-time">${Utils.formatDate(item.time)}</div><div class="file-actions col-acts" onclick="event.stopPropagation()">${acts}</div>`;
                    div.onclick = (e) => { if (State.userRole === 'admin') Actions.toggleSelect(item.fullKey, div, e); };
                    div.ondblclick = () => { if(isFolder) Actions.navigateTo(item.path); else if(Utils.isPreviewable(item.name)) Actions.openPreview(item.path, item.name); };
                    if (State.userRole === 'admin') {
                        const nameEl = div.querySelector('.file-name');
                        nameEl.ondblclick = (e) => {
                            e.stopPropagation(); const oldName = item.name; const input = document.createElement('input');
                            input.className = 'rename-input'; input.value = oldName;
                            ['mousedown', 'mouseup', 'click', 'dblclick'].forEach(evt => input.addEventListener(evt, ev => ev.stopPropagation(), true));
                            nameEl.replaceWith(input); input.focus();
                            const lastDot = oldName.lastIndexOf('.');
                            if (lastDot > 0 && item.sizeFormatted) input.setSelectionRange(0, lastDot); else input.select();
                            const save = async () => {
                                const newName = input.value.trim();
                                if (newName && newName !== oldName) {
                                    const res = await fetch(`/api/files/${encodeURIComponent(item.fullKey)}`, { method: 'PUT', body: JSON.stringify({ newName }) });
                                    if(res.ok) { Message.success('重命名成功'); Actions.loadFiles(); }
                                } else { Actions.loadFiles(); }
                            };
                            input.onblur = save; input.onkeypress = (ev) => { if(ev.key==='Enter') save(); };
                        };
                    }
                    list.appendChild(div);
                });
            },
            updateBatchUI() { 
                const bt = document.getElementById('batchTools'); const pb = document.getElementById('pasteBtn'); 
                const ren = document.getElementById('singleRenameBtn'); const sel = document.getElementById('selectAllBtn');
                const total = State.fileData.folders.length + State.fileData.files.length;
                bt.style.display = (State.userRole === 'admin' && State.selectedPaths.length > 0) ? 'flex' : 'none'; 
                pb.style.display = (State.userRole === 'admin' && State.clipboard) ? 'inline-flex' : 'none'; 
                ren.style.display = (State.selectedPaths.length === 1) ? 'inline-flex' : 'none';
                sel.textContent = (State.selectedPaths.length === total && total > 0) ? "取消全选" : "全选";
                if (State.clipboard) pb.textContent = `粘贴 (${State.clipboard.paths.length})`; 
            }
        };

        const Actions = {
            async init() { const res = await fetch('/api/auth/role'); const data = (res.status === 200) ? await res.json() : { role: 'guest' }; State.userRole = data.role || 'guest'; UI.updateAuth(); this.loadFiles(); },
            async loadFiles() { if (State.isSearching) return; State.selectedPaths = []; UI.updateBatchUI(); const res = await fetch(State.currentPath === '/' ? '/api/files' : `/api/files${State.currentPath.replace(/\/$/, '')}`); State.fileData = await res.json(); UI.updateFileList(); UI.renderBreadcrumb(); },
            async doLogin() {
                const u = document.getElementById('adminUser').value; const p = document.getElementById('adminPass').value;
                const res = await fetch('/api/login', { method:'POST', body: JSON.stringify({username:u, password:p}) });
                if((await res.json()).success) window.location.reload();
                else document.getElementById('loginError').textContent = '用户名或密码错误';
            },
            async logout() { await fetch('/api/logout'); window.location.reload(); },
            navigateTo(p) { State.currentPath = p.endsWith('/') ? p : p + '/'; State.isSearching = false; this.loadFiles(); },
            toggleSelect(key, el, e) { e.stopPropagation(); if (State.selectedPaths.includes(key)) State.selectedPaths = State.selectedPaths.filter(p => p !== key); else State.selectedPaths.push(key); UI.updateBatchUI(); UI.updateFileList(); },
            toggleSelectAll() {
                const totalKeys = [...State.fileData.folders, ...State.fileData.files].map(i => i.fullKey);
                State.selectedPaths = (State.selectedPaths.length === totalKeys.length) ? [] : totalKeys;
                UI.updateFileList(); UI.updateBatchUI();
            },
            setClipboard(action) { State.clipboard = { action, paths: [...State.selectedPaths] }; State.selectedPaths = []; this.loadFiles(); Message.success('已存入剪贴板'); },
            async executePaste() {
                const res = await fetch('/api/paste', { method: 'POST', body: JSON.stringify({ ...State.clipboard, targetDir: State.currentPath }) });
                if(res.ok) { Message.success('粘贴成功'); State.clipboard = null; this.loadFiles(); }
            },
            async batchDelete() { if (confirm(`确认删除选中的 ${State.selectedPaths.length} 项吗？`)) { const res = await fetch('/api/batch-delete', { method: 'POST', body: JSON.stringify({ paths: State.selectedPaths }) }); if(res.ok) { Message.success('已删除'); this.loadFiles(); } } },
            async handleSearch() {
                const q = document.getElementById('searchInput').value.trim(); if (!q) return this.clearSearch();
                State.isSearching = true;
                const res = await fetch(`/api/search?q=${encodeURIComponent(q)}&scope=${encodeURIComponent(State.currentPath)}`);
                State.fileData = { folders: [], files: (await res.json()).files || [] };
                UI.updateFileList(); document.getElementById('breadcrumb').innerHTML = `<span style="color:var(--primary)">🔍 搜索: "${q}"</span>`;
            },
            clearSearch() { State.isSearching = false; document.getElementById('searchInput').value = ''; this.loadFiles(); },
            async openPreview(path, name) {
                State.currentPreviewPath = path; State.isEditing = false; const content = document.getElementById('previewContent'), title = document.getElementById('previewTitle'), editBtn = document.getElementById('editBtn'), saveBtn = document.getElementById('saveBtn');
                editBtn.style.display = 'none'; saveBtn.style.display = 'none'; title.textContent = "加载中..."; content.innerHTML = '<div style="color:var(--text-muted); padding:50px;">正在加载内容...</div>'; UI.showModal('previewModal');
                const ext = name.split('.').pop().toLowerCase();
                try {
                    if (['jpg','jpeg','png','gif','webp'].includes(ext)) content.innerHTML = `<img src="/api/preview${path}" class="preview-media" style="object-fit:contain;">`;
                    else if (['mp4','webm'].includes(ext)) content.innerHTML = `<video src="/api/preview${path}" class="preview-media" controls autoplay></video>`;
                    else if (['mp3','wav'].includes(ext)) content.innerHTML = `<audio src="/api/preview${path}" controls autoplay style="width:80%; margin-top:100px;"></audio>`;
                    else if (ext === 'pdf') content.innerHTML = `<iframe src="/api/preview${path}" style="width:100%; height:100%; border:none; background:#fff;"></iframe>`;
                    else {
                        const res = await fetch(`/api/preview${path}`); const text = await res.text(); if (State.userRole === 'admin') editBtn.style.display = 'inline-flex';
                        if (ext === 'md') content.innerHTML = `<div class="markdown-body" style="color:var(--text); padding:40px; width:100%; text-align:left;">${marked.parse(text)}</div>`;
                        else content.innerHTML = `<pre id="textContent" style="color:var(--text); padding:30px; width:100%; white-space:pre-wrap; font-size:13px; font-family:monospace; text-align:left;">${text}</pre>`;
                    }
                    title.textContent = name;
                } catch (e) { content.innerHTML = `<div style="color:var(--error); padding:50px;">预览失败</div>`; }
            },
            toggleEditMode() {
                const pre = document.getElementById('textContent') || document.querySelector('.markdown-body');
                const textarea = document.createElement('textarea'); textarea.className = 'edit-textarea'; textarea.id = 'editArea'; textarea.value = pre.innerText || pre.textContent;
                document.getElementById('previewContent').innerHTML = ''; document.getElementById('previewContent').appendChild(textarea);
                document.getElementById('editBtn').style.display = 'none'; document.getElementById('saveBtn').style.display = 'inline-flex';
            },
            async saveTextContent() {
                const content = document.getElementById('editArea').value;
                const res = await fetch(`/api/save-text/${State.currentPreviewPath.replace(/^\//, '')}`, { method: 'POST', body: JSON.stringify({ content }) });
                if (res.ok) { Message.success('修改已保存'); UI.closePreview(); this.loadFiles(); } else { Message.error('保存失败'); }
            },
            toggleViewMode() { State.viewMode = State.viewMode==='grid'?'list':'grid'; localStorage.setItem('viewMode', State.viewMode); UI.updateFileList(); },
            toggleSortMode() { let idx = State.sortModes.indexOf(State.sortBy); State.sortBy = State.sortModes[(idx + 1) % State.sortModes.length]; localStorage.setItem('sortBy', State.sortBy); UI.updateFileList(); },
            downloadFile(p) { window.open(`/api/download${p}`); },
            async submitMkdir() { const n = document.getElementById('folderNameInput').value.trim(); if(!n) return; await fetch(`/api/mkdir${State.currentPath.replace(/\/$/,'')}`, { method:'POST', body: JSON.stringify({folderName:n}) }); document.getElementById('folderNameInput').value = ''; UI.closeModal('mkdirModal'); this.loadFiles(); Message.success('文件夹已创建'); },
            async uploadFiles(files) {
                if(State.userRole!=='admin') return;
                const manager = document.getElementById('uploadManager'); const list = document.getElementById('uploadList');
                let activeUploads = 0;
                manager.style.display = 'flex'; manager.style.opacity = '1';
                for (let f of files) {
                    activeUploads++; const item = document.createElement('div'); item.className = 'upload-item';
                    item.innerHTML = `<div class="upload-info"><span class="upload-filename">${f.name}</span><span class="pct">0%</span></div><div class="progress-bg"><div class="progress-fill"></div></div>`;
                    list.prepend(item);
                    const fd = new FormData(); fd.append('file', f);
                    const xhr = new XMLHttpRequest();
                    xhr.open('POST', '/api/files/' + State.currentPath.replace(/^\/|\/$/g, ''), true);
                    xhr.upload.onprogress = (e) => { if (e.lengthComputable) { const pct = Math.round((e.loaded / e.total) * 100); item.querySelector('.progress-fill').style.width = pct + '%'; item.querySelector('.pct').textContent = pct + '%'; } };
                    xhr.onload = () => { if (xhr.status === 200) { item.querySelector('.pct').textContent = '完成'; item.querySelector('.progress-fill').style.background = 'var(--success)'; this.loadFiles(); } else { item.querySelector('.pct').textContent = '失败'; } };
                    xhr.send(fd);
                }
            },
            startRenameSelected() {
                const key = State.selectedPaths[0]; const item = [...State.fileData.folders, ...State.fileData.files].find(i => i.fullKey === key);
                let nameContainer = null; document.querySelectorAll('.file-item').forEach(el => { if (el.dataset.key === key) nameContainer = el.querySelector('.file-name'); });
                if(!nameContainer) return;
                const oldName = item.name; const input = document.createElement('input');
                input.className = 'rename-input'; input.value = oldName;
                ['mousedown', 'mouseup', 'click', 'dblclick'].forEach(evt => input.addEventListener(evt, e => e.stopPropagation(), true));
                nameContainer.replaceWith(input); input.focus();
                const lastDot = oldName.lastIndexOf('.');
                if (lastDot > 0 && item.sizeFormatted) input.setSelectionRange(0, lastDot); else input.select();
                const save = async () => {
                    const newName = input.value.trim();
                    if (newName && newName !== oldName) {
                        const res = await fetch(`/api/files/${encodeURIComponent(item.fullKey)}`, { method: 'PUT', body: JSON.stringify({ newName }) });
                        if(res.ok) { Message.success('重命名成功'); Actions.loadFiles(); }
                    } else { Actions.loadFiles(); }
                };
                input.onblur = save; input.onkeypress = (ev) => { if(ev.key === 'Enter') input.blur(); };
            }
        };

        const Utils = {
            getParentPath(p) { const pts = p.split('/').filter(x=>x); pts.pop(); return '/' + pts.join('/') + (pts.length? '/':''); },
            formatDate(ts) { return ts ? new Date(ts).toLocaleString('zh-CN', { timeZone: 'Asia/Shanghai', hour12: false }) : '-'; },
            getFileIcon(n) { const ext = n.split('.').pop().toLowerCase(); return ['jpg','jpeg','png','webp','gif'].includes(ext)?'🖼️':['mp4','webm'].includes(ext)?'🎬':['mp3','wav'].includes(ext)?'🎵':ext==='pdf'?'📕':['zip','rar','7z'].includes(ext)?'📦':'📄'; },
            isPreviewable(n) { const ext = n.split('.').pop().toLowerCase(); return ['jpg','jpeg','png','gif','webp','mp4','webm','mp3','wav','txt','pdf','md','js','css','html','json','py','sh','sql','php','yml','yaml'].includes(ext); }
        };
        Actions.init();
    </script>
</body>
</html>
