<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>O-Drive - 云盘</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <div class="header">
        <div class="logo">O-Drive</div>
        <div style="display: flex; gap: 10px;">
            <a href="/admin.html" class="btn btn-secondary">操作日志</a>
            <button class="btn btn-secondary" onclick="logout()">退出</button>
        </div>
    </div>

    <div class="container">
        <div id="breadcrumb" style="margin-bottom: 20px; color: var(--text-muted);"></div>
        
        <div style="display: flex; gap: 10px; margin-bottom: 20px;">
            <button class="btn btn-primary" onclick="document.getElementById('fileInput').click()">上传文件</button>
            <button class="btn btn-secondary" onclick="showMkdir()">新建文件夹</button>
            <input type="file" id="fileInput" hidden multiple onchange="uploadFiles(this.files)">
        </div>

        <div id="fileList" class="file-grid"></div>
    </div>

    <!-- Rename Modal -->
    <div id="renameModal" class="modal-overlay">
        <div class="modal">
            <h3>重命名</h3>
            <input type="text" id="newNameInput" class="form-input">
            <div style="display: flex; gap: 10px; margin-top: 10px;">
                <button class="btn btn-primary" onclick="submitRename()">确定</button>
                <button class="btn btn-secondary" onclick="closeModals()">取消</button>
            </div>
        </div>
    </div>

    <script>
        let currentPath = '/';
        let itemToRename = null;

        async function loadFiles() {
            const res = await fetch(`/api/files${currentPath}`);
            if (res.status === 401) window.location.href = '/login.html';
            const data = await res.json();
            renderFiles(data);
            renderBreadcrumb();
        }

        function renderFiles(data) {
            const container = document.getElementById('fileList');
            container.innerHTML = '';

            data.folders.forEach(f => {
                container.innerHTML += `
                <div class="file-item" ondblclick="navigateTo('${f.path}')">
                    <div class="file-icon">📁</div>
                    <div class="file-name">${f.name}</div>
                    <div style="margin-top:10px;">
                        <button class="btn btn-sm btn-danger" onclick="deleteItem('${f.path}')">删除</button>
                    </div>
                </div>`;
            });

            data.files.forEach(f => {
                container.innerHTML += `
                <div class="file-item">
                    <div class="file-icon">${getFileIcon(f.name)}</div>
                    <div class="file-name">${f.name}</div>
                    <div class="file-meta">${f.sizeFormatted}</div>
                    <div style="margin-top:10px; display:flex; gap:5px; justify-content:center;">
                        <button class="btn btn-sm btn-primary" onclick="downloadFile('${f.path}')">下载</button>
                        <button class="btn btn-sm btn-secondary" onclick="openRename('${f.path}', '${f.name}')">改名</button>
                        <button class="btn btn-sm btn-danger" onclick="deleteItem('${f.path}')">删</button>
                    </div>
                </div>`;
            });
        }

        function getFileIcon(n) {
            const ext = n.split('.').pop().toLowerCase();
            if (['jpg','png','gif','webp'].includes(ext)) return '🖼️';
            if (['mp4','webm'].includes(ext)) return '🎬';
            if (['mp3','wav'].includes(ext)) return '🎵';
            if (['pdf'].includes(ext)) return '📕';
            return '📄';
        }

        async function uploadFiles(files) {
            for (let file of files) {
                const formData = new FormData();
                formData.append('file', file);
                await fetch(`/api/files${currentPath}`, { method: 'POST', body: formData });
            }
            loadFiles();
        }

        async function deleteItem(path) {
            if (confirm('确定删除?')) {
                await fetch(`/api/files${path}`, { method: 'DELETE' });
                loadFiles();
            }
        }

        function navigateTo(path) { currentPath = path + '/'; loadFiles(); }
        
        function renderBreadcrumb() {
            const parts = currentPath.split('/').filter(p => p);
            let html = `<span style="cursor:pointer" onclick="currentPath='/';loadFiles()">🏠 Root</span>`;
            let acc = '';
            parts.forEach(p => {
                acc += '/' + p;
                html += ` / <span style="cursor:pointer" onclick="currentPath='${acc}/';loadFiles()">${p}</span>`;
            });
            document.getElementById('breadcrumb').innerHTML = html;
        }

        async function downloadFile(path) { window.open(`/api/download${path}`); }
        
        function openRename(path, name) {
            itemToRename = path;
            document.getElementById('newNameInput').value = name;
            document.getElementById('renameModal').classList.add('active');
        }

        async function submitRename() {
            const newName = document.getElementById('newNameInput').value;
            await fetch(`/api/files${itemToRename}`, {
                method: 'PUT',
                body: JSON.stringify({ newName })
            });
            closeModals();
            loadFiles();
        }

        function closeModals() { document.querySelectorAll('.modal-overlay').forEach(m => m.classList.remove('active')); }
        async function logout() { await fetch('/api/logout', { method: 'POST' }); window.location.href = '/login.html'; }

        loadFiles();
    </script>
</body>
</html>
