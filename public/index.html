<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>O-Drive</title>
    <link rel="stylesheet" href="/main.css">
    <link rel="stylesheet" href="/explorer.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>.admin-only { display: none; }</style>
</head>
<body class="flex flex-col h-screen overflow-hidden">
    <div id="toastContainer" class="fixed top-5 left-1/2 -translate-x-1/2 z-[1000] flex flex-col gap-2 pointer-events-none text-center"></div>

    <main class="container">
        <header class="header-card">
            <a href="/" class="flex items-center gap-2 text-lg font-bold text-slate-900 tracking-tight">
                <span class="text-2xl text-primary font-bold">☁</span><span>O-Drive</span>
            </a>
            <div class="flex items-center gap-4">
                <div class="search-bar hidden md:block">
                    <span class="search-icon">🔍</span>
                    <input type="search" id="searchInput" placeholder="搜索文件..." onkeypress="if(event.key==='Enter')Actions.handleSearch()">
                </div>
                <div id="authButtons"></div>
            </div>
        </header>

        <div class="toolbar-card">
            <div class="tools-left">
                <div id="breadcrumb" class="text-sm font-medium text-primary"></div>
            </div>
            <div class="tools-right">
                <div id="batchTools" class="admin-only">
                    <button class="btn" onclick="Actions.toggleSelectAll()" id="selectAllBtn">全选</button>
                    <button class="btn" onclick="Actions.setClipboard('move')">移动</button>
                    <button class="btn" onclick="Actions.setClipboard('copy')">复制</button>
                    <button class="btn hidden" id="singleRenameBtn" onclick="Actions.startRenameSelected()">重命名</button>
                    <button class="btn btn-danger-soft font-bold" onclick="Actions.batchDelete()">删除</button>
                </div>
                <div id="pasteGroup" class="admin-only hidden">
                    <button id="pasteBtn" class="btn btn-primary font-bold" onclick="Actions.executePaste()">粘贴</button>
                    <button id="cancelPasteBtn" class="btn" onclick="Actions.clearClipboard()">取消</button>
                </div>
                <button class="btn admin-only" onclick="document.getElementById('fileInput').click()">上传</button>
                <button class="btn admin-only" onclick="UI.showModal('mkdirModal')">新建</button>
                <div class="hidden sm:flex items-center gap-2">
                    <button id="sortBtn" class="btn" onclick="Actions.toggleSortMode()">名称</button>
                    <button id="viewBtn" class="btn" onclick="Actions.toggleViewMode()">列表</button>
                    <button class="btn" onclick="Actions.openFilters()">筛选</button>
                    <button class="btn admin-only" onclick="Actions.openTrash()">回收站</button>
                </div>
                <input type="file" id="fileInput" hidden multiple onchange="Actions.uploadFiles(this.files)">
            </div>
        </div>

        <div class="explorer-card">
            <div id="fileList" class="custom-scroll relative"></div>
        </div>

        <footer class="footer">
            <div class="footer-info">项目：<a href="https://github.com/Delimo/O-Drive" target="_blank" class="footer-brand">O-Drive</a> | 作者：<a href="https://github.com/Delimo" target="_blank" class="footer-brand">Delimo</a></div>
            <div class="footer-powered">Powered by Cloudflare Pages</div>
            <div class="footer-copyright">© <span id="year-display"></span> O-Drive. All rights reserved.</div>
        </footer>
    </main>

    <div id="mobileActionBackdrop" class="mobile-action-backdrop" onclick="UI.closeMobileActions()"></div>
    <div id="mobileActionSheet" class="mobile-action-sheet">
        <button class="mobile-action-btn admin-only" onclick="document.getElementById('fileInput').click();UI.closeMobileActions()">上传</button>
        <button class="mobile-action-btn admin-only" onclick="UI.showModal('mkdirModal');UI.closeMobileActions()">新建</button>
        <button id="mobileSortBtn" class="mobile-action-btn" onclick="Actions.toggleSortMode()">名称</button>
        <button id="mobileViewBtn" class="mobile-action-btn" onclick="Actions.toggleViewMode()">列表</button>
        <button class="mobile-action-btn" onclick="Actions.openFilters();UI.closeMobileActions()">筛选</button>
        <button class="mobile-action-btn admin-only" onclick="Actions.openTrash();UI.closeMobileActions()">回收站</button>
    </div>
    <div class="mobile-bottom-bar">
        <button class="mobile-bottom-btn" onclick="UI.toggleMobileActions()">操作</button>
        <button class="mobile-bottom-btn" onclick="Actions.toggleViewMode()" id="mobileQuickViewBtn">列表</button>
        <button class="mobile-bottom-btn" onclick="Actions.openFilters()">筛选</button>
    </div>

    <div id="loginModal" class="fixed inset-0 bg-black/35 backdrop-blur-sm z-[200] hidden items-center justify-center p-4 text-slate-900">
        <div class="bg-surface border border-border p-8 rounded-2xl w-full max-w-sm relative shadow-2xl">
            <button onclick="UI.closeModal('loginModal')" class="absolute top-4 right-4 text-xl opacity-40 hover:opacity-100">&times;</button>
            <form onsubmit="event.preventDefault();Actions.doLogin()">
                <h1 class="text-xl font-bold mb-6 text-center">登录管理后台</h1>
                <input type="text" id="adminUser" placeholder="用户名" autocomplete="username" class="w-full bg-background border border-border rounded-lg h-11 px-4 mb-4 focus:outline-none focus:border-primary text-slate-900">
                <input type="password" id="adminPass" placeholder="密码" autocomplete="current-password" class="w-full bg-background border border-border rounded-lg h-11 px-4 mb-6 focus:outline-none focus:border-primary text-slate-900">
                <button type="submit" class="btn btn-primary w-full h-11 rounded-lg font-bold">登录</button>
            </form>
            <p id="loginError" class="text-red-500 text-center mt-4 text-xs h-4"></p>
        </div>
    </div>

    <div id="mkdirModal" class="fixed inset-0 bg-black/35 backdrop-blur-sm z-[200] hidden items-center justify-center p-4 text-slate-900">
        <div class="bg-surface border border-border p-6 rounded-2xl w-full max-w-sm shadow-2xl">
            <h1 class="text-lg font-bold mb-4 text-center">新建文件夹</h1>
            <input type="text" id="folderNameInput" placeholder="请输入名称" onkeypress="if(event.key==='Enter')Actions.submitMkdir()" class="w-full bg-background border border-border rounded-lg h-11 px-4 mb-4 outline-none focus:border-primary text-sm text-slate-900">
            <div class="flex gap-2">
                <button class="btn flex-1" onclick="UI.closeModal('mkdirModal')">取消</button>
                <button class="btn btn-primary flex-1 font-bold" onclick="Actions.submitMkdir()">创建</button>
            </div>
        </div>
    </div>

    <div id="previewModal" class="fixed inset-0 hidden items-center justify-center bg-black/35 backdrop-blur-sm z-[500] p-4 text-slate-900" onclick="UI.closePreview()">
        <div class="w-full max-w-6xl h-[85vh] bg-surface border border-border rounded-2xl overflow-hidden flex flex-col shadow-2xl" onclick="event.stopPropagation()">
            <div class="flex items-center justify-between p-4 border-b border-border bg-background text-slate-900">
                <h3 id="previewTitle" class="font-bold truncate text-sm">预览</h3>
                <div class="flex items-center gap-3">
                    <button id="editBtn" class="btn hidden" onclick="Actions.toggleEditMode()">编辑</button>
                    <button id="saveBtn" class="btn btn-primary hidden" onclick="Actions.saveTextContent()">保存</button>
                    <button onclick="UI.closePreview()" class="text-2xl leading-none opacity-40 hover:opacity-100">&times;</button>
                </div>
            </div>
            <div id="previewContent" class="flex-1 overflow-hidden bg-white"></div>
        </div>
    </div>


    <div id="filterModal" class="fixed inset-0 bg-black/35 backdrop-blur-sm z-[350] hidden items-center justify-center p-4 text-slate-900">
        <div class="w-full max-w-lg bg-surface border border-border rounded-2xl shadow-2xl overflow-hidden">
            <div class="px-5 py-4 border-b border-border flex items-center justify-between">
                <h3 class="font-bold">筛选</h3>
                <button onclick="UI.closeModal('filterModal')" class="text-2xl opacity-40 hover:opacity-100">&times;</button>
            </div>
            <div class="p-5 space-y-4">
                <div class="filter-grid">
                    <label class="filter-field"><span>类型</span><select id="filterKind" class="filter-input"><option value="all">全部</option><option value="folder">文件夹</option><option value="file">文件</option><option value="image">图片</option><option value="video">视频</option><option value="audio">音频</option><option value="text">文本</option><option value="pdf">PDF</option><option value="archive">压缩包</option></select></label>
                    <label class="filter-field"><span>最小大小(KB)</span><input id="filterMinSize" type="number" min="0" class="filter-input"></label>
                    <label class="filter-field"><span>最大大小(KB)</span><input id="filterMaxSize" type="number" min="0" class="filter-input"></label>
                    <label class="filter-field"><span>起始日期</span><input id="filterAfter" type="date" class="filter-input"></label>
                    <label class="filter-field"><span>结束日期</span><input id="filterBefore" type="date" class="filter-input"></label>
                </div>
                <div class="flex justify-end gap-2">
                    <button class="btn" onclick="Actions.resetFilters()">重置</button>
                    <button class="btn btn-primary" onclick="Actions.applyFilters()">应用</button>
                </div>
            </div>
        </div>
    </div>

    <div id="trashModal" class="fixed inset-0 bg-black/35 backdrop-blur-sm z-[360] hidden items-center justify-center p-4 text-slate-900">
        <div class="w-full max-w-5xl h-[80vh] bg-surface border border-border rounded-2xl shadow-2xl overflow-hidden flex flex-col">
            <div class="px-5 py-4 border-b border-border flex items-center justify-between">
                <div>
                    <h3 class="font-bold">回收站</h3>
                    <p class="text-xs text-slate-500 mt-1">当前 <span id="trashCount">0</span> 项</p>
                </div>
                <div class="flex items-center gap-3">
                    <div class="flex items-center gap-2 text-xs">
                        <button class="btn h-8 px-3" onclick="Actions.trashPage(-1)">上一页</button>
                        <span class="px-3 py-1 rounded-lg border border-border bg-background">第 <span id="trashPage">1</span> / <span id="trashTotal">1</span> 页</span>
                        <button class="btn h-8 px-3" onclick="Actions.trashPage(1)">下一页</button>
                    </div>
                    <button onclick="UI.closeModal('trashModal')" class="text-2xl opacity-40 hover:opacity-100">&times;</button>
                </div>
            </div>
            <div class="flex-1 overflow-auto custom-scroll">
                <table class="w-full text-left text-sm">
                    <thead class="sticky top-0 bg-background text-[10px] uppercase tracking-widest text-slate-500 font-bold border-b border-border">
                        <tr><th class="px-4 py-3 w-24">类型</th><th class="px-4 py-3">原始路径</th><th class="px-4 py-3 w-44">删除时间</th><th class="px-4 py-3 w-32">大小</th><th class="px-4 py-3 w-44 text-right">操作</th></tr>
                    </thead>
                    <tbody id="trashTbody" class="divide-y divide-border/30"></tbody>
                </table>
            </div>
        </div>
    </div>

    <div id="detailsPanel" class="fixed top-0 right-0 h-full w-full max-w-sm bg-surface border-l border-border shadow-2xl z-[340] transform translate-x-full transition-transform duration-200 text-slate-900">
        <div class="h-full flex flex-col">
            <div class="px-5 py-4 border-b border-border flex items-center justify-between">
                <div>
                    <h3 id="detailsTitle" class="font-bold truncate">文件详情</h3>
                    <p id="detailsEmpty" class="text-xs text-slate-500 mt-1">点击“详情”查看项目信息</p>
                </div>
                <button onclick="UI.closeDrawer('detailsPanel')" class="text-2xl opacity-40 hover:opacity-100">&times;</button>
            </div>
            <div id="detailsBody" class="flex-1 overflow-auto p-5 text-sm"></div>
        </div>
    </div>
    <div id="detailsBackdrop" class="fixed inset-0 z-[339] hidden bg-transparent" onclick="UI.closeDrawer('detailsPanel')"></div>
    <div id="uploadManager" class="fixed bottom-6 right-6 w-80 bg-surface border border-border rounded-2xl shadow-2xl z-[300] hidden flex-col overflow-hidden text-slate-900">
        <div class="bg-surface-soft px-4 py-3 flex items-center justify-between gap-3 text-xs font-bold text-slate-500">
            <div class="flex items-center gap-2 min-w-0">
                <span>上传进度</span>
                <span id="uploadSummary" class="font-semibold text-slate-400 truncate">0/0 已完成</span>
            </div>
            <div class="flex items-center gap-2">
                <button id="uploadRetryFailed" class="upload-control hidden" onclick="Actions.uploadQueue?.retryFailed()">重试失败</button>
                <button onclick="UI.closeUploadManager()">&times;</button>
            </div>
        </div>
        <div id="uploadList" class="max-h-80 overflow-y-auto"></div>
    </div>

    <script type="module" src="/js/app.js"></script>
</body>
</html>
