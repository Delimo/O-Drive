<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>O-Drive</title>
    <link rel="stylesheet" href="/style.css">
    <style>.admin-only { display: none; }</style>
</head>
<body>
    <div class="header">
        <div class="header-left"><a class="logo-box" href="/"><span style="font-size:24px;">☁️</span><span class="logo-text">O-Drive</span></a></div>
        <div class="search-bar">
            <span class="search-icon">🔍</span>
            <input type="search" id="searchInput" placeholder="搜索文件..." onkeypress="if(event.key==='Enter')handleSearch()">
        </div>
        <div class="header-right" id="authButtons"></div>
    </div>

    <div class="container">
        <div class="toolbar">
            <div class="tools-left"><div id="breadcrumb"></div></div>
            <div class="tools-right">
                <button class="btn admin-only" onclick="document.getElementById('fileInput').click()">上传</button>
                <button class="btn admin-only" onclick="showMkdir()">新建文件夹</button>
                <input type="file" id="fileInput" hidden multiple onchange="uploadFiles(this.files)">
                
                <div style="width:1px; height:16px; background:var(--surface-light); margin:0 4px;"></div>
                
                <!-- 排序框 -->
                <select id="sortSelect" class="select-input" onchange="changeSort()">
                    <option value="name">名称排序</option>
                    <option value="time">时间排序</option>
                    <option value="size">大小排序</option>
                </select>
                
                <!-- 显示模式按钮 -->
                <button id="viewBtn" class="tool-btn" onclick="toggleViewMode()">图墙模式</button>
            </div>
        </div>
        <div id="fileList" class="file-grid"></div>
    </div>

    <!-- 登录弹窗 -->
    <div id="loginModal" class="modal-overlay">
        <div class="login-card">
            <button class="login-close" onclick="closeLoginModal()">&times;</button>
            <h1 class="login-title">管理端登录</h1>
            <div class="input-container">
                <label class="input-name">用户名</label>
                <div class="input-wrapper">
                    <span class="el-icon"><svg viewBox="0 0 1024 1024"><path fill="currentColor" d="M512 512a192 192 0 1 0 0-384 192 192 0 0 0 0 384m0 64a256 256 0 1 1 0-512 256 256 0 0 1 0 512m320 320v-96a96 96 0 0 0-96-96H288a96 96 0 0 0-96 96v96a32 32 0 1 1-64 0v-96a160 160 0 0 1 160-160h448a160 160 0 0 1 160 160v96a32 32 0 1 1-64 0"></path></svg></span>
                    <input type="text" id="adminUser" placeholder="请输入用户名">
                </div>
            </div>
            <div class="input-container">
                <label class="input-name">密码</label>
                <div class="input-wrapper">
                    <span class="el-icon"><svg viewBox="0 0 1024 1024"><path fill="currentColor" d="M224 448a32 32 0 0 0-32 32v384a32 32 0 0 0 32 32h576a32 32 0 0 0 32-32V480a32 32 0 0 0-32-32zm0-64h576a96 96 0 0 1 96 96v384a96 96 0 0 1-96 96H224a96 96 0 0 1-96-96V480a96 96 0 0 1 96-96"></path><path fill="currentColor" d="M512 544a32 32 0 0 1 32 32v192a32 32 0 1 1-64 0V576a32 32 0 0 1 32-32m192-160v-64a192 192 0 1 0-384 0v64zM512 64a256 256 0 0 1 256 256v128H256V320A256 256 0 0 1 512 64"></path></svg></span>
                    <input type="password" id="adminPass" placeholder="请输入密码" onkeypress="if(event.key==='Enter')doLogin()">
                </div>
            </div>
            <button class="submit-btn" onclick="doLogin()">登录</button>
            <p id="loginError" style="color:var(--error); text-align:center; margin-top:15px; font-size:12px;"></p>
        </div>
    </div>

    <!-- Modals -->
    <div id="renameModal" class="modal-overlay"><div class="modal"><h3>重命名</h3><input type="text" id="newNameInput" class="form-input"><button class="btn" style="width:100%; background:var(--primary)" onclick="submitRename()">确定</button><button class="btn" style="width:100%; margin-top:8px;" onclick="closeModal()">取消</button></div></div>
    <div id="mkdirModal" class="modal-overlay"><div class="modal"><h3>新建文件夹</h3><input type="text" id="folderNameInput" class="form-input" placeholder="名称"><button class="btn" style="width:100%; background:var(--primary)" onclick="submitMkdir()">创建</button><button class="btn" style="width:100%; margin-top:8px;" onclick="closeModal()">取消</button></div></div>
    <div id="previewModal" class="modal-overlay" onclick="closePreview()"><div class="modal" style="max-width:90%; width:800px; height:80vh; display:flex; flex-direction:column;" onclick="event.stopPropagation()"><div style="display:flex; justify-content:space-between; margin-bottom:12px;"><h3 id="previewTitle">预览</h3><button onclick="closePreview()" style="background:none; border:none; color:#fff; cursor:pointer; font-size:24px;">&times;</button></div><div id="previewContent" style="flex:1; overflow:auto; display:flex; align-items:center; justify-content:center; background:#000; border-radius:8px;"></div></div></div>

    <script>
        let currentPath = '/', userRole = 'guest', viewMode = localStorage.getItem('viewMode') || 'grid', sortBy = localStorage.getItem('sortBy') || 'name', fileData = { folders: [], files: [] }, isSearching = false;

        async function initAuth() {
            const res = await fetch('/api/auth/role');
            if (res.status === 401) { userRole = 'guest'; updateAuthUI(); return; }
            const data = await res.json(); userRole = data.role || 'guest';
            updateAuthUI(); loadFiles();
        }

        function updateAuthUI() {
            const btnBox = document.getElementById('authButtons');
            if (userRole === 'admin') {
                document.querySelectorAll('.admin-only').forEach(el => el.style.display = 'inline-flex');
                btnBox.innerHTML = `<a href="/admin.html" class="btn">控制面板</a><button class="btn" onclick="logout()">退出</button>`;
            } else {
                document.querySelectorAll('.admin-only').forEach(el => el.style.display = 'none');
                btnBox.innerHTML = `<button class="btn" onclick="openLoginModal()" style="background:#337ecc">登录</button>`;
            }
        }

        function openLoginModal() { document.getElementById('loginModal').classList.add('active'); }
        function closeLoginModal() { document.getElementById('loginModal').classList.remove('active'); document.getElementById('loginError').textContent=''; }
        
        async function doLogin() {
            const username = document.getElementById('adminUser').value;
            const password = document.getElementById('adminPass').value;
            const res = await fetch('/api/login', { method:'POST', body: JSON.stringify({username, password}) });
            const data = await res.json();
            if(data.success) { window.location.reload(); }
            else { document.getElementById('loginError').textContent = data.message || '登录失败'; }
        }

        async function loadFiles() {
            if (isSearching) return;
            const res = await fetch(currentPath === '/' ? '/api/files' : `/api/files${currentPath.replace(/\/$/, '')}`);
            fileData = await res.json();
            updateViewUI(); renderBreadcrumb();
        }

        async function handleSearch() {
            const q = document.getElementById('searchInput').value.trim(); if (!q) return clearSearch();
            isSearching = true;
            const res = await fetch(`/api/search?q=${encodeURIComponent(q)}&scope=${encodeURIComponent(currentPath)}`);
            fileData = { folders: [], files: (await res.json()).files || [] };
            updateViewUI(); document.getElementById('breadcrumb').innerHTML = `<span style="color:var(--primary)">🔍 搜索: "${q}"</span>`;
        }

        function clearSearch() { isSearching = false; document.getElementById('searchInput').value = ''; loadFiles(); }

        function updateViewUI() {
            const list = document.getElementById('fileList');
            document.getElementById('sortSelect').value = sortBy;
            
            // 更新按钮文字
            document.getElementById('viewBtn').textContent = viewMode === 'grid' ? '图墙模式' : '列表模式';

            list.className = viewMode === 'grid' ? 'file-grid' : 'file-list-mode';
            list.innerHTML = '';
            if (!isSearching && currentPath !== '/') {
                const parts = currentPath.split('/').filter(p => p); parts.pop();
                const parent = '/' + parts.join('/') + (parts.length > 0 ? '/' : '');
                list.innerHTML += `<div class="file-item" onclick="currentPath='${parent}';loadFiles()"><div class="file-main"><div class="file-icon">📁</div><div class="file-name">..</div></div><div class="file-info">返回上级</div><div class="file-actions"></div></div>`;
            }
            const folders = [...(fileData.folders || [])].sort((a,b) => a.name.localeCompare(b.name));
            const files = [...(fileData.files || [])].sort((a,b) => sortBy==='time'?(b.time-a.time):sortBy==='size'?(b.rawSize-a.rawSize):a.name.localeCompare(b.name));
            folders.forEach(f => list.innerHTML += renderItem(f, true));
            files.forEach(f => list.innerHTML += renderItem(f, false));
        }

        function renderItem(item, isFolder) {
            const acts = [];
            if (!isFolder && isPreviewable(item.name)) acts.push(`<button class="btn btn-sm" onclick="openPreview('${item.path}','${item.name}')">预览</button>`);
            if (!isFolder) acts.push(`<button class="btn btn-sm" onclick="downloadFile('${item.path}')">下载</button>`);
            if (userRole === 'admin') {
                acts.push(`<button class="btn btn-sm" onclick="openRename('${item.path}','${item.name}')">重命名</button>`);
                acts.push(`<button class="btn btn-sm btn-danger" onclick="deleteItem('${item.path}')">删除</button>`);
            }
            return `<div class="file-item" onclick="${isFolder?`navigateTo('${item.path}')`:''}">
                <div class="file-main"><div class="file-icon">${isFolder?'📁':getFileIcon(item.name)}</div><div class="file-name">${item.name}</div></div>
                <div class="file-info">${isFolder?'文件夹':item.sizeFormatted}</div>
                <div class="file-actions" onclick="event.stopPropagation()">${acts.join('')}</div>
            </div>`;
        }

        function toggleViewMode() { viewMode = viewMode==='grid'?'list':'grid'; localStorage.setItem('viewMode', viewMode); updateViewUI(); }
        function changeSort() { sortBy = document.getElementById('sortSelect').value; localStorage.setItem('sortBy', sortBy); updateViewUI(); }
        function isPreviewable(n) { const ext = n.split('.').pop().toLowerCase(); return ['jpg','jpeg','png','gif','webp','mp4','webm','mp3','wav','txt','pdf'].includes(ext); }
        function getFileIcon(n) { const ext = n.split('.').pop().toLowerCase(); return ['jpg','jpeg','png','webp','gif'].includes(ext)?'🖼️':['mp4','webm'].includes(ext)?'🎬':['mp3','wav'].includes(ext)?'🎵':ext==='pdf'?'📕':['zip','rar','7z'].includes(ext)?'📦':'📄'; }
        function navigateTo(p) { currentPath = p + '/'; loadFiles(); }
        function renderBreadcrumb() { if(isSearching) return; let html = `<span style="cursor:pointer;color:var(--primary);font-weight:700;" onclick="currentPath='/';loadFiles()">🏠 根目录</span>`; let acc = ''; currentPath.split('/').filter(p=>p).forEach((p,i,a) => { acc += '/'+p; html += ` <span style="opacity:0.5">/</span> <span style="cursor:pointer;${i===a.length-1?'color:#fff':''}" onclick="currentPath='${acc}/';loadFiles()">${p}</span>`; }); document.getElementById('breadcrumb').innerHTML = html; }
        
        function openPreview(path, name) {
            const ext = name.split('.').pop().toLowerCase(), url = `/api/preview${path}`, content = document.getElementById('previewContent');
            document.getElementById('previewTitle').textContent = name; content.innerHTML = '';
            if (['jpg','jpeg','png','gif','webp'].includes(ext)) content.innerHTML = `<img src="${url}" style="max-width:100%;max-height:100%;object-fit:contain;">`;
            else if (['mp4','webm'].includes(ext)) content.innerHTML = `<video src="${url}" controls autoplay style="max-width:100%;max-height:100%;"></video>`;
            else if (['mp3','wav'].includes(ext)) content.innerHTML = `<audio src="${url}" controls autoplay style="width:80%;"></audio>`;
            else if (ext === 'pdf') content.innerHTML = `<iframe src="${url}" style="width:100%;height:100%;border:none;"></iframe>`;
            else if (ext === 'txt') fetch(url).then(r=>r.text()).then(t=> { content.innerHTML = `<pre style="color:#fff;padding:20px;width:100%;white-space:pre-wrap;font-size:13px;">${t}</pre>`; });
            document.getElementById('previewModal').classList.add('active');
        }

        function closePreview() { document.getElementById('previewContent').innerHTML = ''; document.getElementById('previewModal').classList.remove('active'); }
        async function uploadFiles(files) { if(userRole!=='admin') return; const target = currentPath==='/'?'/api/files':`/api/files${currentPath.replace(/\/$/,'')}`; for (let f of files) { const fd = new FormData(); fd.append('file', f); await fetch(target, { method: 'POST', body: fd }); } loadFiles(); }
        function showMkdir() { if(userRole==='admin') document.getElementById('mkdirModal').classList.add('active'); }
        async function submitMkdir() { const folderName = document.getElementById('folderNameInput').value; if(!folderName) return; const target = currentPath==='/'?'/api/mkdir':`/api/mkdir${currentPath.replace(/\/$/,'')}`; await fetch(target, { method: 'POST', body: JSON.stringify({ folderName }) }); closeModal(); loadFiles(); }
        async function deleteItem(p) { if(confirm('确定删除?')) { await fetch(`/api/files${p}`, {method:'DELETE'}); loadFiles(); } }
        function downloadFile(p) { window.open(`/api/download${p}`); }
        function openRename(p, n) { if(userRole==='admin'){ renameTarget = p; document.getElementById('newNameInput').value = n; document.getElementById('renameModal').classList.add('active'); } }
        async function submitRename() { const newName = document.getElementById('newNameInput').value; await fetch(`/api/files${renameTarget}`, { method:'PUT', body: JSON.stringify({newName}) }); closeModal(); loadFiles(); }
        function closeModal() { document.querySelectorAll('.modal-overlay').forEach(el => el.classList.remove('active')); }
        async function logout() { await fetch('/api/logout'); window.location.reload(); }

        initAuth();
    </script>
</body>
</html>
