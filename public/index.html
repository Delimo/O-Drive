<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>O-Drive</title>
    <link rel="stylesheet" href="/style.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>.admin-only { display: none; }</style>
</head>
<body>
    <div class="header">
        <div class="header-left"><a class="logo-box" href="/"><span style="font-size:24px;">☁️</span><span class="logo-text">O-Drive</span></a></div>
        <div class="search-bar">
            <span class="search-icon">🔍</span>
            <input type="search" id="searchInput" placeholder="搜索文件..." onkeypress="if(event.key==='Enter')handleSearch()">
        </div>
        <div class="header-right" id="authButtons"></div>
    </div>

    <div class="container">
        <div class="toolbar">
            <div class="tools-left"><div id="breadcrumb"></div></div>
            <div id="batchTools">
                <button class="btn btn-sm" style="background:none; border:none" onclick="selectAll()">全选</button>
                <div style="width:1px; height:14px; background:var(--border-color)"></div>
                <button class="btn btn-sm" style="background:none; border:none" onclick="setClipboard('move')">移动</button>
                <button class="btn btn-sm" style="background:none; border:none" onclick="setClipboard('copy')">复制</button>
                <button class="btn btn-sm btn-danger" style="background:none; border:none" onclick="batchDelete()">删除</button>
            </div>
            <div class="tools-right">
                <button id="pasteBtn" class="btn btn-primary" onclick="executePaste()" style="display:none">粘贴</button>
                <button class="btn admin-only" onclick="document.getElementById('fileInput').click()">上传</button>
                <button class="btn admin-only" onclick="showMkdir()">新建文件夹</button>
                <input type="file" id="fileInput" hidden multiple onchange="uploadFiles(this.files)">
                <div style="width:1px; height:16px; background:var(--surface-light); margin:0 4px;"></div>
                <button id="sortBtn" class="tool-btn" onclick="toggleSortMode()">名称排序</button>
                <button id="viewBtn" class="tool-btn" onclick="toggleViewMode()">列表视图</button>
            </div>
        </div>

        <div class="explorer-card">
            <div id="fileList"></div>
        </div>

        <footer class="footer">
            <div>项目：<a href="https://github.com/Delimo/O-Drive" target="_blank">O-Drive</a> | 作者：<a href="https://github.com/Delimo" target="_blank">Delimo</a></div>
            <div>Powered by Cloudflare Pages</div>
            <div>&copy; 2026 O-Drive. All rights reserved.</div>
        </footer>
    </div>

    <!-- 弹窗部分 -->
    <div id="loginModal" class="modal-overlay">...</div> <!-- 篇幅限制，结构同前 -->
    <div id="mkdirModal" class="modal-overlay">...</div> <!-- 篇幅限制，结构同前 -->
    <div id="previewModal" class="modal-overlay" onclick="closePreview()"><div class="preview-modal" onclick="event.stopPropagation()"><div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;"><h3 id="previewTitle">预览</h3><div style="display:flex; gap:10px;"><button id="editBtn" class="btn btn-sm" style="display:none" onclick="toggleEditMode()">在线编辑</button><button id="saveBtn" class="btn btn-sm btn-primary" style="display:none" onclick="saveTextContent()">保存修改</button><button onclick="closePreview()" style="background:none; border:none; color:var(--text-muted); cursor:pointer; font-size:28px; line-height:1">&times;</button></div></div><div id="previewContent" class="preview-body"></div></div></div>

    <script>
        let currentPath = '/', userRole = 'guest', viewMode = localStorage.getItem('viewMode') || 'list', sortBy = localStorage.getItem('sortBy') || 'name';
        let fileData = { folders: [], files: [] }, selectedPaths = [], clipboard = null, isSearching = false;
        let isEditing = false, currentPreviewPath = '';
        const sortModes = ['name', 'time', 'size'], sortNames = { name: '名称排序', time: '时间排序', size: '大小排序' };

        async function initAuth() {
            const res = await fetch('/api/auth/role');
            const data = (res.status === 200) ? await res.json() : { role: 'guest' };
            userRole = data.role || 'guest';
            updateAuthUI(); loadFiles();
        }

        function updateAuthUI() {
            const btnBox = document.getElementById('authButtons');
            if (userRole === 'admin') {
                document.querySelectorAll('.admin-only').forEach(el => el.style.display = 'inline-flex');
                btnBox.innerHTML = `<a href="/admin.html" class="btn">控制面板</a><button class="btn" onclick="logout()">退出</button>`;
            } else {
                document.querySelectorAll('.admin-only').forEach(el => el.style.display = 'none');
                btnBox.innerHTML = `<button class="btn btn-primary" onclick="openLoginModal()">登录</button>`;
            }
        }

        async function loadFiles() {
            if (isSearching) return;
            selectedPaths = []; updateBatchUI();
            const res = await fetch(currentPath === '/' ? '/api/files' : `/api/files${currentPath.replace(/\/$/, '')}`);
            fileData = await res.json();
            updateViewUI(); renderBreadcrumb();
        }

        function formatDate(ts) {
            if (!ts) return '-';
            return new Date(ts).toLocaleString('zh-CN', { timeZone: 'Asia/Shanghai', hour12: false });
        }

        function updateViewUI() {
            const list = document.getElementById('fileList');
            document.getElementById('sortBtn').textContent = sortNames[sortBy];
            document.getElementById('viewBtn').textContent = viewMode === 'grid' ? '网格视图' : '列表视图';
            list.className = viewMode === 'grid' ? 'file-grid' : 'file-list-mode';
            list.innerHTML = '';
            
            // 列表模式下的表头
            if (viewMode === 'list') {
                list.innerHTML = `
                    <div class="list-view-header">
                        <div class="col-name">名称</div>
                        <div class="col-size">大小</div>
                        <div class="col-time">修改时间</div>
                        <div class="col-acts">操作</div>
                    </div>
                `;
            }

            if (currentPath !== '/' && !isSearching) {
                const parts = currentPath.split('/').filter(p => p); parts.pop();
                const parent = '/' + parts.join('/') + (parts.length > 0 ? '/' : '');
                const div = document.createElement('div'); div.className = 'file-item';
                div.innerHTML = `<div class="col-name"><div class="file-icon">📁</div><div class="file-name">..</div></div><div class="col-size"></div><div class="col-time"></div><div class="col-acts"></div>`;
                div.ondblclick = () => navigateTo(parent); list.appendChild(div);
            }

            const folders = [...(fileData.folders || [])].sort((a,b) => a.name.localeCompare(b.name));
            const files = [...(fileData.files || [])].sort((a,b) => sortBy==='time'?(b.time-a.time):sortBy==='size'?(b.rawSize-a.rawSize):a.name.localeCompare(b.name));
            
            [...folders, ...files].forEach(item => {
                const isFolder = !item.sizeFormatted;
                const div = document.createElement('div');
                div.className = 'file-item';
                if (selectedPaths.includes(item.fullKey)) div.classList.add('selected');
                
                div.innerHTML = `
                    <div class="col-name">
                        <div class="file-icon">${isFolder ? '📁' : getFileIcon(item.name)}</div>
                        <div class="file-name">${item.name}</div>
                    </div>
                    <div class="file-info-size col-size">${isFolder ? '文件夹' : item.sizeFormatted}</div>
                    <div class="file-info-time col-time">${formatDate(item.time)}</div>
                    <div class="file-actions col-acts" onclick="event.stopPropagation()">
                        ${!isFolder && isPreviewable(item.name) ? `<button class="btn btn-sm" onclick="openPreview('${item.path}','${item.name}')">预览</button>` : ''}
                        ${!isFolder ? `<button class="btn btn-sm" onclick="downloadFile('${item.path}')">下载</button>` : ''}
                    </div>
                `;

                div.onclick = (e) => { if (userRole !== 'admin') return; e.stopPropagation(); if (selectedPaths.includes(item.fullKey)) { selectedPaths = selectedPaths.filter(p => p !== item.fullKey); div.classList.remove('selected'); } else { selectedPaths.push(item.fullKey); div.classList.add('selected'); } updateBatchUI(); };
                div.ondblclick = () => { if(isFolder) navigateTo(item.path); else if(isPreviewable(item.name)) openPreview(item.path, item.name); };
                
                if (userRole === 'admin') {
                    const nameEl = div.querySelector('.file-name');
                    nameEl.ondblclick = (e) => {
                        e.stopPropagation();
                        const oldName = item.name;
                        const input = document.createElement('input'); input.className = 'rename-input'; input.value = oldName;
                        nameEl.replaceWith(input); input.focus(); input.select();
                        const saveRename = async () => { if (input.value && input.value !== oldName) { await fetch(`/api/files/${item.fullKey}`, { method: 'PUT', body: JSON.stringify({ newName: input.value }) }); loadFiles(); } else { loadFiles(); } };
                        input.onblur = saveRename; input.onkeypress = (ev) => { if(ev.key==='Enter') saveRename(); };
                    };
                }
                list.appendChild(div);
            });
        }

        // --- 其余 JS 逻辑与之前一致 (updateBatchUI, handleSearch, openPreview 等) ---
        function updateBatchUI() { const bt = document.getElementById('batchTools'); const pb = document.getElementById('pasteBtn'); bt.style.display = (userRole === 'admin' && selectedPaths.length > 0) ? 'flex' : 'none'; pb.style.display = (userRole === 'admin' && clipboard) ? 'inline-flex' : 'none'; if (clipboard) pb.textContent = `粘贴 (${clipboard.paths.length})`; }
        function setClipboard(action) { clipboard = { action, paths: [...selectedPaths] }; selectedPaths = []; loadFiles(); }
        async function executePaste() { await fetch('/api/paste', { method: 'POST', body: JSON.stringify({ ...clipboard, targetDir: currentPath }) }); clipboard = null; loadFiles(); }
        async function batchDelete() { if (confirm(`确认删除选中的 ${selectedPaths.length} 项吗？`)) { await fetch('/api/batch-delete', { method: 'POST', body: JSON.stringify({ paths: selectedPaths }) }); loadFiles(); } }
        function selectAll() { selectedPaths = [...fileData.folders, ...fileData.files].map(i => i.fullKey); updateViewUI(); updateBatchUI(); }
        function renderBreadcrumb() { if(isSearching) return; const box = document.getElementById('breadcrumb'); const parts = currentPath.split('/').filter(p => p); let html = `<span class="breadcrumb-item" onclick="navigateTo('/')">🏠 根目录</span>`; if (parts.length > 3) { html += `<span style="opacity:0.5"> / </span><span>...</span>`; parts.slice(-2).forEach((p, i) => { const path = '/' + parts.slice(0, parts.length - 2 + i + 1).join('/') + '/'; html += `<span style="opacity:0.5"> / </span><span class="breadcrumb-item" onclick="navigateTo('${path}')">${p}</span>`; }); } else { let acc = ''; parts.forEach(p => { acc += '/' + p; html += `<span style="opacity:0.5"> / </span><span class="breadcrumb-item" onclick="navigateTo('${acc}/')">${p}</span>`; }); } box.innerHTML = html; }
        async function handleSearch() { const q = document.getElementById('searchInput').value.trim(); if (!q) return clearSearch(); isSearching = true; const res = await fetch(`/api/search?q=${encodeURIComponent(q)}&scope=${encodeURIComponent(currentPath)}`); fileData = { folders: [], files: (await res.json()).files || [] }; updateViewUI(); document.getElementById('breadcrumb').innerHTML = `<span style="color:var(--primary)">🔍 搜索: "${q}"</span>`; }
        function clearSearch() { isSearching = false; document.getElementById('searchInput').value = ''; loadFiles(); }
        function navigateTo(p) { currentPath = p.endsWith('/') ? p : p + '/'; loadFiles(); }
        function getParentPath(p) { const pts = p.split('/').filter(x=>x); pts.pop(); return '/' + pts.join('/') + (pts.length? '/':''); }
        function getFileIcon(n) { const ext = n.split('.').pop().toLowerCase(); return ['jpg','jpeg','png','webp','gif'].includes(ext)?'🖼️':['mp4','webm'].includes(ext)?'🎬':['mp3','wav'].includes(ext)?'🎵':ext==='pdf'?'📕':['zip','rar','7z'].includes(ext)?'📦':'📄'; }
        function isPreviewable(n) { const ext = n.split('.').pop().toLowerCase(); const codeExts = ['js', 'css', 'html', 'json', 'py', 'sh', 'sql', 'php', 'yml', 'yaml']; return ['jpg','jpeg','png','gif','webp','mp4','webm','mp3','wav','txt','pdf', 'md', ...codeExts].includes(ext); }
        async function openPreview(path, name) { const ext = name.split('.').pop().toLowerCase(), url = `/api/preview${path}`, content = document.getElementById('previewContent'), title = document.getElementById('previewTitle'), editBtn = document.getElementById('editBtn'), saveBtn = document.getElementById('saveBtn'); currentPreviewPath = path; isEditing = false; editBtn.style.display = 'none'; saveBtn.style.display = 'none'; title.textContent = "加载中..."; content.innerHTML = '<div style="color:var(--text-muted); padding:50px;">加载中...</div>'; document.getElementById('previewModal').classList.add('active'); try { if (['jpg','jpeg','png','gif','webp'].includes(ext)) { content.innerHTML = `<img src="${url}" class="preview-media" style="object-fit:contain;">`; } else if (['mp4','webm'].includes(ext)) { content.innerHTML = `<video src="${url}" class="preview-media" controls autoplay></video>`; } else if (['mp3','wav'].includes(ext)) { content.innerHTML = `<audio src="${url}" controls autoplay style="width:80%; margin-top:100px;"></audio>`; } else if (ext === 'pdf') { content.innerHTML = `<iframe src="${url}" style="width:100%; height:100%; border:none; background:#fff;"></iframe>`; } else { const res = await fetch(url); const text = await res.text(); if (userRole === 'admin') editBtn.style.display = 'inline-flex'; if (ext === 'md') { content.innerHTML = `<div class="markdown-body" style="color:var(--text); padding:40px; width:100%; text-align:left;">${marked.parse(text)}</div>`; } else { content.innerHTML = `<pre id="textContent" style="color:var(--text); padding:30px; width:100%; white-space:pre-wrap; font-size:13px; font-family:monospace; text-align:left;">${escapeHtml(text)}</pre>`; } } title.textContent = name; } catch (e) { content.innerHTML = `<div style="color:var(--error); padding:50px;">预览失败</div>`; } }
        function closePreview() { document.getElementById('previewContent').innerHTML = ''; document.getElementById('previewModal').classList.remove('active'); }
        function toggleEditMode() { const pre = document.getElementById('textContent') || document.querySelector('.markdown-body'); const content = pre.innerText || pre.textContent; const textarea = document.createElement('textarea'); textarea.className = 'edit-textarea'; textarea.id = 'editArea'; textarea.value = content; document.getElementById('previewContent').innerHTML = ''; document.getElementById('previewContent').appendChild(textarea); document.getElementById('editBtn').style.display = 'none'; document.getElementById('saveBtn').style.display = 'inline-flex'; isEditing = true; }
        async function saveTextContent() { const content = document.getElementById('editArea').value; const res = await fetch(`/api/save-text${currentPreviewPath}`, { method: 'POST', body: JSON.stringify({ content }) }); if ((await res.json()).success) { closePreview(); loadFiles(); } else { alert('保存失败'); } }
        function toggleViewMode() { viewMode = viewMode==='grid'?'list':'grid'; localStorage.setItem('viewMode', viewMode); updateViewUI(); }
        function toggleSortMode() { let idx = sortModes.indexOf(sortBy); sortBy = sortModes[(idx + 1) % sortModes.length]; localStorage.setItem('sortBy', sortBy); updateViewUI(); }
        function downloadFile(p) { window.open(`/api/download${p}`); }
        function openLoginModal() { document.getElementById('loginModal').classList.add('active'); }
        function closeLoginModal() { document.getElementById('loginModal').classList.remove('active'); }
        async function doLogin() { const u = document.getElementById('adminUser').value; const p = document.getElementById('adminPass').value; const res = await fetch('/api/login', { method:'POST', body: JSON.stringify({username:u, password:p}) }); if((await res.json()).success) window.location.reload(); else alert('登录失败'); }
        async function logout() { await fetch('/api/logout'); window.location.reload(); }
        function showMkdir() { if(userRole==='admin') document.getElementById('mkdirModal').classList.add('active'); }
        async function submitMkdir() { const n = document.getElementById('folderNameInput').value; if(!n) return; await fetch(`/api/mkdir${currentPath.replace(/\/$/,'')}`, { method:'POST', body: JSON.stringify({folderName:n}) }); document.getElementById('folderNameInput').value = ''; closeModal(); loadFiles(); }
        function closeModal() { document.querySelectorAll('.modal-overlay').forEach(el => el.classList.remove('active')); }
        function escapeHtml(text) { return text.replace(/[&<>"']/g, function(m) { return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' }[m]; }); }

        initAuth();
    </script>
</body>
</html>
