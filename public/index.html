<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>O-Drive</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/main.css">
    <link rel="stylesheet" href="/style.css">
    <link rel="stylesheet" href="/explorer.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script>
        tailwind.config = { theme: { extend: { colors: { primary: '#3b82f6' } } } }
    </script>
    <style>.admin-only { display: none; }</style>
</head>
<body class="flex flex-col h-screen overflow-hidden">
    <div id="toastContainer" class="fixed top-5 left-1/2 -translate-x-1/2 z-[1000] flex flex-col gap-2 pointer-events-none text-center"></div>

    <main class="container">
        <header class="header-card">
            <a href="/" class="flex items-center gap-2 text-lg font-bold text-white tracking-tight">
                <span class="text-2xl text-primary font-bold">☁</span><span>O-Drive</span>
            </a>
            <div class="flex items-center gap-4">
                <div class="search-bar hidden md:block">
                    <span class="search-icon">🔍</span>
                    <input type="search" id="searchInput" placeholder="搜索文件..." onkeypress="if(event.key==='Enter')Actions.handleSearch()">
                </div>
                <div id="authButtons"></div>
            </div>
        </header>

        <div class="toolbar-card text-white">
            <div class="tools-left">
                <div id="breadcrumb" class="text-sm font-medium text-primary"></div>
            </div>
            <div class="tools-right">
                <div id="batchTools" class="admin-only">
                    <button class="btn" onclick="Actions.toggleSelectAll()" id="selectAllBtn">全选</button>
                    <button class="btn" onclick="Actions.setClipboard('move')">移动</button>
                    <button class="btn" onclick="Actions.setClipboard('copy')">复制</button>
                    <button class="btn hidden" id="singleRenameBtn" onclick="Actions.startRenameSelected()">重命名</button>
                    <button class="btn btn-danger-soft font-bold" onclick="Actions.batchDelete()">删除</button>
                </div>
                <div id="pasteGroup" class="admin-only hidden">
                    <button id="pasteBtn" class="btn btn-primary font-bold" onclick="Actions.executePaste()">粘贴</button>
                    <button id="cancelPasteBtn" class="btn" onclick="Actions.clearClipboard()">取消</button>
                </div>
                <button class="btn admin-only" onclick="document.getElementById('fileInput').click()">上传</button>
                <button class="btn admin-only" onclick="UI.showModal('mkdirModal')">新建</button>
                <div class="hidden sm:flex items-center gap-2">
                    <button id="sortBtn" class="btn" onclick="Actions.toggleSortMode()">名称</button>
                    <button id="viewBtn" class="btn" onclick="Actions.toggleViewMode()">列表</button>
                </div>
                <input type="file" id="fileInput" hidden multiple onchange="Actions.uploadFiles(this.files)">
            </div>
        </div>

        <div class="explorer-card">
            <div id="fileList" class="custom-scroll relative"></div>
        </div>

        <footer class="footer">
            <div class="footer-info">项目：<a href="https://github.com/Delimo/O-Drive" target="_blank" class="footer-brand">O-Drive</a> | 作者：<a href="https://github.com/Delimo" target="_blank" class="footer-brand">Delimo</a></div>
            <div class="footer-powered">Powered by Cloudflare Pages</div>
            <div class="footer-copyright">© <span id="year-display"></span> O-Drive. All rights reserved.</div>
        </footer>
    </main>

    <div id="loginModal" class="fixed inset-0 bg-black/80 backdrop-blur-sm z-[200] hidden items-center justify-center p-4 text-white">
        <div class="bg-[#1a1a1a] border border-border p-8 rounded-2xl w-full max-w-sm relative shadow-2xl">
            <button onclick="UI.closeModal('loginModal')" class="absolute top-4 right-4 text-xl opacity-40 hover:opacity-100">&times;</button>
            <h1 class="text-xl font-bold mb-6 text-center">登录管理后台</h1>
            <input type="text" id="adminUser" placeholder="用户名" class="w-full bg-background border border-border rounded-lg h-11 px-4 mb-4 focus:outline-none focus:border-primary text-white">
            <input type="password" id="adminPass" placeholder="密码" onkeypress="if(event.key==='Enter')Actions.doLogin()" class="w-full bg-background border border-border rounded-lg h-11 px-4 mb-6 focus:outline-none focus:border-primary text-white">
            <button class="w-full h-11 bg-primary text-white rounded-lg font-bold" onclick="Actions.doLogin()">登录</button>
            <p id="loginError" class="text-red-500 text-center mt-4 text-xs h-4"></p>
        </div>
    </div>

    <div id="mkdirModal" class="fixed inset-0 bg-black/80 backdrop-blur-sm z-[200] hidden items-center justify-center p-4 text-white">
        <div class="bg-surface border border-border p-6 rounded-2xl w-full max-w-sm shadow-2xl">
            <h1 class="text-lg font-bold mb-4 text-center">新建文件夹</h1>
            <input type="text" id="folderNameInput" placeholder="请输入名称" onkeypress="if(event.key==='Enter')Actions.submitMkdir()" class="w-full bg-background border border-border rounded-lg h-11 px-4 mb-4 outline-none focus:border-primary text-sm text-white">
            <div class="flex gap-2">
                <button class="btn flex-1 text-white" onclick="UI.closeModal('mkdirModal')">取消</button>
                <button class="btn btn-primary flex-1 font-bold" onclick="Actions.submitMkdir()">创建</button>
            </div>
        </div>
    </div>

    <div id="previewModal" class="fixed inset-0 hidden items-center justify-center bg-black/80 backdrop-blur-sm z-[500] p-4 text-white" onclick="UI.closePreview()">
        <div class="w-full max-w-6xl h-[85vh] bg-[#0f172a] border border-border rounded-2xl overflow-hidden flex flex-col shadow-2xl" onclick="event.stopPropagation()">
            <div class="flex items-center justify-between p-4 border-b border-border bg-slate-900/50 text-white">
                <h3 id="previewTitle" class="font-bold truncate text-sm">预览</h3>
                <div class="flex items-center gap-3">
                    <button id="editBtn" class="btn hidden text-white" onclick="Actions.toggleEditMode()">编辑</button>
                    <button id="saveBtn" class="btn btn-primary hidden text-white" onclick="Actions.saveTextContent()">保存</button>
                    <button onclick="UI.closePreview()" class="text-2xl leading-none opacity-40 hover:opacity-100">&times;</button>
                </div>
            </div>
            <div id="previewContent" class="flex-1 overflow-auto bg-[#020617]"></div>
        </div>
    </div>

    <div id="uploadManager" class="fixed bottom-6 right-6 w-80 bg-surface border border-border rounded-2xl shadow-2xl z-[300] hidden flex-col overflow-hidden text-white">
        <div class="bg-slate-800 px-4 py-3 flex justify-between items-center text-xs font-bold text-slate-400">
            <span>上传进度</span>
            <button onclick="UI.closeUploadManager()">&times;</button>
        </div>
        <div id="uploadList" class="max-h-80 overflow-y-auto"></div>
    </div>

    <script type="module" src="/js/app.js"></script>
</body>
</html>
