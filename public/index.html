<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>O-Drive</title>
    <link rel="stylesheet" href="/style.css">
    <style>.admin-only { display: none; }</style>
</head>
<body>
    <div class="header">
        <div class="header-left"><a class="logo-box" href="/"><span style="font-size:24px;">☁️</span><span class="logo-text">O-Drive</span></a></div>
        <div class="search-bar">
            <span class="search-icon">🔍</span>
            <input type="search" id="searchInput" placeholder="搜索文件..." onkeypress="if(event.key==='Enter')handleSearch()">
        </div>
        <div class="header-right" id="authButtons"></div>
    </div>

    <div class="container">
        <div class="toolbar">
            <div class="tools-left" id="breadcrumb"></div>
            
            <!-- 动态批量操作栏 -->
            <div id="batchTools" style="display:none; gap:12px; background:rgba(64,158,255,0.1); padding:0 15px; border-radius:8px; height:36px; align-items:center;">
                <button class="btn btn-sm" style="background:none" onclick="selectAll()">全选</button>
                <div style="width:1px; height:14px; background:var(--surface-light)"></div>
                <button class="btn btn-sm" style="background:none" onclick="setClipboard('move')">移动</button>
                <button class="btn btn-sm" style="background:none" onclick="setClipboard('copy')">复制</button>
                <button class="btn btn-sm btn-danger" style="border:none" onclick="batchDelete()">删除</button>
            </div>

            <div class="tools-right">
                <button id="pasteBtn" class="btn" onclick="executePaste()" style="display:none; background:var(--primary)">粘贴</button>
                <button class="btn admin-only" onclick="document.getElementById('fileInput').click()">上传</button>
                <button class="btn admin-only" onclick="showMkdir()">新建文件夹</button>
                <input type="file" id="fileInput" hidden multiple onchange="uploadFiles(this.files)">
                <button id="sortBtn" class="tool-btn" onclick="toggleSortMode()">名称排序</button>
                <button id="viewBtn" class="tool-btn" onclick="toggleViewMode()">网格模式</button>
            </div>
        </div>
        <div id="fileList" class="file-grid"></div>
    </div>

    <!-- 弹窗部分省略，逻辑保持一致 -->
    <div id="loginModal" class="modal-overlay">...</div>

    <script>
        let currentPath = '/', userRole = 'guest', viewMode = localStorage.getItem('viewMode') || 'grid', sortBy = localStorage.getItem('sortBy') || 'name';
        let fileData = { folders: [], files: [] }, selectedPaths = [], clipboard = null;

        async function initAuth() {
            const res = await fetch('/api/auth/role');
            if (res.status === 401) { userRole = 'guest'; updateAuthUI(); return; }
            const data = await res.json(); userRole = data.role || 'guest';
            updateAuthUI(); loadFiles();
        }

        function updateAuthUI() {
            const btnBox = document.getElementById('authButtons');
            if (userRole === 'admin') {
                document.querySelectorAll('.admin-only').forEach(el => el.style.display = 'inline-flex');
                btnBox.innerHTML = `<a href="/admin.html" class="btn">控制面板</a><button class="btn" onclick="logout()">退出</button>`;
            } else {
                btnBox.innerHTML = `<button class="btn btn-primary" onclick="openLoginModal()">登录</button>`;
            }
        }

        async function loadFiles() {
            selectedPaths = []; updateBatchUI();
            const res = await fetch(currentPath === '/' ? '/api/files' : `/api/files${currentPath.replace(/\/$/, '')}`);
            fileData = await res.json();
            updateViewUI(); renderBreadcrumb();
        }

        function renderBreadcrumb() {
            const box = document.getElementById('breadcrumb');
            const parts = currentPath.split('/').filter(p => p);
            let html = `<span class="breadcrumb-item" onclick="navigateTo('/')">🏠 根目录</span>`;
            if (parts.length > 3) {
                html += `<span style="opacity:0.5"> / </span><span>...</span>`;
                parts.slice(-2).forEach((p, i) => {
                    const path = '/' + parts.slice(0, parts.length - 2 + i + 1).join('/') + '/';
                    html += `<span style="opacity:0.5"> / </span><span class="breadcrumb-item" onclick="navigateTo('${path}')">${p}</span>`;
                });
            } else {
                let acc = '';
                parts.forEach(p => { acc += '/' + p; html += `<span style="opacity:0.5"> / </span><span class="breadcrumb-item" onclick="navigateTo('${acc}/')">${p}</span>`; });
            }
            box.innerHTML = html;
        }

        function updateViewUI() {
            const list = document.getElementById('fileList');
            list.className = viewMode === 'grid' ? 'file-grid' : 'file-list-mode';
            list.innerHTML = '';
            
            // 返回上级
            if (currentPath !== '/') {
                const parent = getParentPath(currentPath);
                const div = document.createElement('div'); div.className = 'file-item';
                div.innerHTML = `<div class="file-main"><div class="file-icon">📁</div><div class="file-name">..</div></div><div class="file-info">返回上级</div><div class="file-actions"></div>`;
                div.ondblclick = () => navigateTo(parent);
                list.appendChild(div);
            }

            const folders = [...(fileData.folders || [])].sort((a,b) => a.name.localeCompare(b.name));
            const files = [...(fileData.files || [])].sort((a,b) => sortBy==='time'?(b.time-a.time):sortBy==='size'?(b.rawSize-a.rawSize):a.name.localeCompare(b.name));
            
            [...folders, ...files].forEach(item => {
                const isFolder = !item.sizeFormatted;
                const div = document.createElement('div');
                div.className = 'file-item';
                div.innerHTML = `
                    <div class="file-main">
                        <div class="file-icon">${isFolder ? '📁' : getFileIcon(item.name)}</div>
                        <div class="file-name">${item.name}</div>
                    </div>
                    <div class="file-info">${isFolder ? '文件夹' : item.sizeFormatted}</div>
                    <div class="file-actions" onclick="event.stopPropagation()">
                        ${!isFolder ? `<button class="btn btn-sm" onclick="downloadFile('${item.path}')">下载</button>` : ''}
                    </div>
                `;

                // 单击选中
                div.onclick = (e) => {
                    e.stopPropagation();
                    if (selectedPaths.includes(item.fullKey)) {
                        selectedPaths = selectedPaths.filter(p => p !== item.fullKey);
                        div.classList.remove('selected');
                    } else {
                        selectedPaths.push(item.fullKey);
                        div.classList.add('selected');
                    }
                    updateBatchUI();
                };

                // 双击进入/预览
                div.ondblclick = () => { if(isFolder) navigateTo(item.path); else openPreview(item.path, item.name); };

                // 双击名字重命名
                div.querySelector('.file-name').ondblclick = (e) => {
                    if (userRole !== 'admin') return;
                    e.stopPropagation();
                    const oldName = item.name;
                    const input = document.createElement('input');
                    input.value = oldName; input.className = 'form-input';
                    e.target.replaceWith(input); input.focus();
                    input.onblur = async () => {
                        if (input.value && input.value !== oldName) {
                            await fetch(`/api/files/${item.fullKey}`, { method: 'PUT', body: JSON.stringify({ newName: input.value }) });
                            loadFiles();
                        } else { loadFiles(); }
                    };
                };
                list.appendChild(div);
            });
        }

        function updateBatchUI() {
            const bt = document.getElementById('batchTools');
            bt.style.display = selectedPaths.length > 0 ? 'flex' : 'none';
            const pb = document.getElementById('pasteBtn');
            pb.style.display = clipboard ? 'inline-flex' : 'none';
            if (clipboard) pb.textContent = `粘贴 (${clipboard.paths.length})`;
        }

        function setClipboard(action) {
            clipboard = { action, paths: [...selectedPaths] };
            selectedPaths = [];
            loadFiles();
        }

        async function executePaste() {
            await fetch('/api/paste', { method: 'POST', body: JSON.stringify({ ...clipboard, targetDir: currentPath }) });
            clipboard = null; loadFiles();
        }

        async function batchDelete() {
            if (confirm(`确定删除这 ${selectedPaths.length} 个项目吗？`)) {
                await fetch('/api/batch-delete', { method: 'POST', body: JSON.stringify({ paths: selectedPaths }) });
                loadFiles();
            }
        }

        function selectAll() {
            selectedPaths = [...fileData.folders, ...fileData.files].map(i => i.fullKey);
            document.querySelectorAll('.file-item').forEach(el => { if(!el.innerText.includes('..')) el.classList.add('selected'); });
            updateBatchUI();
        }

        // --- 基础工具函数 ---
        function navigateTo(p) { currentPath = p.endsWith('/') ? p : p + '/'; loadFiles(); }
        function getParentPath(p) { const pts = p.split('/').filter(x=>x); pts.pop(); return '/' + pts.join('/') + (pts.length? '/':''); }
        function getFileIcon(n) { const ext = n.split('.').pop().toLowerCase(); return ['jpg','jpeg','png','webp','gif'].includes(ext)?'🖼️':['mp4','webm'].includes(ext)?'🎬':['mp3','wav'].includes(ext)?'🎵':ext==='pdf'?'📕':['zip','rar','7z'].includes(ext)?'📦':'📄'; }
        function toggleViewMode() { viewMode = viewMode==='grid'?'list':'grid'; localStorage.setItem('viewMode', viewMode); updateViewUI(); }
        function toggleSortMode() { let idx = sortModes.indexOf(sortBy); sortBy = sortModes[(idx + 1) % sortModes.length]; localStorage.setItem('sortBy', sortBy); updateViewUI(); }
        async function logout() { await fetch('/api/logout'); window.location.reload(); }

        initAuth();
    </script>
</body>
</html>
