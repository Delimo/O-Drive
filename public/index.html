<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>O-Drive - 云盘</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <div class="header">
        <div class="logo">O-Drive</div>
        <div style="display: flex; gap: 10px;">
            <a href="/admin.html" class="btn btn-secondary">日志</a>
            <button class="btn btn-secondary" onclick="logout()">退出</button>
        </div>
    </div>

    <div class="container">
        <div id="breadcrumb" style="margin-bottom: 20px; font-size: 14px; background: var(--surface); padding: 10px 15px; border-radius: 8px;"></div>
        
        <div class="toolbar">
            <div class="tools-group">
                <button class="btn btn-primary" onclick="document.getElementById('fileInput').click()">上传文件</button>
                <button class="btn btn-secondary" onclick="showMkdir()">新建文件夹</button>
                <input type="file" id="fileInput" hidden multiple onchange="uploadFiles(this.files)">
            </div>
            <div class="tools-group">
                <select id="sortSelect" class="select-input" onchange="changeSort()">
                    <option value="name">名称排序</option>
                    <option value="time">时间排序</option>
                    <option value="size">大小排序</option>
                </select>
                <button id="viewBtn" class="btn btn-secondary btn-icon" onclick="toggleViewMode()" title="切换显示模式">🖼️</button>
            </div>
        </div>

        <div id="fileList" class="file-grid"></div>
    </div>

    <!-- 模态框保持不变 -->
    <div id="renameModal" class="modal-overlay"><div class="modal"><h3>重命名</h3><input type="text" id="newNameInput" class="form-input"><button class="btn btn-primary" style="width:100%" onclick="submitRename()">确定</button><button class="btn btn-secondary" style="width:100%; margin-top:5px;" onclick="closeModal()">取消</button></div></div>
    <div id="mkdirModal" class="modal-overlay"><div class="modal"><h3>新建文件夹</h3><input type="text" id="folderNameInput" class="form-input"><button class="btn btn-primary" style="width:100%" onclick="submitMkdir()">创建</button><button class="btn btn-secondary" style="width:100%; margin-top:5px;" onclick="closeModal()">取消</button></div></div>
    <div id="previewModal" class="modal-overlay" onclick="closePreview()"><div class="modal" style="max-width:90%; width:800px; height:80vh; display:flex; flex-direction:column;" onclick="event.stopPropagation()"><div style="display:flex; justify-content:space-between; margin-bottom:10px;"><h3 id="previewTitle">预览</h3><button onclick="closePreview()" style="background:none; border:none; color:white; cursor:pointer; font-size:20px;">&times;</button></div><div id="previewContent" style="flex:1; overflow:auto; display:flex; align-items:center; justify-content:center; background:#000; border-radius:8px;"></div></div></div>

    <script>
        let currentPath = '/';
        let renameTarget = '';
        let viewMode = localStorage.getItem('viewMode') || 'grid'; // grid 或 list
        let sortBy = localStorage.getItem('sortBy') || 'name';
        let fileData = { folders: [], files: [] };

        async function loadFiles() {
            const apiPath = currentPath === '/' ? '/api/files' : `/api/files${currentPath.replace(/\/$/, '')}`;
            const res = await fetch(apiPath);
            if (res.status === 401) return window.location.href = '/login.html';
            fileData = await res.json();
            
            updateViewUI();
            renderBreadcrumb();
        }

        function updateViewUI() {
            const list = document.getElementById('fileList');
            const viewBtn = document.getElementById('viewBtn');
            const sortSelect = document.getElementById('sortSelect');

            sortSelect.value = sortBy;
            
            if (viewMode === 'list') {
                list.className = 'file-list-mode';
                viewBtn.textContent = '🏠'; // 图表模式图标
            } else {
                list.className = 'file-grid';
                viewBtn.textContent = '📋'; // 列表模式图标
            }

            // 排序逻辑
            const sortedFolders = [...fileData.folders].sort((a, b) => a.name.localeCompare(b.name));
            const sortedFiles = [...fileData.files].sort((a, b) => {
                if (sortBy === 'time') return b.time - a.time;
                if (sortBy === 'size') return b.rawSize - a.rawSize;
                return a.name.localeCompare(b.name);
            });

            list.innerHTML = '';
            
            // 渲染文件夹
            sortedFolders.forEach(f => {
                list.innerHTML += viewMode === 'grid' ? renderGridItem(f, true) : renderListItem(f, true);
            });

            // 渲染文件
            sortedFiles.forEach(f => {
                list.innerHTML += viewMode === 'grid' ? renderGridItem(f, false) : renderListItem(f, false);
            });
        }

        function renderGridItem(item, isFolder) {
            return `
            <div class="file-item" onclick="${isFolder ? `navigateTo('${item.path}')` : ''}">
                <div class="file-icon">${isFolder ? '📁' : getFileIcon(item.name)}</div>
                <div class="file-name">${item.name}</div>
                <div class="file-meta">${isFolder ? '文件夹' : item.sizeFormatted}</div>
                <div class="file-actions" onclick="event.stopPropagation()">
                    ${!isFolder && isPreviewable(item.name) ? `<button class="btn btn-sm btn-primary" onclick="openPreview('${item.path}', '${item.name}')">预览</button>` : ''}
                    ${!isFolder ? `<button class="btn btn-sm btn-primary" onclick="downloadFile('${item.path}')">下载</button>` : ''}
                    <button class="btn btn-sm btn-secondary" onclick="openRename('${item.path}','${item.name}')">改名</button>
                    <button class="btn btn-sm btn-danger" onclick="deleteItem('${item.path}')">删</button>
                </div>
            </div>`;
        }

        function renderListItem(item, isFolder) {
            return `
            <div class="file-item" onclick="${isFolder ? `navigateTo('${item.path}')` : ''}">
                <div class="file-info">
                    <div class="file-icon">${isFolder ? '📁' : getFileIcon(item.name)}</div>
                    <div class="file-name">${item.name}</div>
                </div>
                <div class="file-meta">${isFolder ? '-' : item.sizeFormatted}</div>
                <div class="file-actions" onclick="event.stopPropagation()">
                    ${!isFolder && isPreviewable(item.name) ? `<button class="btn btn-sm btn-primary" onclick="openPreview('${item.path}', '${item.name}')">预览</button>` : ''}
                    ${!isFolder ? `<button class="btn btn-sm btn-primary" onclick="downloadFile('${item.path}')">下载</button>` : ''}
                    <button class="btn btn-sm btn-secondary" onclick="openRename('${item.path}','${item.name}')">改名</button>
                    <button class="btn btn-sm btn-danger" onclick="deleteItem('${item.path}')">删</button>
                </div>
            </div>`;
        }

        function toggleViewMode() {
            viewMode = viewMode === 'grid' ? 'list' : 'grid';
            localStorage.setItem('viewMode', viewMode);
            updateViewUI();
        }

        function changeSort() {
            sortBy = document.getElementById('sortSelect').value;
            localStorage.setItem('sortBy', sortBy);
            updateViewUI();
        }

        // --- 其余 JS 逻辑 (getFileIcon, navigateTo, Breadcrumb, Preview, Delete, Upload 等) 保持不变 ---
        function getFileIcon(n) { const ext = n.split('.').pop().toLowerCase(); if (['jpg','jpeg','png','webp','gif'].includes(ext)) return '🖼️'; if (['mp4','webm'].includes(ext)) return '🎬'; if (['mp3','wav'].includes(ext)) return '🎵'; if (['pdf'].includes(ext)) return '📕'; return '📄'; }
        function isPreviewable(n) { const ext = n.split('.').pop().toLowerCase(); return ['jpg','jpeg','png','gif','webp','mp4','webm','mp3','wav','txt','pdf'].includes(ext); }
        function navigateTo(p) { currentPath = p + '/'; loadFiles(); }
        function renderBreadcrumb() { let html = `<span style="cursor:pointer; color:var(--primary); font-weight:bold;" onclick="currentPath='/';loadFiles()">🏠 根目录</span>`; let acc = ''; const parts = currentPath.split('/').filter(p => p); parts.forEach((p, index) => { acc += '/' + p; const pathCopy = acc + '/'; html += ` <span style="color:var(--text-muted)">/</span> <span style="cursor:pointer; ${index === parts.length - 1 ? 'color:white' : ''}" onclick="currentPath='${pathCopy}';loadFiles()">${p}</span>`; }); document.getElementById('breadcrumb').innerHTML = html; }
        function openPreview(path, name) { const ext = name.split('.').pop().toLowerCase(); const url = `/api/preview${path}`; const content = document.getElementById('previewContent'); document.getElementById('previewTitle').textContent = name; content.innerHTML = ''; if (['jpg','jpeg','png','gif','webp'].includes(ext)) { content.innerHTML = `<img src="${url}" style="max-width:100%; max-height:100%; object-fit:contain;">`; } else if (['mp4','webm'].includes(ext)) { content.innerHTML = `<video src="${url}" controls autoplay style="max-width:100%; max-height:100%;"></video>`; } else if (['mp3','wav'].includes(ext)) { content.innerHTML = `<audio src="${url}" controls autoplay style="width:80%;"></audio>`; } else if (ext === 'pdf') { content.innerHTML = `<iframe src="${url}" style="width:100%; height:100%; border:none;"></iframe>`; } else if (ext === 'txt') { fetch(url).then(r => r.text()).then(t => { content.innerHTML = `<pre style="color:white; padding:20px; width:100%; white-space:pre-wrap; font-size:14px;">${t}</pre>`; }); } document.getElementById('previewModal').classList.add('active'); }
        function closePreview() { document.getElementById('previewContent').innerHTML = ''; document.getElementById('previewModal').classList.remove('active'); }
        async function uploadFiles(files) { const target = currentPath === '/' ? '/api/files' : `/api/files${currentPath.replace(/\/$/, '')}`; for (let f of files) { const fd = new FormData(); fd.append('file', f); await fetch(target, { method: 'POST', body: fd }); } loadFiles(); }
        function showMkdir() { document.getElementById('mkdirModal').classList.add('active'); }
        async function submitMkdir() { const folderName = document.getElementById('folderNameInput').value; if(!folderName) return; const target = currentPath === '/' ? '/api/mkdir' : `/api/mkdir${currentPath.replace(/\/$/, '')}`; await fetch(target, { method: 'POST', body: JSON.stringify({ folderName }) }); document.getElementById('folderNameInput').value = ''; closeModal(); loadFiles(); }
        async function deleteItem(p) { if(confirm('确定删除?')) { await fetch(`/api/files${p}`, {method:'DELETE'}); loadFiles(); } }
        function downloadFile(p) { window.open(`/api/download${p}`); }
        function openRename(p, n) { renameTarget = p; document.getElementById('newNameInput').value = n; document.getElementById('renameModal').classList.add('active'); }
        async function submitRename() { const newName = document.getElementById('newNameInput').value; await fetch(`/api/files${renameTarget}`, { method:'PUT', body: JSON.stringify({newName}) }); closeModal(); loadFiles(); }
        function closeModal() { document.querySelectorAll('.modal-overlay').forEach(el => el.classList.remove('active')); }
        async function logout() { await fetch('/api/logout'); window.location.href = '/login.html'; }

        loadFiles();
    </script>
</body>
</html>
