<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>O-Drive</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/style.css">
    <link rel="stylesheet" href="/explorer.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script>
        tailwind.config = { theme: { extend: { colors: { primary: '#3b82f6', background: '#020617', surface: '#0f172a', border: '#1e293b' } } } }
    </script>
    <style>.admin-only { display: none; }</style>
</head>
<body class="flex flex-col h-screen overflow-hidden">
    <div id="toastContainer" class="fixed top-5 left-1/2 -translate-x-1/2 z-[1000] flex flex-col gap-2 pointer-events-none text-center"></div>
    <main class="container">
        <!-- Header -->
        <header class="bg-surface border border-border rounded-xl px-5 h-16 flex items-center justify-between flex-shrink-0 shadow-xl">
            <a href="/" class="flex items-center gap-2 text-lg font-bold text-white tracking-tight"><span class="text-2xl text-primary">☁️</span> <span>O-Drive</span></a>
            <div class="flex items-center gap-4">
                <div class="relative group hidden md:block text-slate-300">
                    <span class="absolute left-3 top-1/2 -translate-y-1/2 opacity-40 text-xs">🔍</span>
                    <input type="search" id="searchInput" placeholder="搜索..." onkeypress="if(event.key==='Enter')Actions.handleSearch()" class="bg-background border border-border rounded-lg py-1.5 pl-9 pr-3 text-sm focus:outline-none focus:border-primary w-40 focus:w-60 transition-all text-white">
                </div>
                <div id="authButtons" class="flex gap-2"></div>
            </div>
        </header>

        <!-- Toolbar -->
        <div class="bg-surface border border-border rounded-xl p-3 flex items-center justify-between gap-4 flex-shrink-0 mt-3 overflow-x-auto no-scrollbar shadow-md">
            <div id="breadcrumb" class="flex items-center gap-1 text-sm font-medium text-primary whitespace-nowrap overflow-hidden text-ellipsis"></div>
            <div class="flex items-center gap-2 flex-shrink-0">
                <div id="batchTools" class="items-center">
                    <button class="btn" onclick="Actions.toggleSelectAll()" id="selectAllBtn">全选</button>
                    <button class="btn" id="singleRenameBtn" onclick="Actions.startRenameSelected()">更名</button>
                    <button class="btn" onclick="Actions.setClipboard('copy')">复制</button>
                    <button class="btn" onclick="Actions.setClipboard('move')">移动</button>
                    <button class="btn btn-danger" onclick="Actions.batchDelete()">删除</button>
                </div>
                <div id="pasteGroup" class="hidden items-center gap-2">
                    <button id="pasteBtn" class="btn btn-primary" onclick="Actions.executePaste()">粘贴</button>
                    <button id="cancelPasteBtn" class="btn" onclick="Actions.clearClipboard()">取消</button>
                </div>
                <button class="btn admin-only" onclick="document.getElementById('fileInput').click()">上传</button>
                <button class="btn admin-only" onclick="UI.showModal('mkdirModal')">新建</button>
                <div class="hidden sm:flex items-center gap-2">
                    <button id="sortBtn" class="btn" onclick="Actions.toggleSortMode()">名称</button>
                    <button id="viewBtn" class="btn" onclick="Actions.toggleViewMode()">视图</button>
                </div>
                <input type="file" id="fileInput" hidden multiple onchange="Actions.uploadFiles(this.files)">
            </div>
        </div>

        <!-- Explorer -->
        <div class="explorer-card mt-3">
            <div id="fileList" class="custom-scroll"></div>
        </div>

        <footer class="footer">
            <div class="text-slate-500 text-[11px] opacity-60">© <span id="year-display"></span> O-Drive. All rights reserved.</div>
        </footer>
    </main>

    <!-- Modals (同前，略去重复代码保证长度) -->
    <div id="loginModal" class="fixed inset-0 bg-black/80 backdrop-blur-sm z-[200] hidden items-center justify-center p-4"><div class="bg-[#1a1a1a] border border-border p-8 rounded-2xl w-full max-w-sm relative shadow-2xl"><button onclick="UI.closeModal('loginModal')" class="absolute top-4 right-4 text-xl opacity-40 hover:opacity-100">&times;</button><h1 class="text-xl font-bold mb-6 text-center text-white">登录 O-Drive</h1><input type="text" id="adminUser" placeholder="用户名" class="w-full bg-background border border-border rounded-lg h-11 px-4 mb-4 focus:outline-none focus:border-primary text-white"><input type="password" id="adminPass" placeholder="密码" onkeypress="if(event.key==='Enter')Actions.doLogin()" class="w-full bg-background border border-border rounded-lg h-11 px-4 mb-6 focus:outline-none focus:border-primary text-white"><button class="w-full h-11 bg-primary text-white rounded-lg font-bold" onclick="Actions.doLogin()">确认</button><p id="loginError" class="text-red-500 text-center mt-4 text-xs h-4"></p></div></div>
    <div id="mkdirModal" class="fixed inset-0 bg-black/80 backdrop-blur-sm z-[200] hidden items-center justify-center p-4"><div class="bg-surface border border-border p-6 rounded-2xl w-full max-w-sm shadow-2xl"><h1 class="text-lg font-bold mb-4 text-white">新建文件夹</h1><input type="text" id="folderNameInput" placeholder="名称" onkeypress="if(event.key==='Enter')Actions.submitMkdir()" class="w-full bg-background border border-border rounded-lg h-11 px-4 mb-4 outline-none focus:border-primary text-sm text-white"><div class="flex gap-2"><button class="btn flex-1" onclick="UI.closeModal('mkdirModal')">取消</button><button class="btn btn-primary flex-1" onclick="Actions.submitMkdir()">创建</button></div></div></div>
    <div id="previewModal" class="fixed inset-0 bg-black/90 backdrop-blur-md z-[200] hidden flex-col p-4 md:p-10" onclick="UI.closePreview()"><div class="bg-surface border border-border rounded-2xl w-full h-full max-w-6xl mx-auto flex flex-col shadow-2xl overflow-hidden" onclick="event.stopPropagation()"><div class="flex items-center justify-between p-4 border-b border-border bg-slate-900/50 text-white"><h3 id="previewTitle" class="font-bold truncate text-sm">预览</h3><div class="flex items-center gap-3"><button id="editBtn" class="btn hidden" onclick="Actions.toggleEditMode()">编辑</button><button id="saveBtn" class="btn btn-primary hidden" onclick="Actions.saveTextContent()">保存并关闭</button><button onclick="UI.closePreview()" class="text-2xl leading-none opacity-40 hover:opacity-100">&times;</button></div></div><div id="previewContent" class="flex-1 overflow-auto bg-background relative block text-left"></div></div></div>
    <div id="uploadManager" class="fixed bottom-6 right-6 w-80 bg-surface border border-border rounded-2xl shadow-2xl z-[300] hidden flex-col overflow-hidden text-white"><div class="bg-slate-800 px-4 py-3 flex justify-between items-center text-xs font-bold text-slate-400"><span>上传进度</span><button onclick="UI.closeUploadManager()">&times;</button></div><div id="uploadList" class="max-h-80 overflow-y-auto"></div></div>

    <script>
        // 脚本逻辑保持上一版（修复了冒泡和剪贴板逻辑），仅需确保全覆盖即可。
        // 这里省略脚本正文以保持消息整洁，请使用上一条回复中的 index.html 完整脚本部分。
    </script>
</body>
</html>
