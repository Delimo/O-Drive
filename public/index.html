<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>O-Drive</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/main.css">
    <link rel="stylesheet" href="/style.css">
    <link rel="stylesheet" href="/explorer.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script>
        tailwind.config = { theme: { extend: { colors: { primary: '#3b82f6' } } } }
    </script>
    <style>.admin-only { display: none; }</style>
</head>
<body class="flex flex-col h-screen overflow-hidden">
    <div id="toastContainer" class="fixed top-5 left-1/2 -translate-x-1/2 z-[1000] flex flex-col gap-2 pointer-events-none text-center"></div>
    <main class="container">
        <!-- Header -->
        <header class="header-card">
            <a href="/" class="flex items-center gap-2 text-lg font-bold text-white tracking-tight">
                <span class="text-2xl text-primary font-bold">☁️</span> <span>O-Drive</span>
            </a>
            <div class="flex items-center gap-4">
                <div class="relative group hidden md:block">
                    <span class="absolute left-3 top-1/2 -translate-y-1/2 opacity-40 text-xs text-white">🔍</span>
                    <input type="search" id="searchInput" placeholder="搜索文件..." onkeypress="if(event.key==='Enter')Actions.handleSearch()" class="bg-background border border-border rounded-lg py-1.5 pl-9 pr-3 text-sm focus:outline-none focus:border-primary w-40 focus:w-60 transition-all text-white">
                </div>
                <div id="authButtons"></div>
            </div>
        </header>

        <!-- Toolbar -->
        <div class="toolbar-card">
            <div class="tools-left">
                <div id="breadcrumb" class="text-sm font-medium text-primary"></div>
            </div>
            <div class="tools-right">
                <!-- 批量工具：全选、移动、复制、更名、删除 -->
                <div id="batchTools">
                    <button class="btn" onclick="Actions.toggleSelectAll()" id="selectAllBtn">全选</button>
                    <button class="btn" onclick="Actions.setClipboard('move')">移动</button>
                    <button class="btn" onclick="Actions.setClipboard('copy')">复制</button>
                    <button class="btn hidden" id="singleRenameBtn" onclick="Actions.startRenameSelected()">更名</button>
                    <button class="btn btn-danger" onclick="Actions.batchDelete()">删除</button>
                </div>
                <div id="pasteGroup" class="hidden">
                    <button id="pasteBtn" class="btn btn-primary" onclick="Actions.executePaste()">粘贴</button>
                    <button id="cancelPasteBtn" class="btn" onclick="Actions.clearClipboard()">取消</button>
                </div>
                <button class="btn admin-only" onclick="document.getElementById('fileInput').click()">上传</button>
                <button class="btn admin-only" onclick="UI.showModal('mkdirModal')">新建</button>
                <div class="hidden sm:flex gap-2">
                    <button id="sortBtn" class="btn" onclick="Actions.toggleSortMode()">名称</button>
                    <button id="viewBtn" class="btn" onclick="Actions.toggleViewMode()">视图</button>
                </div>
                <input type="file" id="fileInput" hidden multiple onchange="Actions.uploadFiles(this.files)">
            </div>
        </div>

        <!-- Explorer -->
        <div class="explorer-card">
            <div id="fileList" class="custom-scroll relative"></div>
        </div>

        <!-- 页脚 -->
        <footer class="footer">
            <div class="footer-info">项目：<a href="https://github.com/Delimo/O-Drive" target="_blank" class="footer-brand">O-Drive</a> | 作者：<a href="https://github.com/Delimo" target="_blank" class="footer-brand">Delimo</a></div>
            <div class="footer-powered">Powered by Cloudflare Pages</div>
            <div class="footer-copyright">© <span id="year-display"></span> O-Drive. All rights reserved.</div>
        </footer>
    </main>

    <!-- Modals -->
    <div id="loginModal" class="fixed inset-0 bg-black/80 backdrop-blur-sm z-[200] hidden items-center justify-center p-4 text-white"><div class="bg-[#1a1a1a] border border-border p-8 rounded-2xl w-full max-w-sm relative shadow-2xl"><button onclick="UI.closeModal('loginModal')" class="absolute top-4 right-4 text-xl opacity-40 hover:opacity-100 text-white">&times;</button><h1 class="text-xl font-bold mb-6 text-center text-white">登录 O-Drive</h1><input type="text" id="adminUser" placeholder="用户名" class="w-full bg-background border border-border rounded-lg h-11 px-4 mb-4 focus:outline-none focus:border-primary text-white"><input type="password" id="adminPass" placeholder="密码" onkeypress="if(event.key==='Enter')Actions.doLogin()" class="w-full bg-background border border-border rounded-lg h-11 px-4 mb-6 focus:outline-none focus:border-primary text-white"><button class="w-full h-11 bg-primary text-white rounded-lg font-bold" onclick="Actions.doLogin()">登录</button><p id="loginError" class="text-red-500 text-center mt-4 text-xs h-4"></p></div></div>
    
    <div id="mkdirModal" class="fixed inset-0 bg-black/80 backdrop-blur-sm z-[200] hidden items-center justify-center p-4 text-white"><div class="bg-surface border border-border p-6 rounded-2xl w-full max-w-sm shadow-2xl text-white"><h1 class="text-lg font-bold mb-4 text-center">新建文件夹</h1><input type="text" id="folderNameInput" placeholder="名称" onkeypress="if(event.key==='Enter')Actions.submitMkdir()" class="w-full bg-background border border-border rounded-lg h-11 px-4 mb-4 outline-none focus:border-primary text-sm text-white"><div class="flex gap-2"><button class="btn flex-1 text-white" onclick="UI.closeModal('mkdirModal')">取消</button><button class="btn btn-primary flex-1 font-bold" onclick="Actions.submitMkdir()">创建</button></div></div></div>
    
    <div id="previewModal" class="preview-overlay text-white" onclick="UI.closePreview()"><div class="preview-modal" onclick="event.stopPropagation()"><div class="flex items-center justify-between p-4 border-b border-border bg-slate-900/50 text-white"><h3 id="previewTitle" class="font-bold truncate text-sm">预览</h3><div class="flex items-center gap-3"><button id="editBtn" class="btn hidden text-white" onclick="Actions.toggleEditMode()">编辑</button><button id="saveBtn" class="btn btn-primary hidden text-white" onclick="Actions.saveTextContent()">保存并关闭</button><button onclick="UI.closePreview()" class="text-2xl leading-none opacity-40 hover:opacity-100 text-white">&times;</button></div></div><div id="previewContent" class="preview-body"></div></div></div>
    
    <div id="uploadManager" class="fixed bottom-6 right-6 w-80 bg-surface border border-border rounded-2xl shadow-2xl z-[300] hidden flex-col overflow-hidden text-white"><div class="bg-slate-800 px-4 py-3 flex justify-between items-center text-xs font-bold text-slate-400"><span>上传进度</span><button onclick="UI.closeUploadManager()">&times;</button></div><div id="uploadList" class="max-h-80 overflow-y-auto"></div></div>

    <script>
        let currentPath = '/', userRole = 'guest', isSearching = false, isEditing = false, currentPreviewPath = '';
        let viewMode = localStorage.getItem('viewMode') || 'list', sortBy = localStorage.getItem('sortBy') || 'name', fileData = { folders: [], files: [] }, selectedPaths = [], clipboard = null, activeUploads = 0;
        const sortModes = ['name', 'time', 'size'], sortNames = { name: '名称', time: '时间', size: '大小' };

        const Message = {
            show(msg, type = 'info') {
                const container = document.getElementById('toastContainer'); if(!container) return; const div = document.createElement('div');
                div.className = `toast-anim px-5 py-2.5 rounded-xl text-sm font-bold shadow-2xl flex items-center gap-2 pointer-events-auto ${type === 'success' ? 'bg-emerald-500' : type === 'error' ? 'bg-red-500' : 'bg-primary'} text-white my-1`;
                div.innerHTML = `<span>${type==='success'?'✅':'⚠️'}</span> ${msg}`; container.appendChild(div);
                setTimeout(() => { if(div) { div.style.opacity = '0'; div.style.transition = '0.3s'; setTimeout(() => div.remove(), 300); } }, 3000);
            },
            success(msg) { this.show(msg, 'success'); }, error(msg) { this.show(msg, 'error'); }
        };

        const UI = {
            showModal(id) { const el = document.getElementById(id); if(el) { el.classList.remove('hidden'); el.classList.add('flex'); } },
            closeModal(id) { const el = document.getElementById(id); if(el) { el.classList.remove('flex'); el.classList.add('hidden'); } },
            closePreview() { document.getElementById('previewContent').innerHTML = ''; this.closeModal('previewModal'); },
            closeUploadManager() { document.getElementById('uploadManager').classList.add('hidden'); },
            updateAuth() {
                const box = document.getElementById('authButtons'); if(!box) return;
                if (userRole === 'admin') {
                    document.querySelectorAll('.admin-only').forEach(el => el.style.display = 'inline-flex');
                    box.innerHTML = `<a href="/admin.html" class="btn text-white">管理</a><button onclick="Actions.logout()" class="btn ml-2 text-white">退出</button>`;
                } else {
                    document.querySelectorAll('.admin-only').forEach(el => el.style.display = 'none');
                    box.innerHTML = `<button class="btn btn-primary font-bold" onclick="UI.showModal('loginModal')">登录</button>`;
                }
            },
            renderBreadcrumb() {
                if(isSearching) return; const box = document.getElementById('breadcrumb'); if(!box) return;
                const parts = currentPath.split('/').filter(p => p); let html = `<button class="hover:text-primary transition-colors text-white" onclick="Actions.navigateTo('/')">🏠 根目录</button>`;
                if (parts.length > 2) {
                    html += `<span class="opacity-20 mx-1">/</span><span class="opacity-40">...</span>`;
                    parts.slice(-2).forEach((p, i) => { const path = '/' + parts.slice(0, parts.length - 2 + i + 1).join('/') + '/'; html += `<span class="opacity-20 mx-1">/</span><button class="hover:text-primary text-white truncate max-w-[120px]" onclick="Actions.navigateTo('${path}')">${p}</button>`; });
                } else { let acc = ''; parts.forEach(p => { acc += '/' + p; html += `<span class="opacity-20 mx-1 text-white">/</span><button class="hover:text-primary text-white" onclick="Actions.navigateTo('${acc}/')">${p}</button>`; }); }
                box.innerHTML = html;
            },
            updateFileList() {
                const list = document.getElementById('fileList'); if(!list) return;
                document.getElementById('viewBtn').textContent = viewMode === 'grid' ? '网格' : '列表';
                document.getElementById('sortBtn').textContent = sortNames[sortBy] || '名称';
                list.innerHTML = '';
                if (viewMode === 'list') {
                    const header = document.createElement('div'); header.className = "list-header grid-row-layout hidden md:grid text-white";
                    header.innerHTML = `<div>名称</div><div class="text-center">大小</div><div class="text-center">修改时间</div><div class="text-center">操作</div>`;
                    list.appendChild(header);
                }
                const container = document.createElement('div');
                container.className = viewMode === 'grid' ? "grid-layout" : "list-layout";
                
                if (currentPath !== '/' && !isSearching) {
                    const parent = Utils.getParentPath(currentPath); const div = document.createElement('div');
                    if (viewMode === 'grid') { div.className = "grid-item"; div.innerHTML = `<div class="file-icon opacity-30 text-slate-500">📁</div><div class="file-name text-white">..</div><div class="file-info text-slate-500">返回上级</div><div class="file-actions"></div>`; }
                    else { div.className = "grid-row-layout h-[52px] hover:bg-slate-800/40 border-b border-white/5 cursor-pointer text-slate-500"; div.innerHTML = `<div class="col-name"><span class="opacity-50 text-xl text-white">📁</span><span class="text-sm font-medium text-slate-400">返回上级 (..)</span></div><div></div><div></div><div></div>`; }
                    div.ondblclick = () => Actions.navigateTo(parent); container.appendChild(div);
                }
                
                const folders = [...(fileData.folders || [])].filter(f => f.name && f.name.trim() !== '').sort((a,b) => a.name.localeCompare(b.name));
                const files = [...(fileData.files || [])].filter(f => f.name && f.name.trim() !== '').sort((a,b) => sortBy==='time'?(b.time-a.time):sortBy==='size'?(b.rawSize-a.rawSize):a.name.localeCompare(b.name));
                [...folders, ...files].forEach(item => {
                    const isFolder = !item.sizeFormatted; const el = document.createElement('div'); const isSelected = selectedPaths.includes(item.fullKey);
                    el.dataset.key = item.fullKey;
                    if (viewMode === 'grid') {
                        el.className = `grid-item ${isSelected?'selected':''}`;
                        el.innerHTML = `<div class="file-icon select-none">${isFolder?'📁':Utils.getFileIcon(item.name)}</div><div class="file-name text-white">${item.name}</div><div class="file-info text-slate-500">${isFolder?'文件夹':item.sizeFormatted}</div><div class="file-actions">${!isFolder?`<button class="px-2 py-1 bg-slate-800 rounded text-[10px] hover:bg-primary text-white" onclick="event.stopPropagation();Actions.openPreview('${item.path}','${item.name}')">预览</button><button class="px-2 py-1 bg-slate-800 rounded text-[10px] hover:bg-primary text-white" onclick="event.stopPropagation();Actions.downloadFile('${item.path}')">下载</button>`:''}</div>`;
                    } else {
                        el.className = `grid-row-layout file-item-row ${isSelected?'selected':''}`;
                        el.innerHTML = `<div class="col-name text-white"><span class="text-xl flex-shrink-0 select-none">${isFolder?'📁':Utils.getFileIcon(item.name)}</span><span class="text-sm truncate file-name">${item.name}</span></div><div class="col-size hidden md:block text-slate-400 font-mono">${isFolder?'文件夹':item.sizeFormatted}</div><div class="col-time hidden md:block text-slate-500 font-mono">${Utils.formatDate(item.time)}</div><div class="col-acts text-white">${!isFolder?`<button class="px-3 py-1 bg-slate-800 rounded text-[11px] font-bold hover:bg-primary" onclick="event.stopPropagation();Actions.openPreview('${item.path}','${item.name}')">预览</button>`:''}${!isFolder?`<button class="px-3 py-1 bg-slate-800 rounded text-[11px] font-bold hover:bg-primary" onclick="event.stopPropagation();Actions.downloadFile('${item.path}')">下载</button>`:''}</div>`;
                        if (userRole === 'admin') { const nameEl = el.querySelector('.file-name'); nameEl.ondblclick = (e) => { e.stopPropagation(); Actions.startInlineRename(item, nameEl); }; }
                    }
                    el.onclick = (e) => { if (userRole === 'admin') Actions.toggleSelect(item.fullKey, el, e); };
                    el.ondblclick = () => { if(isFolder) Actions.navigateTo(item.path); else if(Utils.isPreviewable(item.name)) Actions.openPreview(item.path, item.name); };
                    container.appendChild(el);
                });
                list.appendChild(container);
            },
            updateBatchUI() {
                const bt = document.getElementById('batchTools'); const pg = document.getElementById('pasteGroup'); const ren = document.getElementById('singleRenameBtn'); if(!bt || !pg) return;
                const hasSelection = (userRole === 'admin' && selectedPaths.length > 0); bt.style.display = hasSelection ? 'flex' : 'none';
                const hasClipboard = (userRole === 'admin' && clipboard); pg.classList.toggle('hidden', !hasClipboard); pg.classList.toggle('flex', hasClipboard);
                if (ren) ren.classList.toggle('hidden', selectedPaths.length !== 1);
                const pb = document.getElementById('pasteBtn'); if (clipboard && pb) pb.textContent = `${clipboard.action==='move'?'移动':'复制'} (${clipboard.paths.length})`;
            }
        };

        const Actions = {
            async init() { 
                const res = await fetch('/api/auth/role'); userRole = (res.status === 200) ? (await res.json()).role : 'guest';
                UI.updateAuth(); this.loadFiles();
                const startYear = 2026; const currentYear = new Date().getFullYear();
                const yearDisp = document.getElementById('year-display'); if(yearDisp) yearDisp.textContent = currentYear > startYear ? `${startYear} - ${currentYear}` : startYear;
            },
            async loadFiles() { if (isSearching) return; selectedPaths = []; UI.updateBatchUI(); const res = await fetch(currentPath === '/' ? '/api/files' : `/api/files${currentPath.replace(/\/$/, '')}`); if (!res.ok) return; fileData = await res.json(); UI.updateFileList(); UI.renderBreadcrumb(); },
            async doLogin() { const res = await fetch('/api/login', { method:'POST', body: JSON.stringify({username:document.getElementById('adminUser').value, password:document.getElementById('adminPass').value}) }); if((await res.json()).success) window.location.reload(); else document.getElementById('loginError').textContent = '验证失败'; },
            async logout() { await fetch('/api/logout'); window.location.reload(); },
            navigateTo(p) { currentPath = p.endsWith('/') ? p : p + '/'; isSearching = false; this.loadFiles(); },
            toggleSelect(key, el, e) { e.stopPropagation(); if (selectedPaths.includes(key)) selectedPaths = selectedPaths.filter(p => p !== key); else selectedPaths.push(key); UI.updateBatchUI(); UI.updateFileList(); },
            toggleSelectAll() { const allKeys = [...fileData.folders, ...fileData.files].filter(i=>i.name!==''&&i.name!=='.folder').map(i => i.fullKey); selectedPaths = (selectedPaths.length === allKeys.length) ? [] : allKeys; UI.updateFileList(); UI.updateBatchUI(); },
            setClipboard(action) { if (selectedPaths.length === 0) return; clipboard = { action, paths: [...selectedPaths] }; selectedPaths = []; UI.updateBatchUI(); UI.updateFileList(); Message.success(`已加入列表`); },
            clearClipboard() { clipboard = null; UI.updateBatchUI(); this.loadFiles(); Message.show('操作已取消'); },
            async executePaste() { Message.show('处理中...'); const res = await fetch('/api/paste', { method: 'POST', body: JSON.stringify({ ...clipboard, targetDir: currentPath }) }); if(res.ok) { Message.success('成功'); clipboard = null; this.loadFiles(); } else { Message.error('失败'); } },
            async batchDelete() { if (confirm(`确认删除选中的 ${selectedPaths.length} 项吗？`)) { const res = await fetch('/api/batch-delete', { method: 'POST', body: JSON.stringify({ paths: selectedPaths }) }); if(res.ok) { Message.success('已删除'); this.loadFiles(); } } },
            async handleSearch() { const q = document.getElementById('searchInput').value.trim(); if (!q) return this.clearSearch(); isSearching = true; const res = await fetch(`/api/search?q=${encodeURIComponent(q)}&scope=${encodeURIComponent(currentPath)}`); fileData = { folders: [], files: (await res.json()).files || [] }; UI.updateFileList(); document.getElementById('breadcrumb').innerHTML = `<span class="text-white font-bold">🔍 搜索: "${q}"</span>`; },
            clearSearch() { isSearching = false; document.getElementById('searchInput').value = ''; this.loadFiles(); },
            startRenameSelected() {
                const key = selectedPaths[0]; const item = [...fileData.folders, ...fileData.files].find(i => i.fullKey === key);
                const nameEl = Array.from(document.querySelectorAll('.file-name')).find(el => el.closest('[data-key]')?.dataset?.key === key);
                if (item && nameEl) this.startInlineRename(item, nameEl);
            },
            async startInlineRename(item, el) {
                const oldName = item.name; const input = document.createElement('input'); input.className = "rename-input relative z-50 text-white"; input.value = oldName;
                ['mousedown', 'mouseup', 'click', 'dblclick'].forEach(evt => { input.addEventListener(evt, e => e.stopPropagation()); });
                el.replaceWith(input); input.focus();
                const save = async () => { const newName = input.value.trim(); if (newName && newName !== oldName) { const res = await fetch(`/api/files/${encodeURIComponent(item.fullKey)}`, { method: 'PUT', body: JSON.stringify({ newName }) }); if(res.ok) { Message.success('已完成'); this.loadFiles(); } else { this.loadFiles(); } } else { this.loadFiles(); } };
                input.onblur = save; input.onkeypress = (ev) => { if(ev.key==='Enter') input.blur(); };
            },
            async submitMkdir() { const n = document.getElementById('folderNameInput').value.trim(); if(!n) return; await fetch(`/api/mkdir${currentPath.replace(/\/$/,'')}`, { method:'POST', body: JSON.stringify({folderName:n}) }); document.getElementById('folderNameInput').value = ''; UI.closeModal('mkdirModal'); this.loadFiles(); Message.success('已创建'); },
            async openPreview(path, name) {
                currentPreviewPath = path; isEditing = false; const content = document.getElementById('previewContent'), title = document.getElementById('previewTitle'), editBtn = document.getElementById('editBtn'), saveBtn = document.getElementById('saveBtn');
                editBtn.classList.add('hidden'); saveBtn.classList.add('hidden'); title.textContent = "解析中..."; UI.showModal('previewModal');
                try {
                    const res = await fetch(`/api/preview${path}`); const ext = name.split('.').pop().toLowerCase();
                    if (['jpg','jpeg','png','gif','webp'].includes(ext)) {
                        content.innerHTML = `<img src="/api/preview${path}" class="media-content" id="previewImg">`;
                        const img = document.getElementById('previewImg');
                        img.ondblclick = () => { if (!document.fullscreenElement) img.requestFullscreen(); else document.exitFullscreen(); };
                    }
                    else if (['mp4','webm'].includes(ext)) content.innerHTML = `<video src="/api/preview${path}" class="media-content" controls autoplay></video>`;
                    else if (['mp3','wav'].includes(ext)) content.innerHTML = `<div class="flex items-center justify-center h-full p-20 text-white"><audio src="/api/preview${path}" controls autoplay class="w-full max-w-xl"></audio></div>`;
                    else if (ext === 'pdf') content.innerHTML = `<iframe src="/api/preview${path}" class="w-full h-full border-none"></iframe>`;
                    else { const text = await res.text(); if (userRole === 'admin') editBtn.classList.remove('hidden'); if (ext === 'md') content.innerHTML = `<div class="markdown-body p-8 md:p-12 text-left">${marked.parse(text)}</div>`; else content.innerHTML = `<pre id="textContent" class="p-8 md:p-12 font-mono text-sm leading-relaxed whitespace-pre-wrap text-slate-300 text-left">${text}</pre>`; }
                    title.textContent = name;
                } catch (e) { content.innerHTML = `<div class="p-12 text-red-500 text-center">无法预览内容</div>`; }
            },
            toggleEditMode() { 
                const pre = document.getElementById('textContent') || document.querySelector('.markdown-body');
                const textarea = document.createElement('textarea'); textarea.className = "w-full h-full bg-[#020617] text-slate-300 p-8 font-mono text-sm outline-none resize-none"; textarea.id = 'editArea'; textarea.value = pre.innerText || pre.textContent;
                document.getElementById('previewContent').innerHTML = ''; document.getElementById('previewContent').appendChild(textarea);
                document.getElementById('editBtn').classList.add('hidden'); document.getElementById('saveBtn').classList.remove('hidden');
            },
            async saveTextContent() {
                const res = await fetch(`/api/save-text/${currentPreviewPath.replace(/^\//, '')}`, { method: 'POST', body: JSON.stringify({ content: document.getElementById('editArea').value }) });
                if (res.ok) { Message.success('已保存'); UI.closePreview(); this.loadFiles(); }
            },
            toggleViewMode() { viewMode = viewMode==='grid'?'list':'grid'; localStorage.setItem('viewMode', viewMode); UI.updateFileList(); },
            toggleSortMode() { let idx = sortModes.indexOf(sortBy); sortBy = sortModes[(idx + 1) % sortModes.length]; localStorage.setItem('sortBy', sortBy); UI.updateFileList(); },
            downloadFile(p) { window.open(`/api/download${p}`); },
            async uploadFiles(files) {
                if(userRole!=='admin') return; const manager = document.getElementById('uploadManager'); const list = document.getElementById('uploadList');
                manager.classList.replace('hidden', 'flex');
                for (let f of files) {
                    activeUploads++; const item = document.createElement('div');
                    item.className = 'p-4 border-b border-border bg-slate-900/20';
                    item.innerHTML = `<div class="flex justify-between text-[11px] mb-2 truncate text-slate-300"><span class="font-bold text-white">${f.name}</span><span class="pct text-primary font-mono">0%</span></div>
                        <div class="h-1.5 bg-slate-800 rounded-full overflow-hidden"><div class="progress-fill h-full bg-primary w-0 transition-all duration-300"></div></div>`;
                    list.prepend(item);
                    const xhr = new XMLHttpRequest(); xhr.open('POST', '/api/files/' + currentPath.replace(/^\/|\/$/g, ''), true);
                    xhr.upload.onprogress = (e) => { if (e.lengthComputable) { const pct = Math.round((e.loaded / e.total) * 100); item.querySelector('.progress-fill').style.width = pct + '%'; item.querySelector('.pct').textContent = pct + '%'; } };
                    xhr.onload = () => { if (xhr.status === 200) { item.querySelector('.pct').textContent = '完成'; item.querySelector('.progress-fill').className="h-full bg-emerald-500 w-full"; this.loadFiles(); } else { item.querySelector('.pct').textContent = '失败'; } activeUploads--; if(activeUploads===0) setTimeout(()=>manager.classList.replace('flex', 'hidden'), 3000); };
                    const fd = new FormData(); fd.append('file', f); xhr.send(fd);
                }
            }
        };

        const Utils = {
            getParentPath(p) { const pts = p.split('/').filter(x=>x); pts.pop(); return '/' + pts.join('/') + (pts.length? '/':''); },
            formatDate(ts) { return ts ? new Date(ts).toLocaleString('zh-CN', { hour12: false }) : '-'; },
            getFileIcon(n) { const ext = n.split('.').pop().toLowerCase(); const map = { jpg:'🖼️', jpeg:'🖼️', png:'🖼️', webp:'🖼️', gif:'🖼️', mp4:'🎬', webm:'🎬', mp3:'🎵', wav:'🎵', pdf:'📕', zip:'📦', rar:'📦', '7z':'📦' }; return map[ext] || '📄'; },
            isPreviewable(n) { return ['jpg','jpeg','png','gif','webp','mp4','webm','mp3','wav','txt','pdf','md','js','css','html','json','py','sh','sql','php','yml','yaml'].includes(n.split('.').pop().toLowerCase()); }
        };
        Actions.init();
    </script>
