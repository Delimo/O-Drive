<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>O-Drive</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="/main.css">
<link rel="stylesheet" href="/style.css">
<link rel="stylesheet" href="/explorer.css">
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script>
tailwind.config = { theme: { extend: { colors: { primary: '#3b82f6', background: '#020617', surface: '#0f172a', border: '#1e293b' } } } }
</script>
<style>
.admin-only { display: none; }
.toast-anim { transition: transform 0.3s ease, opacity 0.3s ease; }
.rename-input { width: 100%; padding: 4px 6px; border-radius: 4px; border: 1px solid #3b82f6; background-color: #020617; color: #fff; }
</style>
</head>
<body class="flex flex-col h-screen overflow-hidden bg-background text-slate-200">
<div id="toastContainer" class="fixed top-5 left-1/2 -translate-x-1/2 z-[1000] flex flex-col gap-2 pointer-events-none text-center"></div>
<main class="container flex flex-col flex-1">
<header class="header-card flex justify-between items-center">
<a href="/" class="flex items-center gap-2 text-lg font-bold text-white tracking-tight">
<span class="text-2xl text-primary font-bold">☁️</span> <span>O-Drive</span>
</a>
<div class="flex items-center gap-4">
<div class="search-bar hidden md:block relative">
<span class="search-icon absolute left-2 top-1/2 -translate-y-1/2 opacity-40 pointer-events-none">🔍</span>
<input type="search" id="searchInput" placeholder="搜索文件..." class="pl-8 pr-2 bg-background border border-border rounded-lg h-10 text-sm text-white" onkeypress="if(event.key==='Enter')Actions.handleSearch()">
</div>
<div id="authButtons"></div>
</div>
</header>

<div class="toolbar-card flex justify-between items-center gap-2 text-white">
<div class="tools-left flex items-center gap-2"><div id="breadcrumb" class="text-sm font-medium text-primary truncate"></div></div>
<div class="tools-right flex items-center gap-2">
<div id="batchTools" class="admin-only hidden flex gap-1">
<button class="btn" onclick="Actions.toggleSelectAll()">全选</button>
<button class="btn" onclick="Actions.setClipboard('move')">移动</button>
<button class="btn" onclick="Actions.setClipboard('copy')">复制</button>
<button class="btn hidden" id="singleRenameBtn" onclick="Actions.startRenameSelected()">更名</button>
<button class="btn btn-danger" onclick="Actions.batchDelete()">删除</button>
</div>
<div id="pasteGroup" class="admin-only hidden flex gap-1">
<button id="pasteBtn" class="btn btn-primary" onclick="Actions.executePaste()">粘贴</button>
<button class="btn" onclick="Actions.clearClipboard()">取消</button>
</div>
<button class="btn admin-only" onclick="document.getElementById('fileInput').click()">上传</button>
<button class="btn admin-only" onclick="UI.showModal('mkdirModal')">新建</button>
<input type="file" id="fileInput" hidden multiple onchange="Actions.uploadFiles(this.files)">
</div>
</div>

<div class="explorer-card flex-1 overflow-auto custom-scroll" id="fileList"></div>

<footer class="footer text-xs text-slate-400 text-center p-3">
<div>项目：<a href="https://github.com/Delimo/O-Drive" target="_blank" class="text-primary">O-Drive</a> | 作者：<a href="https://github.com/Delimo" target="_blank" class="text-primary">Delimo</a></div>
<div>Powered by Cloudflare Pages</div>
<div>© <span id="year-display"></span> O-Drive. All rights reserved.</div>
</footer>
</main>

<script>
let currentPath='/', userRole='guest', isSearching=false, currentPreviewPath='';
let viewMode=localStorage.getItem('viewMode')||'list', sortBy=localStorage.getItem('sortBy')||'name', fileData={folders:[], files:[]}, selectedPaths=[], clipboard=null;
const sortModes=['name','time','size'], sortNames={name:'名称',time:'时间',size:'大小'};

const Message={
show(msg,type='info'){const container=document.getElementById('toastContainer');if(!container)return;
const div=document.createElement('div'); div.className=`toast-anim px-4 py-2 rounded-xl font-bold shadow-2xl flex items-center gap-2 pointer-events-auto ${type==='success'?'bg-emerald-500':type==='error'?'bg-red-500':'bg-primary'} text-white`; div.innerHTML=`<span>${type==='success'?'✅':'⚠️'}</span> ${msg}`; container.appendChild(div);
setTimeout(()=>{div.style.opacity='0';setTimeout(()=>div.remove(),300);},3000);}, success(msg){this.show(msg,'success');}, error(msg){this.show(msg,'error');}
};

const UI={
showModal(id){const el=document.getElementById(id);if(el){el.classList.remove('hidden');el.classList.add('flex');}},
closeModal(id){const el=document.getElementById(id);if(el){el.classList.remove('flex');el.classList.add('hidden');}},
closePreview(){document.getElementById('previewContent').innerHTML='';this.closeModal('previewModal');},
updateAuth(){const box=document.getElementById('authButtons');if(!box)return;if(userRole==='admin'){document.querySelectorAll('.admin-only').forEach(el=>{el.style.display='inline-flex';if(el.id==='pasteGroup'&&!clipboard)el.style.display='none';});box.innerHTML=`<a href='/admin.html' class='btn text-white font-bold'>管理</a><button onclick='Actions.logout()' class='btn ml-2 text-white opacity-60'>退出</button>`;}else{document.querySelectorAll('.admin-only').forEach(el=>el.style.display='none');box.innerHTML=`<button class='btn btn-primary font-bold' onclick="UI.showModal('loginModal')">登录</button>`;}},
renderBreadcrumb(){if(isSearching)return; const box=document.getElementById('breadcrumb');if(!box)return; const parts=currentPath.split('/').filter(p=>p); let html=`<button class='hover:text-primary' onclick="Actions.navigateTo('/')">🏠 根目录</button>`; let acc=''; parts.forEach(p=>{acc+='/'+p; html+=` / <button class='hover:text-primary truncate max-w-[100px]' onclick="Actions.navigateTo('${acc}/')">${p}</button>`;}); box.innerHTML=html;},
updateFileList(){const list=document.getElementById('fileList');if(!list)return; list.innerHTML=''; const container=document.createElement('div'); container.className=viewMode==='grid'?'grid-layout':'list-layout';
[...fileData.folders,...fileData.files].forEach(item=>{
const isFolder=!item.sizeFormatted; const el=document.createElement('div'); const isSelected=selectedPaths.includes(item.fullKey); el.dataset.key=item.fullKey;
el.className=viewMode==='grid'?`grid-item ${isSelected?'selected':''}`:`grid-row-layout file-item-row ${isSelected?'selected':''}`;
el.innerHTML=viewMode==='grid'?`<div class='file-icon select-none'>${isFolder?'📁':Utils.getFileIcon(item.name)}</div><div class='file-name text-white'>${item.name}</div><div class='text-xs text-slate-500'>${isFolder?'文件夹':item.sizeFormatted}</div>`:`<div class='col-name text-white'><span>${isFolder?'📁':Utils.getFileIcon(item.name)}</span><span class='file-name text-slate-200'>${item.name}</span></div><div class='col-size text-center text-slate-400'>${isFolder?'文件夹':item.sizeFormatted}</div>`;
el.onclick=()=>{if(userRole==='admin')Actions.toggleSelect(item.fullKey,el);}; container.appendChild(el);
}); list.appendChild(container);
},
updateBatchUI(){const bt=document.getElementById('batchTools');const pg=document.getElementById('pasteGroup');const ren=document.getElementById('singleRenameBtn');if(!bt||!pg)return; const hasSelection=(userRole==='admin'&&selectedPaths.length>0); bt.style.display=hasSelection?'flex':'none'; const hasClipboard=(userRole==='admin'&&clipboard); pg.classList.toggle('hidden',!hasClipboard); pg.style.display=hasClipboard?'flex':'none'; if(ren)ren.classList.toggle('hidden',selectedPaths.length!==1); if(clipboard){const pb=document.getElementById('pasteBtn');if(pb)pb.textContent=`粘贴 (${clipboard.paths.length})`;}
}
};

const Actions={
async init(){const res=await fetch('/api/auth/role'); userRole=res.status===200?(await res.json()).role:'guest'; UI.updateAuth(); this.loadFiles(); const yearDisp=document.getElementById('year-display'); const startYear=2026; const currentYear=new Date().getFullYear(); if(yearDisp) yearDisp.textContent=currentYear>startYear?`${startYear} - ${currentYear}`:startYear;},
async loadFiles(){if(isSearching)return; selectedPaths=[]; UI.updateBatchUI(); const res=await fetch(currentPath==='/'?'/api/files':`/api/files${currentPath.replace(//$/,'')}`); if(!res.ok)return; fileData=await res.json(); UI.updateFileList(); UI.renderBreadcrumb();},
async doLogin(){const res=await fetch('/api/login',{method:'POST',body:JSON.stringify({username:document.getElementById('adminUser').value,password:document.getElementById('adminPass').value})}); if((await res.json()).success)window.location.reload(); else document.getElementById('loginError').textContent='验证失败';},
async logout(){await fetch('/api/logout'); window.location.reload();},
navigateTo(p){currentPath=p.endsWith('/')?p:p+'/'; isSearching=false; this.loadFiles();},
toggleSelect(key,el){if(selectedPaths.includes(key)) selectedPaths=selectedPaths.filter(p=>p!==key); else selectedPaths.push(key); UI.updateBatchUI(); UI.updateFileList();},
toggleSelectAll(){const allKeys=[...fileData.folders,...fileData.files].map(i=>i.fullKey); selectedPaths=selectedPaths.length===allKeys.length?[]:allKeys; UI.updateBatchUI(); UI.updateFileList();},
setClipboard(action){if(selectedPaths.length===0)return; clipboard={action,paths:[...selectedPaths]}; selectedPaths=[]; UI.updateBatchUI(); UI.updateFileList(); Message.success(`已加入${action==='move'?'移动':'复制'}列表`);},
clearClipboard(){clipboard=null; UI.updateBatchUI(); this.loadFiles(); Message.show('操作已取消');},
async executePaste(){Message.show('正在处理...'); const res=await fetch('/api/paste',{method:'POST',body:JSON.stringify({...clipboard,targetDir:currentPath})}); if(res.ok){Message.success('成功'); clipboard=null; this.loadFiles();} else{Message.error('失败');}},
async batchDelete(){if(confirm(`确认删除选中的 ${selectedPaths.length} 项吗？`)){const res=await fetch('/api/batch-delete',{method:'POST',body:JSON.stringify({paths:selectedPaths})}); if(res.ok){Message.success('已删除'); this.loadFiles();}}},
async handleSearch(){const q=document.getElementById('searchInput').value.trim(); if(!q)return this.clearSearch(); isSearching=true; const res=await fetch(`/api/search?q=${encodeURIComponent(q)}&scope=${encodeURIComponent(currentPath)}`); fileData={folders:[],files:(await res.json()).files||[]}; UI.updateFileList(); document.getElementById('breadcrumb').innerHTML=`<span class='text-white font-bold'>🔍 搜索结果: "${q}"</span>`;},
clearSearch(){isSearching=false; document.getElementById('searchInput').value=''; this.loadFiles();},
async submitMkdir(){const n=document.getElementById('folderNameInput').value.trim(); if(!n)return; await fetch(`/api/mkdir${currentPath.replace(//$/,'')}`,{method:'POST',body:JSON.stringify({folderName:n})}); document.getElementById('folderNameInput').value=''; UI.closeModal('mkdirModal'); this.loadFiles(); Message.success('已创建');},
async uploadFiles(files){if(userRole!=='admin')return; const manager=document.getElementById('uploadManager'); manager.classList.replace('hidden','flex'); for(let f of files){const fd=new FormData(); fd.append('file',f); const xhr=new XMLHttpRequest(); xhr.open('POST','/api/files/'+currentPath.replace(/^/|/$/g,''),true); xhr.onload=()=>{if(xhr.status===200){Message.success(`${f.name} 上传完成`);} this.loadFiles();}; xhr.send(fd);}},
};

const Utils={getFileIcon(n){const ext=n.split('.').pop().toLowerCase(); const map={jpg:'🖼️',jpeg:'🖼️',png:'🖼️',gif:'🖼️',webp:'🖼️',mp4:'🎬',webm:'🎬',mp3:'🎵',wav:'🎵',pdf:'📕',zip:'📦',rar:'📦','7z':'📦'}; return map[ext]||'📄';}}
Actions.init();
</script>
</body>
</html>
