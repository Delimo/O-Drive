<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>O-Drive</title>
    <link rel="stylesheet" href="/style.css">
    <style>.admin-only { display: none; }</style>
</head>
<body>
    <div class="header">
        <div class="header-left"><a class="logo-box" href="/"><span>☁️</span><span>O-Drive</span></a></div>
        <div class="search-bar"><span class="search-icon">🔍</span><input type="search" id="searchInput" placeholder="搜索文件..." onkeypress="if(event.key==='Enter')handleSearch()"></div>
        <div class="header-right" id="authButtons"></div>
    </div>

    <div class="container">
        <div class="toolbar">
            <div class="tools-left" id="breadcrumb"></div>
            <div class="tools-right">
                <div id="batchTools" style="display:none; gap:8px;">
                    <button class="btn btn-sm" onclick="selectAll()">全选</button>
                    <button class="btn btn-sm" onclick="setClipboard('move')">移动</button>
                    <button class="btn btn-sm" onclick="setClipboard('copy')">复制</button>
                    <button class="btn btn-sm btn-danger" onclick="batchDelete()">删除项目</button>
                </div>
                <button id="pasteBtn" class="btn btn-primary" onclick="executePaste()" style="display:none">粘贴</button>
                <button class="btn admin-only" onclick="document.getElementById('fileInput').click()">上传</button>
                <button class="btn admin-only" onclick="showMkdir()">新建文件夹</button>
                <input type="file" id="fileInput" hidden multiple onchange="uploadFiles(this.files)">
                <div style="width:1px; height:16px; background:var(--surface-light)"></div>
                <button id="sortBtn" class="tool-btn" onclick="toggleSortMode()">名称排序</button>
                <button id="viewBtn" class="tool-btn" onclick="toggleViewMode()">图墙模式</button>
            </div>
        </div>
        <div id="fileList"></div>
    </div>

    <div id="loginModal" class="modal-overlay">
        <div class="login-card">
            <button onclick="closeLoginModal()" style="position:absolute;right:20px;top:20px;background:none;border:none;color:#666;font-size:24px;cursor:pointer;">&times;</button>
            <h1 class="login-title">管理端登录</h1>
            <div class="input-container"><label class="input-name">用户名</label><div class="input-wrapper"><span class="el-icon"><svg viewBox="0 0 1024 1024"><path fill="currentColor" d="M512 512a192 192 0 1 0 0-384 192 192 0 0 0 0 384m0 64a256 256 0 1 1 0-512 256 256 0 0 1 0 512m320 320v-96a96 96 0 0 0-96-96H288a96 96 0 0 0-96 96v96a32 32 0 1 1-64 0v-96a160 160 0 0 1 160-160h448a160 160 0 0 1 160 160v96a32 32 0 1 1-64 0"></path></svg></span><input type="text" id="adminUser" placeholder="请输入用户名"></div></div>
            <div class="input-container"><label class="input-name">密码</label><div class="input-wrapper"><span class="el-icon"><svg viewBox="0 0 1024 1024"><path fill="currentColor" d="M224 448a32 32 0 0 0-32 32v384a32 32 0 0 0 32 32h576a32 32 0 0 0 32-32V480a32 32 0 0 0-32-32zm0-64h576a96 96 0 0 1 96 96v384a96 96 0 0 1-96 96H224a96 96 0 0 1-96-96V480a96 96 0 0 1 96-96"></path><path fill="currentColor" d="M512 544a32 32 0 0 1 32 32v192a32 32 0 1 1-64 0V576a32 32 0 0 1 32-32m192-160v-64a192 192 0 1 0-384 0v64zM512 64a256 256 0 0 1 256 256v128H256V320A256 256 0 0 1 512 64"></path></svg></span><input type="password" id="adminPass" placeholder="请输入密码" onkeypress="if(event.key==='Enter')doLogin()"></div></div>
            <button class="submit-btn" onclick="doLogin()">登录</button>
        </div>
    </div>

    <div id="renameModal" class="modal-overlay"><div class="modal"><h3>重命名</h3><input type="text" id="newNameInput" class="form-input"><button class="btn btn-primary" style="width:100%" onclick="submitRename()">确定</button><button class="btn" style="width:100%;margin-top:8px" onclick="closeModal()">取消</button></div></div>
    <div id="mkdirModal" class="modal-overlay"><div class="modal"><h3>新建文件夹</h3><input type="text" id="folderNameInput" class="form-input" placeholder="名称"><button class="btn btn-primary" style="width:100%" onclick="submitMkdir()">创建</button><button class="btn" style="width:100%;margin-top:8px" onclick="closeModal()">取消</button></div></div>
    <div id="previewModal" class="modal-overlay" onclick="closePreview()"><div class="modal" style="max-width:90%;width:800px;height:80vh;display:flex;flex-direction:column;" onclick="event.stopPropagation()"><div style="display:flex;justify-content:space-between;margin-bottom:12px;"><h3 id="previewTitle">预览</h3><button onclick="closePreview()" style="background:none;border:none;color:#fff;cursor:pointer;font-size:24px;">&times;</button></div><div id="previewContent" style="flex:1;overflow:auto;display:flex;align-items:center;justify-content:center;background:#000;border-radius:8px;"></div></div></div>

    <script>
        let currentPath = '/', userRole = 'guest', viewMode = localStorage.getItem('viewMode') || 'grid', sortBy = localStorage.getItem('sortBy') || 'name';
        let fileData = { folders: [], files: [] }, selectedPaths = [], clipboard = null, isSearching = false;
        const sortModes = ['name', 'time', 'size'], sortNames = { name: '名称排序', time: '时间排序', size: '大小排序' };

        async function initAuth() {
            const res = await fetch('/api/auth/role');
            const data = await res.json(); userRole = data.role || 'guest';
            updateAuthUI(); loadFiles();
        }

        function updateAuthUI() {
            const btnBox = document.getElementById('authButtons');
            if (userRole === 'admin') {
                document.querySelectorAll('.admin-only').forEach(el => el.style.display = 'inline-flex');
                btnBox.innerHTML = `<a href="/admin.html" class="btn">控制面板</a><button class="btn" onclick="logout()">退出</button>`;
            } else {
                btnBox.innerHTML = `<button class="btn btn-primary" onclick="openLoginModal()">登录</button>`;
            }
        }

        function openLoginModal() { document.getElementById('loginModal').classList.add('active'); }
        function closeLoginModal() { document.getElementById('loginModal').classList.remove('active'); }
        async function doLogin() {
            const res = await fetch('/api/login', { method:'POST', body: JSON.stringify({username: document.getElementById('adminUser').value, password: document.getElementById('adminPass').value}) });
            if((await res.json()).success) window.location.reload(); else alert('验证失败');
        }

        async function loadFiles() {
            if (isSearching) return;
            selectedPaths = []; updateBatchUI();
            const res = await fetch(currentPath === '/' ? '/api/files' : `/api/files${currentPath.replace(/\/$/, '')}`);
            fileData = await res.json();
            updateViewUI(); renderBreadcrumb();
        }

        function updateViewUI() {
            const list = document.getElementById('fileList');
            document.getElementById('sortBtn').textContent = sortNames[sortBy];
            document.getElementById('viewBtn').textContent = viewMode === 'grid' ? '图墙模式' : '列表模式';
            list.className = viewMode === 'grid' ? 'file-grid' : 'file-list-mode';
            list.innerHTML = '';
            
            if (!isSearching && currentPath !== '/') {
                const div = document.createElement('div'); div.className = 'file-item';
                div.innerHTML = `<div class="file-main"><div class="file-icon">📁</div><div class="file-name">..</div></div><div class="file-info">返回上级</div><div class="file-actions"></div>`;
                div.ondblclick = () => navigateTo(getParentPath(currentPath));
                list.appendChild(div);
            }

            const folders = [...(fileData.folders || [])].sort((a,b) => a.name.localeCompare(b.name));
            const files = [...(fileData.files || [])].sort((a,b) => sortBy==='time'?(b.time-a.time):sortBy==='size'?(b.rawSize-a.rawSize):a.name.localeCompare(b.name));
            
            [...folders, ...files].forEach(item => {
                const isFolder = !item.sizeFormatted, div = document.createElement('div');
                div.className = 'file-item'; if(selectedPaths.includes(item.fullKey)) div.classList.add('selected');
                div.innerHTML = `<div class="file-main"><div class="file-icon">${isFolder?'📁':getFileIcon(item.name)}</div><div class="file-name">${item.name}</div></div><div class="file-info">${isFolder?'文件夹':item.sizeFormatted}</div><div class="file-actions" onclick="event.stopPropagation()">${!isFolder?`<button class="btn btn-sm" onclick="openPreview('${item.path}','${item.name}')">预览</button><button class="btn btn-sm" onclick="downloadFile('${item.path}')">下载</button>`:''}</div>`;
                div.onclick = () => { if(userRole==='admin'){ if(selectedPaths.includes(item.fullKey)) selectedPaths=selectedPaths.filter(p=>p!==item.fullKey); else selectedPaths.push(item.fullKey); updateViewUI(); updateBatchUI(); } };
                div.ondblclick = () => { if(isFolder) navigateTo(item.path); else openPreview(item.path, item.name); };
                list.appendChild(div);
            });
        }

        function updateBatchUI() {
            document.getElementById('batchTools').style.display = (userRole==='admin' && selectedPaths.length>0)?'flex':'none';
            const pb = document.getElementById('pasteBtn'); pb.style.display = (userRole==='admin' && clipboard)?'inline-flex':'none';
            if(clipboard) pb.textContent = `粘贴 (${clipboard.paths.length})`;
        }

        function renderBreadcrumb() {
            if(isSearching) return;
            const box = document.getElementById('breadcrumb'), parts = currentPath.split('/').filter(p => p);
            let html = `<span class="breadcrumb-item" onclick="navigateTo('/')">🏠 根目录</span>`;
            if (parts.length > 3) {
                html += ` <span style="opacity:0.3">/</span> ...`;
                parts.slice(-2).forEach((p, i) => { html += ` <span style="opacity:0.3">/</span> <span class="breadcrumb-item" onclick="navigateTo('/${parts.slice(0, parts.length-2+i+1).join('/')}/')">${p}</span>`; });
            } else {
                let acc = ''; parts.forEach(p => { acc += '/'+p; html += ` <span style="opacity:0.3">/</span> <span class="breadcrumb-item" onclick="navigateTo('${acc}/')">${p}</span>`; });
            }
            box.innerHTML = html;
        }

        function setClipboard(action) { clipboard = { action, paths: [...selectedPaths] }; selectedPaths = []; updateViewUI(); updateBatchUI(); }
        async function executePaste() { await fetch('/api/paste', { method: 'POST', body: JSON.stringify({ ...clipboard, targetDir: currentPath }) }); clipboard = null; loadFiles(); }
        async function batchDelete() { if (confirm('确定删除?')) { await fetch('/api/batch-delete', { method: 'POST', body: JSON.stringify({ paths: selectedPaths }) }); loadFiles(); } }
        function selectAll() { selectedPaths = [...fileData.folders, ...fileData.files].map(i => i.fullKey); updateViewUI(); updateBatchUI(); }
        async function handleSearch() {
            const q = document.getElementById('searchInput').value.trim(); if (!q) return isSearching=false, loadFiles();
            isSearching = true; const res = await fetch(`/api/search?q=${encodeURIComponent(q)}&scope=${encodeURIComponent(currentPath)}`);
            fileData = { folders: [], files: (await res.json()).files || [] }; updateViewUI();
            document.getElementById('breadcrumb').innerHTML = `🔍 搜索: "${q}"`;
        }
        function navigateTo(p) { currentPath = p.endsWith('/')?p:p+'/'; loadFiles(); }
        function getParentPath(p) { const pts = p.split('/').filter(x=>x); pts.pop(); return '/' + pts.join('/') + (pts.length? '/':''); }
        function getFileIcon(n) { const ext = n.split('.').pop().toLowerCase(); return ['jpg','jpeg','png','webp','gif'].includes(ext)?'🖼️':['mp4','webm'].includes(ext)?'🎬':['mp3','wav'].includes(ext)?'🎵':ext==='pdf'?'📕':['zip','rar','7z'].includes(ext)?'📦':'📄'; }
        function isPreviewable(n) { const ext = n.split('.').pop().toLowerCase(); return ['jpg','jpeg','png','gif','webp','mp4','webm','mp3','wav','txt','pdf'].includes(ext); }
        function toggleViewMode() { viewMode = viewMode==='grid'?'list':'grid'; localStorage.setItem('viewMode', viewMode); updateViewUI(); }
        function toggleSortMode() { let idx = sortModes.indexOf(sortBy); sortBy = sortModes[(idx + 1) % sortModes.length]; localStorage.setItem('sortBy', sortBy); updateViewUI(); }
        function downloadFile(p) { window.open(`/api/download${p}`); }
        function openPreview(path, name) {
            const ext = name.split('.').pop().toLowerCase(), url = `/api/preview${path}`, content = document.getElementById('previewContent');
            document.getElementById('previewTitle').textContent = name; content.innerHTML = '';
            if (['jpg','jpeg','png','gif','webp'].includes(ext)) content.innerHTML = `<img src="${url}" style="max-width:100%;max-height:100%;object-fit:contain;">`;
            else if (['mp4','webm'].includes(ext)) content.innerHTML = `<video src="${url}" controls autoplay style="max-width:100%;max-height:100%;"></video>`;
            else if (['mp3','wav'].includes(ext)) content.innerHTML = `<audio src="${url}" controls autoplay style="width:80%;"></audio>`;
            else if (ext === 'pdf') content.innerHTML = `<iframe src="${url}" style="width:100%;height:100%;border:none;"></iframe>`;
            else if (ext === 'txt') fetch(url).then(r=>r.text()).then(t=> { content.innerHTML = `<pre style="color:#fff;padding:20px;width:100%;white-space:pre-wrap;font-size:13px;">${t}</pre>`; });
            document.getElementById('previewModal').classList.add('active');
        }
        function closePreview() { document.getElementById('previewContent').innerHTML = ''; document.getElementById('previewModal').classList.remove('active'); }
        async function uploadFiles(files) { const target = currentPath==='/'?'/api/files':`/api/files${currentPath.replace(/\/$/,'')}`; for (let f of files) { const fd = new FormData(); fd.append('file', f); await fetch(target, { method: 'POST', body: fd }); } loadFiles(); }
        function showMkdir() { document.getElementById('mkdirModal').classList.add('active'); }
        async function submitMkdir() { const folderName = document.getElementById('folderNameInput').value; if(!folderName) return; await fetch(currentPath==='/'?'/api/mkdir':`/api/mkdir${currentPath.replace(/\/$/,'')}`, { method: 'POST', body: JSON.stringify({ folderName }) }); closeModal(); loadFiles(); }
        function closeModal() { document.querySelectorAll('.modal-overlay').forEach(el => el.classList.remove('active')); }
        async function logout() { await fetch('/api/logout'); window.location.reload(); }
        initAuth();
    </script>
</body>
</html>
