<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>控制面板</title>
    <link rel="stylesheet" href="/style.css">
    <style>
        .tabs { display: flex; gap: 8px; margin-bottom: 24px; border-bottom: 1px solid var(--surface-light); padding-bottom: 12px; }
        .tab-btn { background: none; border: none; color: var(--text-muted); cursor: pointer; padding: 8px 16px; font-weight: 600; border-radius: 6px; }
        .tab-btn.active { color: #fff; background: var(--surface-light); }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .tips { background: rgba(129, 140, 248, 0.1); border-left: 3px solid var(--primary); padding: 16px; margin-bottom: 20px; font-size: 13px; color: var(--text-muted); line-height: 1.6; }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-left"><a class="logo-box" href="/"><span style="font-size:24px;">☁️</span><span class="logo-text">管理后台</span></a></div>
        <a href="/" class="btn">返回云盘</a>
    </div>
    <div class="container">
        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('logs')">操作日志</button>
            <button class="tab-btn" onclick="switchTab('privacy')">隐私管理</button>
        </div>

        <div id="logs-tab" class="tab-content active">
            <div class="card" style="padding:0">
                <table class="log-table">
                    <thead><tr><th class="col-time">时间</th><th class="col-action">动作</th><th>详情</th><th class="col-ip">IP</th></tr></thead>
                    <tbody id="logTbody"></tbody>
                </table>
            </div>
        </div>

        <div id="privacy-tab" class="tab-content">
            <div class="card">
                <div class="tips">
                    <b>配置说明：</b>请输入路径（如 <code>private_folder</code>）。隐藏后访客将完全无法感知该路径及其内部文件的存在。
                </div>
                <div style="display:flex; gap:12px; margin-bottom:24px;">
                    <input type="text" id="hideInput" class="form-input" placeholder="输入路径..." style="margin:0; flex:1">
                    <button class="btn" style="background:var(--primary)" onclick="addHidden()">添加隐藏</button>
                </div>
                <table>
                    <thead><tr><th>路径</th><th>状态</th><th style="width:100px">操作</th></tr></thead>
                    <tbody id="hiddenTbody"></tbody>
                </table>
            </div>
        </div>
    </div>
    <script>
        function switchTab(id) {
            document.querySelectorAll('.tab-btn, .tab-content').forEach(el => el.classList.remove('active'));
            const activeBtn = Array.from(document.querySelectorAll('.tab-btn')).find(btn => btn.innerText.includes(id==='logs'?'操作':'隐私'));
            if(activeBtn) activeBtn.classList.add('active');
            document.getElementById(id + '-tab').classList.add('active');
            id === 'logs' ? loadLogs() : loadHidden();
        }
        async function loadLogs() {
            const res = await fetch('/api/admin/logs'); if(res.status!==200) return window.location.href='/login.html';
            const data = await res.json();
            document.getElementById('logTbody').innerHTML = data.logs.map(l => {
                const time = new Date(l.timestamp).toLocaleString('zh-CN', { timeZone: 'Asia/Shanghai', hour12: false });
                const color = l.action==='DELETE'?'var(--error)':l.action==='UPLOAD'?'var(--success)':'var(--primary)';
                return `<tr><td class="col-time">${time}</td><td class="col-action" style="color:${color}">${l.action}</td><td class="details-cell">${l.details}</td><td class="col-ip">${l.ip}</td></tr>`;
            }).join('');
        }
        async function loadHidden() {
            const data = await (await fetch('/api/admin/settings/hidden')).json();
            document.getElementById('hiddenTbody').innerHTML = data.list.map(i => `<tr><td><code>${i.path}</code></td><td style="color:var(--error)">已隐藏</td><td><button class="btn btn-sm btn-danger" onclick="removeHidden('${i.path}')">取消</button></td></tr>`).join('');
        }
        async function addHidden() {
            const path = document.getElementById('hideInput').value.trim(); if(!path) return;
            await fetch('/api/admin/settings/hidden', { method: 'POST', body: JSON.stringify({ targetPath: path }) });
            document.getElementById('hideInput').value = ''; loadHidden();
        }
        async function removeHidden(p) { if(confirm('确定取消?')) { await fetch(`/api/admin/settings/hidden?path=${encodeURIComponent(p)}`, { method: 'DELETE' }); loadHidden(); } }
        loadLogs();
    </script>
</body>
</html>
