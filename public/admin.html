<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>控制面板 - O-Drive</title>
    <link rel="stylesheet" href="/main.css">
    <link rel="stylesheet" href="/style.css">
    <link rel="stylesheet" href="/explorer.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { theme: { extend: { colors: { primary: '#3b82f6', background: '#020617', surface: '#0f172a', border: '#1e293b' } } } }
    </script>
</head>
<body class="flex flex-col h-screen overflow-hidden bg-background text-slate-200">
    <main class="container">
        <!-- Header -->
        <header class="header-card mt-4">
            <div class="flex items-center gap-3">
                <span class="text-2xl text-primary font-bold">⚙️</span>
                <h1 class="font-bold text-white tracking-tight text-lg">管理控制台</h1>
            </div>
            <a href="/" class="btn">返回云盘</a>
        </header>

        <!-- Tabs -->
        <div class="flex gap-2 p-2 bg-surface border border-border rounded-xl w-fit shadow-md mt-4">
            <button id="btn-logs" onclick="switchTab('logs')" class="px-5 py-2 rounded-lg text-sm font-bold bg-primary text-white shadow-lg">操作日志</button>
            <button id="btn-privacy" onclick="switchTab('privacy')" class="px-5 py-2 rounded-lg text-sm font-bold text-slate-400">隐私管理</button>
        </div>

        <!-- Content -->
        <div class="explorer-card">
            <div id="logs-tab" class="flex-1 flex flex-col overflow-hidden">
                <div id="fileList" class="overflow-y-auto flex-1 custom-scroll">
                    <table class="w-full text-left border-collapse text-white">
                        <thead class="sticky top-0 bg-[#151d2f] text-[10px] uppercase tracking-widest text-slate-500 font-bold border-b border-border z-10">
                            <tr><th class="px-6 py-4 w-44">时间</th><th class="px-6 py-4 w-28">动作</th><th class="px-6 py-4">详情</th><th class="px-6 py-4 w-40">IP</th></tr>
                        </thead>
                        <tbody id="logTbody" class="text-xs divide-y divide-border/30"></tbody>
                    </table>
                </div>
                <!-- Pagination etc. -->
            </div>
        </div>

        <!-- Footer -->
        <footer class="footer">
            <div class="footer-copyright">© <span id="year-display"></span> O-Drive. All rights reserved.</div>
        </footer>
    </main>
</body>
</html>
