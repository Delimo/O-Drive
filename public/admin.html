<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>控制面板 - O-Drive</title>
    <link rel="stylesheet" href="/main.css">
    <link rel="stylesheet" href="/style.css">
    <link rel="stylesheet" href="/explorer.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { theme: { extend: { colors: { primary: '#2563eb' } } } }
    </script>
</head>
<body class="flex flex-col h-screen overflow-hidden bg-background">
    <main class="container">
        <!-- Header -->
        <header class="header-card mt-4 flex items-center">
            <div class="flex items-center gap-3">
                <span class="text-2xl font-bold">⚙️</span>
                <h1 class="font-bold text-slate-800 dark:text-white tracking-tight text-lg">管理控制台</h1>
            </div>
            <a href="/" class="btn">返回云盘</a>
        </header>

        <!-- Tabs -->
        <div class="flex gap-2 p-1 bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-xl w-fit shadow-sm mt-4">
            <button id="btn-logs" onclick="switchTab('logs')" class="px-5 py-2 rounded-lg text-sm font-bold transition-all bg-primary text-white shadow-md">操作日志</button>
            <button id="btn-privacy" onclick="switchTab('privacy')" class="px-5 py-2 rounded-lg text-sm font-bold transition-all text-slate-500 hover:bg-slate-50 dark:hover:bg-slate-800">隐私管理</button>
        </div>

        <!-- Content Card -->
        <div class="explorer-card mt-4 mb-4">
            <!-- 日志 -->
            <div id="logs-tab" class="flex-1 flex flex-col overflow-hidden">
                <div id="fileList" class="overflow-y-auto flex-1 custom-scroll">
                    <table class="w-full text-left border-collapse">
                        <thead class="sticky top-0 bg-slate-50 dark:bg-[#151d2f] text-[10px] uppercase tracking-widest text-slate-500 font-bold border-b border-slate-200 dark:border-slate-800 z-10">
                            <tr><th class="px-6 py-4 w-44">时间</th><th class="px-6 py-4 w-28">动作</th><th class="px-6 py-4">详情</th><th class="px-6 py-4 w-40">IP</th></tr>
                        </thead>
                        <tbody id="logTbody" class="text-xs divide-y divide-slate-100 dark:divide-slate-800/50"></tbody>
                    </table>
                </div>
                <div class="p-4 border-t border-slate-200 dark:border-slate-800 flex items-center justify-between bg-slate-50/50 dark:bg-slate-900/30 text-xs">
                    <div class="text-slate-500 text-slate-400">共 <span id="totalPages" class="font-bold">0</span> 页</div>
                    <div class="flex gap-2">
                        <button onclick="changePage(-1)" class="btn text-xs px-3">上一页</button>
                        <span class="px-3 py-1.5 font-bold text-primary bg-white dark:bg-slate-950 rounded-md border border-slate-200 dark:border-slate-800">第 <span id="currentPage">1</span> 页</span>
                        <button onclick="changePage(1)" class="btn text-xs px-3">下一页</button>
                    </div>
                </div>
            </div>

            <!-- 隐私 -->
            <div id="privacy-tab" class="hidden flex-1 flex flex-col p-6 overflow-hidden">
                <div class="flex flex-col sm:flex-row gap-3 mb-8 bg-slate-50 dark:bg-slate-900/50 p-4 rounded-xl border border-slate-200 dark:border-slate-800">
                    <input type="text" id="hideInput" placeholder="输入屏蔽路径..." class="flex-1 bg-white dark:bg-slate-950 border border-slate-200 dark:border-slate-700 rounded-lg px-4 h-11 text-sm outline-none focus:border-primary">
                    <button class="btn btn-primary h-11 px-8" onclick="addHidden()">添加</button>
                </div>
                <div class="overflow-y-auto flex-1 custom-scroll text-slate-800 dark:text-slate-300 font-medium">
                    <table class="w-full text-left"><thead class="text-[10px] uppercase tracking-widest text-slate-500 font-bold border-b border-slate-200 dark:border-slate-800"><tr><th class="px-4 py-3">屏蔽路径</th><th class="px-4 py-3 text-right">操作</th></tr></thead><tbody id="hiddenTbody" class="text-sm divide-y divide-slate-100 dark:divide-slate-800/50"></tbody></table>
                </div>
            </div>
        </div>

        <footer class="footer">
            <div class="text-slate-400 text-[11px] opacity-60">© <span id="year-display"></span> O-Drive. All rights reserved.</div>
        </footer>
    </main>

    <script>
        // ... (Script 逻辑保持一致即可)
    </script>
</body>
</html>
