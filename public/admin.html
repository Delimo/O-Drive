<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>控制面板 - O-Drive</title>
    <link rel="stylesheet" href="/main.css">
    <link rel="stylesheet" href="/style.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: { extend: { colors: { primary: '#3b82f6', background: '#020617', surface: '#0f172a', border: '#1e293b' } } }
        }
    </script>
</head>
<body class="flex flex-col h-screen overflow-hidden bg-background text-slate-200">
    <main class="flex-1 flex flex-col min-h-0 max-w-7xl mx-auto w-full px-4 py-4 gap-3">
        
        <!-- 1. Header (与主页一致) -->
        <header class="bg-surface border border-border rounded-xl px-5 h-16 flex items-center justify-between flex-shrink-0 shadow-xl">
            <div class="flex items-center gap-3">
                <span class="text-2xl">⚙️</span>
                <h1 class="font-bold text-white tracking-tight text-lg">管理控制台</h1>
            </div>
            <a href="/" class="px-4 py-1.5 bg-slate-800 border border-border rounded-lg text-sm font-bold hover:bg-slate-700 transition-all text-white">返回云盘</a>
        </header>

        <!-- 2. Tab 切换栏 -->
        <div class="bg-surface border border-border rounded-xl p-2 flex items-center gap-2 flex-shrink-0 shadow-md w-fit">
            <button id="btn-logs" onclick="switchTab('logs')" 
                    class="px-5 py-2 rounded-lg text-sm font-bold transition-all bg-primary text-white shadow-lg">操作日志</button>
            <button id="btn-privacy" onclick="switchTab('privacy')" 
                    class="px-5 py-2 rounded-lg text-sm font-bold transition-all text-slate-400 hover:text-white">隐私管理</button>
        </div>

        <!-- 3. 内容卡片框 (与主页文件列表框一致) -->
        <div class="bg-surface border border-border rounded-xl flex-1 flex flex-col min-h-0 overflow-hidden relative shadow-2xl">
            
            <!-- 操作日志表格 -->
            <div id="logs-tab" class="flex-1 flex flex-col overflow-hidden">
                <div class="overflow-y-auto flex-1 custom-scroll">
                    <table class="w-full text-left border-collapse">
                        <thead class="sticky top-0 bg-slate-900 text-[10px] uppercase tracking-widest text-slate-500 font-bold border-b border-border z-10">
                            <tr>
                                <th class="px-6 py-4 w-44">时间</th>
                                <th class="px-6 py-4 w-28">动作</th>
                                <th class="px-6 py-4">详情</th>
                                <th class="px-6 py-4 w-40 text-right">IP 地址</th>
                            </tr>
                        </thead>
                        <tbody id="logTbody" class="text-xs divide-y divide-border/30">
                            <!-- 内容动态加载 -->
                        </tbody>
                    </table>
                </div>
            </div>

            <!-- 隐私管理面板 -->
            <div id="privacy-tab" class="hidden flex-1 flex flex-col p-6 overflow-hidden">
                <div class="flex flex-col sm:flex-row gap-3 mb-8 bg-slate-900/50 p-4 rounded-xl border border-border shadow-inner">
                    <input type="text" id="hideInput" placeholder="输入隐藏路径 (如: docs/private)" 
                           class="flex-1 bg-background border border-border rounded-lg px-4 h-11 text-sm outline-none focus:border-primary text-white transition-all">
                    <button class="px-8 bg-primary text-white rounded-lg font-bold text-sm hover:brightness-110 active:scale-95 transition-all h-11" 
                            onclick="addHidden()">添加路径</button>
                </div>
                
                <div class="overflow-y-auto flex-1 custom-scroll">
                    <table class="w-full text-left">
                        <thead class="text-[10px] uppercase tracking-widest text-slate-500 font-bold border-b border-border">
                            <tr>
                                <th class="px-4 py-3">已屏蔽（访客不可见）的路径</th>
                                <th class="px-4 py-3 text-right">操作</th>
                            </tr>
                        </thead>
                        <tbody id="hiddenTbody" class="text-sm divide-y divide-border/30 text-slate-300">
                            <!-- 内容动态加载 -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- 4. Footer (与主页完全一致) -->
        <footer class="py-4 text-center flex-shrink-0">
            <div class="text-slate-400 text-sm mb-1">
                项目：<a href="https://github.com/Delimo/O-Drive" target="_blank" class="text-slate-100 font-medium hover:text-primary transition-colors">O-Drive</a> 
                | 
                作者：<a href="https://github.com/Delimo" target="_blank" class="text-slate-100 font-medium hover:text-primary transition-colors">Delimo</a>
            </div>
            <div class="text-slate-500 text-[11px] mb-1 font-normal">Powered by Cloudflare Pages</div>
            <div class="text-slate-500 text-[11px] opacity-60">
                &copy; <span id="year-display"></span> O-Drive. All rights reserved.
            </div>
        </footer>
    </main>

    <script>
        // 智能年份
        const startYear = 2026;
        const currentYear = new Date().getFullYear();
        document.getElementById('year-display').textContent = currentYear > startYear ? `${startYear} - ${currentYear}` : startYear;

        function switchTab(id) {
            document.getElementById('logs-tab').classList.toggle('hidden', id !== 'logs');
            document.getElementById('privacy-tab').classList.toggle('hidden', id !== 'privacy');
            const btnLogs = document.getElementById('btn-logs'), btnPriv = document.getElementById('btn-privacy');
            if(id === 'logs') {
                btnLogs.className = "px-5 py-2 rounded-lg text-sm font-bold transition-all bg-primary text-white shadow-lg";
                btnPriv.className = "px-5 py-2 rounded-lg text-sm font-bold transition-all text-slate-400 hover:text-white";
                loadLogs();
            } else {
                btnPriv.className = "px-5 py-2 rounded-lg text-sm font-bold transition-all bg-primary text-white shadow-lg";
                btnLogs.className = "px-5 py-2 rounded-lg text-sm font-bold transition-all text-slate-400 hover:text-white";
                loadHidden();
            }
        }

        async function loadLogs() {
            const res = await fetch('/api/admin/logs'); 
            if(res.status !== 200) return window.location.href='/';
            const data = await res.json();
            document.getElementById('logTbody').innerHTML = data.logs.map(l => {
                const time = new Date(l.timestamp).toLocaleString('zh-CN', { hour12: false });
                const color = l.action==='DELETE'?'text-red-400':l.action==='UPLOAD'?'text-emerald-400':'text-primary';
                return `<tr class="hover:bg-slate-800/30 transition-colors">
                    <td class="px-6 py-4 text-slate-500 font-mono">${time}</td>
                    <td class="px-6 py-4 font-bold ${color}">${l.action}</td>
                    <td class="px-6 py-4 text-slate-300 font-mono break-all">${l.details}</td>
                    <td class="px-6 py-4 text-right text-slate-500 font-mono">${l.ip}</td>
                </tr>`;
            }).join('');
        }

        async function loadHidden() {
            const res = await fetch('/api/admin/settings/hidden');
            const data = await res.json();
            document.getElementById('hiddenTbody').innerHTML = data.list.map(i => `
                <tr class="hover:bg-slate-800/30 transition-colors">
                    <td class="px-4 py-4"><code class="bg-slate-900 px-2 py-1 rounded text-primary text-xs font-mono">${i.path}</code></td>
                    <td class="px-4 py-4 text-right">
                        <button class="px-3 py-1 bg-red-500/10 text-red-500 border border-red-500/20 rounded hover:bg-red-500 hover:text-white text-xs transition-all font-bold" 
                                onclick="removeHidden('${i.path}')">取消屏蔽</button>
                    </td>
                </tr>`).join('');
        }

        async function addHidden() {
            const path = document.getElementById('hideInput').value.trim(); if(!path) return;
            await fetch('/api/admin/settings/hidden', { method: 'POST', body: JSON.stringify({ targetPath: path }) });
            document.getElementById('hideInput').value = ''; loadHidden();
        }

        async function removeHidden(p) {
            if(confirm('确定取消对该路径的隐藏吗?')) {
                await fetch(`/api/admin/settings/hidden?path=${encodeURIComponent(p)}`, { method: 'DELETE' });
                loadHidden();
            }
        }
        loadLogs();
    </script>
</body>
</html>
