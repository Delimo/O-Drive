<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>控制面板 - O-Drive</title>
    <link rel="stylesheet" href="/main.css">
    <link rel="stylesheet" href="/style.css">
    <link rel="stylesheet" href="/explorer.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { theme: { extend: { colors: { primary: '#3b82f6', background: '#020617', surface: '#0f172a', border: '#1e293b' } } } }
    </script>
</head>
<body class="flex flex-col h-screen overflow-hidden bg-background text-slate-200">
    <main class="container">
        <!-- Header -->
        <header class="bg-surface border border-border rounded-xl px-5 h-16 flex items-center justify-between flex-shrink-0 shadow-xl mt-4">
            <div class="flex items-center gap-3">
                <span class="text-2xl text-primary font-bold">⚙️</span>
                <h1 class="font-bold text-white tracking-tight text-lg">管理控制台</h1>
            </div>
            <a href="/" class="btn text-white">返回云盘</a>
        </header>

        <!-- Tabs -->
        <div class="flex gap-2 p-2 bg-surface border border-border rounded-xl w-fit shadow-md mt-4 text-white">
            <button id="btn-logs" onclick="switchTab('logs')" class="px-5 py-2 rounded-lg text-sm font-bold transition-all bg-primary text-white shadow-lg">操作日志</button>
            <button id="btn-privacy" onclick="switchTab('privacy')" class="px-5 py-2 rounded-lg text-sm font-bold transition-all text-slate-400 hover:text-white">隐私管理</button>
        </div>

        <!-- Content Card -->
        <div class="explorer-card mt-4 mb-4">
            <div id="logs-tab" class="flex-1 flex flex-col overflow-hidden">
                <div id="fileList" class="overflow-y-auto flex-1 custom-scroll">
                    <table class="w-full text-left border-collapse text-white">
                        <thead class="sticky top-0 bg-[#151d2f] text-[10px] uppercase tracking-widest text-slate-500 font-bold border-b border-border z-10">
                            <tr><th class="px-6 py-4 w-44 text-slate-400">时间</th><th class="px-6 py-4 w-28 text-slate-400">动作</th><th class="px-6 py-4 text-slate-400">详情</th><th class="px-6 py-4 w-40 text-slate-400">IP</th></tr>
                        </thead>
                        <tbody id="logTbody" class="text-xs divide-y divide-border/30"></tbody>
                    </table>
                </div>
                <div class="p-4 border-t border-border flex items-center justify-between bg-slate-900/30 text-xs">
                    <div class="text-slate-500 text-xs">共 <span id="totalPages" class="text-slate-300 font-bold">0</span> 页</div>
                    <div class="flex gap-2 text-white">
                        <button onclick="changePage(-1)" class="btn">上一页</button>
                        <span class="px-4 py-2 font-bold text-primary font-mono bg-background rounded-lg border border-border">第 <span id="currentPage">1</span> 页</span>
                        <button onclick="changePage(1)" class="btn">下一页</button>
                    </div>
                </div>
            </div>

            <div id="privacy-tab" class="hidden flex-1 flex flex-col p-6 overflow-hidden text-white">
                <div class="flex flex-col sm:flex-row gap-3 mb-8 bg-slate-900/50 p-4 rounded-xl border border-border shadow-inner">
                    <input type="text" id="hideInput" placeholder="输入屏蔽路径..." class="flex-1 bg-background border border-border rounded-lg px-4 h-11 text-sm outline-none focus:border-primary text-white transition-all">
                    <button class="btn btn-primary h-11 px-8 text-white" onclick="addHidden()">添加</button>
                </div>
                <div class="overflow-y-auto flex-1 custom-scroll">
                    <table class="w-full text-left text-white"><thead class="text-[10px] uppercase tracking-widest text-slate-500 font-bold border-b border-border"><tr><th class="px-4 py-3 text-slate-400">已屏蔽路径</th><th class="px-4 py-3 text-right text-slate-400">操作</th></tr></thead><tbody id="hiddenTbody" class="text-sm divide-y divide-border/30 text-slate-300"></tbody></table>
                </div>
            </div>
        </div>

        <footer class="footer">
            <div class="text-slate-500 text-[11px] opacity-60">© <span id="year-display"></span> O-Drive. All rights reserved.</div>
        </footer>
    </main>

    <script>
        let currentPage = 1; let totalPages = 1;
        const startYear = 2026; const currentYear = new Date().getFullYear();
        const yearDisp = document.getElementById('year-display'); if(yearDisp) yearDisp.textContent = currentYear > startYear ? `${startYear} - ${currentYear}` : startYear;

        function switchTab(id) {
            document.getElementById('logs-tab').classList.toggle('hidden', id !== 'logs');
            document.getElementById('privacy-tab').classList.toggle('hidden', id !== 'privacy');
            const btnLogs = document.getElementById('btn-logs'), btnPriv = document.getElementById('btn-privacy');
            if(id === 'logs') { btnLogs.className = "px-5 py-2 rounded-lg text-sm font-bold transition-all bg-primary text-white shadow-lg"; btnPriv.className = "px-5 py-2 rounded-lg text-sm font-bold transition-all text-slate-400 hover:text-white"; loadLogs(); }
            else { btnPriv.className = "px-5 py-2 rounded-lg text-sm font-bold transition-all bg-primary text-white shadow-lg"; btnLogs.className = "px-5 py-2 rounded-lg text-sm font-bold transition-all text-slate-400 hover:text-white"; loadHidden(); }
        }
        async function loadLogs() {
            const res = await fetch(`/api/admin/logs?page=${currentPage}&size=20`); if(res.status !== 200) return window.location.href='/';
            const data = await res.json(); totalPages = data.totalPages;
            document.getElementById('totalPages').textContent = totalPages; document.getElementById('currentPage').textContent = currentPage;
            document.getElementById('logTbody').innerHTML = data.logs.map(l => {
                const time = new Date(l.timestamp).toLocaleString('zh-CN', { hour12: false });
                const color = l.action==='DELETE'?'text-red-400':l.action==='UPLOAD'?'text-emerald-400':'text-primary';
                return `<tr class="hover:bg-slate-800/30 transition-colors"><td class="px-6 py-4 text-slate-500 font-mono">${time}</td><td class="px-6 py-4 font-bold ${color}">${l.action}</td><td class="px-6 py-4 text-slate-300 font-mono break-all">${l.details}</td><td class="px-6 py-4 text-slate-500 font-mono text-sm">${l.ip}</td></tr>`;
            }).join('');
        }
        function changePage(dir) { const next = currentPage + dir; if (next >= 1 && next <= totalPages) { currentPage = next; loadLogs(); } }
        async function loadHidden() { const res = await fetch('/api/admin/settings/hidden'); const data = await res.json(); document.getElementById('hiddenTbody').innerHTML = data.list.map(i => `<tr class="hover:bg-slate-800/30 transition-colors"><td class="px-4 py-4 font-mono text-primary">${i.path}</td><td class="px-4 py-4 text-right"><button class="px-3 py-1 bg-red-500/10 text-red-500 border border-red-500/20 rounded hover:bg-red-500 hover:text-white text-xs transition-all font-bold text-white" onclick="removeHidden('${i.path}')">取消屏蔽</button></td></tr>`).join(''); }
        async function addHidden() { const path = document.getElementById('hideInput').value.trim(); if(!path) return; await fetch('/api/admin/settings/hidden', { method: 'POST', body: JSON.stringify({ targetPath: path }) }); document.getElementById('hideInput').value = ''; loadHidden(); }
        async function removeHidden(p) { if(confirm('取消隐藏该路径？')) { await fetch(`/api/admin/settings/hidden?path=${encodeURIComponent(p)}`, { method: 'DELETE' }); loadHidden(); } }
        loadLogs();
    </script>
</body>
</html>
