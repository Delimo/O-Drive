<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>控制面板 - O-Drive</title>
    <link rel="stylesheet" href="/style.css">
    <style>
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; border-bottom: 1px solid var(--surface-light); padding-bottom: 10px; }
        .tab-btn { background: none; border: none; color: var(--text-muted); cursor: pointer; padding: 8px 16px; font-weight: bold; }
        .tab-btn.active { color: var(--primary); border-bottom: 2px solid var(--primary); }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">O-Drive 控制面板</div>
        <a href="/" class="btn btn-secondary">返回云盘</a>
    </div>
    <div class="container">
        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('logs')">审计日志</button>
            <button class="tab-btn" onclick="switchTab('privacy')">隐私管理</button>
        </div>

        <!-- 日志标签页 -->
        <div id="logs-tab" class="tab-content active">
            <div class="card">
                <table>
                    <thead><tr><th>时间</th><th>动作</th><th>详情</th><th>IP</th></tr></thead>
                    <tbody id="logTbody"></tbody>
                </table>
            </div>
        </div>

        <!-- 隐私管理标签页 -->
        <div id="privacy-tab" class="tab-content">
            <div class="card">
                <div style="margin-bottom: 20px; display: flex; gap: 10px;">
                    <input type="text" id="hidePathInput" class="form-input" placeholder="输入要隐藏的 R2 路径 (如: work/photos)" style="margin:0; flex:1;">
                    <button class="btn btn-primary" onclick="addHiddenPath()">添加隐藏</button>
                </div>
                <p style="font-size: 12px; color: var(--text-muted); margin-bottom: 10px;">* 隐藏后访客不可见。文件夹路径请注意不要带前缀斜杠。</p>
                <table>
                    <thead><tr><th>已隐藏路径</th><th>状态</th><th>操作</th></tr></thead>
                    <tbody id="hiddenTbody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        function switchTab(id) {
            document.querySelectorAll('.tab-btn, .tab-content').forEach(el => el.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById(id + '-tab').classList.add('active');
            if(id === 'logs') loadLogs();
            if(id === 'privacy') loadHiddenList();
        }

        async function loadLogs() {
            const res = await fetch('/api/admin/logs');
            if(res.status !== 200) return window.location.href='/login.html';
            const data = await res.json();
            document.getElementById('logTbody').innerHTML = data.logs.map(l => `
                <tr>
                    <td>${new Date(l.timestamp).toLocaleString()}</td>
                    <td><b style="color:var(--primary)">${l.action}</b></td>
                    <td style="font-size:12px;">${l.details}</td>
                    <td>${l.ip}</td>
                </tr>
            `).join('');
        }

        async function loadHiddenList() {
            const res = await fetch('/api/admin/settings/hidden');
            const data = await res.json();
            document.getElementById('hiddenTbody').innerHTML = data.list.map(item => `
                <tr>
                    <td><code>${item.path}</code></td>
                    <td><span style="color:var(--error)">访客不可见</span></td>
                    <td><button class="btn btn-sm btn-danger" onclick="removeHiddenPath('${item.path}')">取消隐藏</button></td>
                </tr>
            `).join('');
        }

        async function addHiddenPath() {
            const path = document.getElementById('hidePathInput').value.trim();
            if(!path) return;
            await fetch('/api/admin/settings/hidden', {
                method: 'POST',
                body: JSON.stringify({ targetPath: path })
            });
            document.getElementById('hidePathInput').value = '';
            loadHiddenList();
        }

        async function removeHiddenPath(path) {
            await fetch(`/api/admin/settings/hidden?path=${encodeURIComponent(path)}`, { method: 'DELETE' });
            loadHiddenList();
        }

        loadLogs();
    </script>
</body>
</html>
