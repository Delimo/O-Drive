<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>控制面板 - O-Drive</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="stylesheet" href="/main.css">
    <link rel="stylesheet" href="/explorer.css">
    <link rel="stylesheet" href="/admin.css">
</head>
<body class="admin-page flex flex-col bg-background text-slate-900">
    <main class="container">
        <header class="header-card mt-4">
            <div class="flex items-center gap-3">
                <span class="brand-mark brand-mark-header" aria-hidden="true">⚙️</span>
                <h1 class="font-bold text-slate-900 tracking-tight text-lg">管理控制台</h1>
            </div>
            <a href="/" class="btn text-slate-900">返回云盘</a>
        </header>

        <div class="tab-shell flex gap-2 p-2 bg-surface border border-border rounded-xl w-full md:w-fit shadow-sm mt-4">
            <button id="btn-overview" data-admin-action="switch-tab" data-args='["overview"]' class="admin-tab-btn is-active">概览</button>
            <button id="btn-health" data-admin-action="switch-tab" data-args='["health"]' class="admin-tab-btn">环境检查</button>
            <button id="btn-logs" data-admin-action="switch-tab" data-args='["logs"]' class="admin-tab-btn">操作日志</button>
            <button id="btn-privacy" data-admin-action="switch-tab" data-args='["privacy"]' class="admin-tab-btn">隐藏管理</button>
            <button id="btn-protected" data-admin-action="switch-tab" data-args='["protected"]' class="admin-tab-btn">访问密码</button>
            <button id="btn-maintenance" data-admin-action="switch-tab" data-args='["maintenance"]' class="admin-tab-btn">维护工具</button>
        </div>

        <div class="explorer-card mt-4 mb-4">
            <div id="overview-tab" class="overview-tab flex-1 flex flex-col p-6 text-slate-900">
                <div class="overview-stats-grid grid grid-cols-2 xl:grid-cols-4 gap-4 mb-5">
                    <div class="stat-card bg-surface-soft border border-border rounded-xl p-4 min-h-[104px] flex flex-col justify-between">
                        <div class="stat-label text-xs text-slate-500">文件数</div><div id="statFileCount" class="stat-value text-3xl font-bold leading-none">0</div>
                    </div>
                    <div class="stat-card bg-surface-soft border border-border rounded-xl p-4 min-h-[104px] flex flex-col justify-between">
                        <div class="stat-label text-xs text-slate-500">占用空间</div><div id="statTotalSize" class="stat-value text-3xl font-bold leading-none">0 B</div>
                    </div>
                    <div class="stat-card bg-surface-soft border border-border rounded-xl p-4 min-h-[104px] flex flex-col justify-between">
                        <div class="stat-label text-xs text-slate-500">回收站</div><div id="statTrash" class="stat-trash text-3xl font-bold leading-none">0 项</div>
                    </div>
                    <div class="stat-card bg-surface-soft border border-border rounded-xl p-4 min-h-[104px] flex flex-col justify-between">
                        <div class="stat-label text-xs text-slate-500">日志数</div><div id="statLogs" class="stat-value text-3xl font-bold leading-none">0</div>
                    </div>
                </div>
                <div id="storageWarnings" class="storage-warnings hidden mb-5"></div>
                <div class="overview-panels-grid grid grid-cols-1 xl:grid-cols-2 gap-5 flex-1 min-h-0">
                    <section class="bg-surface-soft border border-border rounded-2xl p-5 flex flex-col">
                        <div class="flex items-center justify-between mb-4">
                            <h2 class="font-bold">类型分布</h2>
                            <button id="rebuildIndexBtn" class="btn h-8 px-3 text-xs" data-admin-action="rebuild-index">重建索引</button>
                        </div>
                        <div id="statsBreakdown" class="breakdown-grid grid gap-2"></div>
                    </section>
                    <section class="bg-surface-soft border border-border rounded-2xl p-5 flex flex-col">
                        <div class="flex items-center justify-between mb-4">
                            <h2 class="font-bold">最近新增</h2>
                            <span class="text-xs text-slate-500">仅显示最新 7 项</span>
                        </div>
                        <div id="statsLatest" class="latest-grid grid gap-3"></div>
                    </section>
                </div>
            </div>

            <div id="health-tab" class="hidden health-tab flex-1 flex flex-col p-6 overflow-y-auto text-slate-900">
                <section class="health-panel bg-surface-soft border border-border rounded-2xl p-5">
                    <div class="flex items-center justify-between gap-3 mb-4">
                        <div>
                            <h2 class="font-bold">环境检查</h2>
                            <p class="text-xs text-slate-500 mt-1">检查部署绑定、管理员变量和访客访问状态</p>
                        </div>
                        <button class="btn h-8 px-3" data-admin-action="refresh-health">刷新</button>
                    </div>
                    <div id="healthGrid" class="health-grid"></div>
                </section>
            </div>

            <div id="logs-tab" class="hidden flex-1 flex flex-col overflow-hidden p-6 text-slate-900">
                <div class="admin-section-head">
                    <div>
                        <h2>操作日志</h2>
                        <p>记录管理员上传、删除、维护等关键操作，便于追踪变更来源。</p>
                    </div>
                    <span class="admin-section-pill">审计记录</span>
                </div>
                <div class="admin-table-card overflow-y-auto flex-1 custom-scroll relative">
                    <table class="w-full text-left border-collapse text-slate-900 text-sm">
                        <thead class="sticky top-0 bg-surface-soft text-[10px] uppercase tracking-widest text-slate-500 font-bold border-b border-border z-10">
                            <tr><th class="px-5 py-3 w-44">时间</th><th class="px-5 py-3 w-28">动作</th><th class="px-5 py-3">详情</th><th class="px-5 py-3 w-40 text-left">IP</th></tr>
                        </thead>
                        <tbody id="logTbody" class="text-xs divide-y divide-border/40"></tbody>
                    </table>
                </div>
                <div class="admin-pagination">
                    <div class="text-slate-500 text-xs">共 <span id="totalPages" class="text-slate-600 font-bold">0</span> 页</div>
                    <div class="flex gap-2 text-slate-900">
                        <button data-admin-action="change-page" data-args='[-1]' class="btn">上一页</button>
                        <span class="px-4 py-2 font-bold text-primary font-mono bg-background border border-border rounded-lg">第 <span id="currentPage">1</span> 页</span>
                        <button data-admin-action="change-page" data-args='[1]' class="btn">下一页</button>
                    </div>
                </div>
            </div>

            <div id="privacy-tab" class="hidden flex-1 flex flex-col p-6 overflow-hidden text-slate-900">
                <div class="admin-section-head">
                    <div>
                        <h2>隐藏管理</h2>
                        <p>被屏蔽的路径不会向访客展示，管理员仍可在云盘中查看和管理。</p>
                    </div>
                    <span class="admin-section-pill">访客可见性</span>
                </div>
                <div class="admin-form-panel">
                    <input type="text" id="hideInput" placeholder="输入隐藏路径，如 /private/" class="admin-input">
                    <button class="btn btn-primary h-11 px-8" data-admin-action="add-hidden">添加隐藏</button>
                </div>
                <div class="admin-table-card overflow-y-auto flex-1 custom-scroll text-slate-900 text-sm">
                    <table class="w-full text-left text-slate-900">
                        <thead class="sticky top-0 bg-surface-soft text-[10px] uppercase tracking-widest text-slate-500 font-bold border-b border-border">
                            <tr><th class="px-5 py-3 text-slate-500">已屏蔽路径</th><th class="px-5 py-3 text-right text-slate-500">操作</th></tr>
                        </thead>
                        <tbody id="hiddenTbody" class="text-sm divide-y divide-border/40 text-slate-600"></tbody>
                    </table>
                </div>
            </div>

            <div id="protected-tab" class="hidden flex-1 flex flex-col p-6 overflow-hidden text-slate-900">
                <div class="grid gap-3 mb-8 bg-surface-soft p-4 rounded-xl border border-border shadow-inner admin-protected-form">
                    <input type="text" id="protectedPathInput" placeholder="输入保护路径，如 /客户资料/" class="bg-background border border-border rounded-lg px-4 h-11 text-sm outline-none focus:border-primary text-slate-900 transition-all">
                    <input type="password" id="protectedPasswordInput" placeholder="访问密码，至少 4 位" class="bg-background border border-border rounded-lg px-4 h-11 text-sm outline-none focus:border-primary text-slate-900 transition-all">
                    <input type="text" id="protectedNoteInput" placeholder="备注，可选" class="bg-background border border-border rounded-lg px-4 h-11 text-sm outline-none focus:border-primary text-slate-900 transition-all">
                    <label class="inline-flex items-center gap-2 text-sm text-slate-600"><input id="protectedShowNameInput" type="checkbox" checked> 允许游客看到名称</label>
                    <button class="btn btn-primary h-11 px-8" data-admin-action="add-protected">添加/更新</button>
                </div>
                <div class="overflow-y-auto flex-1 custom-scroll text-slate-900 text-sm">
                    <table class="w-full text-left text-slate-900">
                        <thead class="text-[10px] uppercase tracking-widest text-slate-500 font-bold border-b border-border">
                            <tr><th class="px-4 py-3 text-slate-500">路径</th><th class="px-4 py-3 text-slate-500">显示名称</th><th class="px-4 py-3 text-slate-500">备注</th><th class="px-4 py-3 text-right text-slate-500">操作</th></tr>
                        </thead>
                        <tbody id="protectedTbody" class="text-sm divide-y divide-border/30 text-slate-600"></tbody>
                    </table>
                </div>
            </div>
            <div id="maintenance-tab" class="hidden flex-1 flex flex-col p-6 overflow-y-auto text-slate-900">
                <section class="health-panel bg-surface-soft border border-border rounded-2xl p-5">
                    <div class="flex items-center justify-between gap-3 mb-4">
                        <div>
                            <h2 class="font-bold">维护工具</h2>
                            <p class="text-xs text-slate-500 mt-1">重建索引、清理临时记录和缩略图缓存</p>
                        </div>
                        <button class="btn h-8 px-3" data-admin-action="refresh-maintenance">刷新</button>
                    </div>
                    <div id="maintenanceGrid" class="health-grid mb-5"></div>
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-3">
                        <button class="btn btn-primary h-11" data-admin-action="maintenance-action" data-args='["rebuild-index"]'>重建文件索引</button>
                        <button class="btn h-11" data-admin-action="maintenance-action" data-args='["cleanup-access-attempts"]'>清理访问失败记录</button>
                        <button class="btn btn-danger-soft h-11" data-admin-action="maintenance-action" data-args='["cleanup-thumbnails"]'>清理缩略图缓存</button>
                    </div>
                    <p id="maintenanceResult" class="text-xs text-slate-500 mt-4"></p>
                </section>
            </div>
        </div>

        <footer class="footer">
            <div class="text-slate-500 text-[11px] opacity-60">© <span id="year-display"></span> O-Drive. All rights reserved.</div>
        </footer>
    </main>

    <script type="module" src="/js/admin-app.js"></script>
</body>
</html>
