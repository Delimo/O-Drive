name = "o-drive"
compatibility_date = "2026-06-07"
pages_build_output_dir = "public"

# Configure D1 and R2 bindings in the Cloudflare Pages dashboard:
# Settings -> Functions -> Bindings
#
# Required binding names:
# - D1 database: D1
# - R2 bucket: R2

[vars]
ALLOW_GUEST = "false"
PATH_UNLOCK_MAX_ATTEMPTS = "5"
PATH_UNLOCK_LOCK_MINUTES = "15"
DOWNLOAD_BURST_THRESHOLD = "30"
DOWNLOAD_BURST_WINDOW_SECONDS = "300"
DOWNLOAD_BURST_COOLDOWN_SECONDS = "1800"
DOWNLOAD_BURST_BLOCK_SECONDS = "0"
