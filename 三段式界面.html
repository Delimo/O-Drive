<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>O-Drive - 资源管理器</title>
    <!-- 引入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            /* 使用系统级无衬线字体，保证渲染平滑和跨平台视觉一致 */
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "PingFang SC", "Microsoft YaHei", sans-serif;
            background-color: #f1f5f9;
        }
    </style>
</head>
<!-- 
  【关键控制点 1】：body 
  - h-screen: 强制高度为 100% 视口高度，锁死屏幕。
  - overflow-hidden: 隐藏全局滚动条，确保整个网页作为一个 App 容器，不会整体上下滚动。
  - p-4 md:p-6: 设定安全内边距。移动端 16px (p-4)，桌面端 24px (md:p-6)。
  - flex flex-col items-center: 垂直排列 main 容器并居中。
-->
<body class="h-screen overflow-hidden p-4 md:p-6 text-slate-800 flex flex-col items-center">

    <!-- 
      【关键控制点 2】：main 主容器
      - h-full: 继承 body 减去 padding 后的全部剩余高度。
      - flex flex-col: 垂直排列【页头】、【工具栏】、【资源管理器卡片】。
      - gap-4: 三段之间的固定垂直间距为 16px。
      - min-h-0: 允许子元素（特别是第三段）安全收缩，防止在小屏幕上由于内部内容过多而把 main 撑爆。
    -->
    <main class="container mx-auto max-w-[1440px] w-full h-full flex flex-col gap-4 min-h-0">
        
        <!-- 【第一段】 头部栏 (保持原有高度，设置 flex-shrink-0 绝对不参与高度缩放) -->
        <header class="header-card flex-shrink-0 flex items-center justify-between bg-white border border-slate-200/60 rounded-2xl p-4 shadow-sm">
            <!-- 品牌 Logo -->
            <a href="/" class="brand-link flex items-center gap-3 text-lg font-bold text-slate-900 tracking-tight">
                <svg class="w-8 h-8 text-[#b9c6d2]" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M19.35 10.04C18.67 6.59 15.64 4 12 4 9.11 4 6.6 5.64 5.35 8.04 2.34 8.36 0 10.91 0 14c0 3.31 2.69 6 6 6h13c2.76 0 5-2.24 5-5 0-2.64-2.05-4.78-4.65-4.96z"/>
                </svg>
                <span class="text-xl font-bold text-slate-800">O-Drive</span>
            </a>
            
            <!-- 搜索与操作按钮 -->
            <div class="flex items-center gap-4">
                <div class="search-bar relative">
                    <span class="search-icon absolute inset-y-0 left-3.5 flex items-center text-slate-400">
                        🔍
                    </span>
                    <input type="search" id="searchInput" placeholder="搜索文件..." class="w-72 pl-10 pr-4 py-1.5 text-sm bg-[#fafbfc] border border-slate-200 rounded-lg outline-none focus:bg-white focus:border-slate-300 transition-all">
                </div>
                <div id="authButtons" class="flex gap-2">
                    <button class="btn px-5 py-1.5 text-sm font-semibold border border-slate-200 rounded-lg text-slate-700 hover:bg-slate-50 transition-colors bg-white">管理</button>
                    <button class="btn px-5 py-1.5 text-sm font-semibold border border-slate-200 rounded-lg text-slate-700 hover:bg-slate-50 transition-colors bg-white">退出</button>
                </div>
            </div>
        </header>

        <!-- 【第二段】 工具栏卡片 (保持原有高度，设置 flex-shrink-0 绝对不参与高度缩放) -->
        <div class="toolbar-card flex-shrink-0 flex items-center justify-between bg-white border border-slate-200/60 rounded-2xl p-4 shadow-sm">
            <div class="tools-left">
                <div id="breadcrumb" class="text-sm font-bold text-slate-800 bg-[#fafbfc] border border-slate-200 rounded-lg px-4 py-1.5 shadow-sm cursor-pointer hover:bg-slate-50">根目录</div>
            </div>
            <div class="tools-right flex items-center gap-2">
                <button class="btn px-4 py-1.5 text-sm font-medium text-slate-700 border border-slate-200 rounded-lg hover:bg-slate-50 transition-colors bg-white">上传</button>
                <button class="btn px-4 py-1.5 text-sm font-medium text-slate-700 border border-slate-200 rounded-lg hover:bg-slate-50 transition-colors bg-white">新建</button>
                <button id="sortBtn" class="btn px-4 py-1.5 text-sm font-medium text-slate-700 border border-slate-200 rounded-lg hover:bg-slate-50 transition-colors bg-white">名称</button>
                <button id="viewBtn" class="btn px-4 py-1.5 text-sm font-medium text-slate-700 border border-slate-200 rounded-lg hover:bg-slate-50 transition-colors bg-white">网格</button>
                <button class="btn px-4 py-1.5 text-sm font-medium text-slate-700 border border-slate-200 rounded-lg hover:bg-slate-50 transition-colors bg-white">筛选</button>
                <button class="btn px-4 py-1.5 text-sm font-medium text-slate-700 border border-slate-200 rounded-lg hover:bg-slate-50 transition-colors bg-white">回收站</button>
            </div>
        </div>

        <!-- 
          【第三段的关键控制点】：资源管理器主卡片
          - flex-1: 核心属性。自动吃满第一、二段分配后剩下的所有垂直空间。
          - min-h-0: 极为关键。告诉浏览器，该卡片可以安全地收缩得比其子内容还要矮，防止撑开外层滚动条。
          - overflow-y-auto: 保证当文件数量过多溢出时，仅在卡片内部出现垂直滚动条。
          - flex flex-col: 将其自身也设为 flex 布局，方便内部的空状态提示（Empty State）实现完美居中。
        -->
        <div class="explorer-card flex-1 min-h-0 bg-white border border-slate-200/60 rounded-2xl p-6 shadow-sm overflow-y-auto flex flex-col" id="explorerCard">
            
            <!-- 
              这里演示的是【空状态 (Empty State)】容器：
              - flex-1 flex flex-col items-center justify-center: 占满卡片内部，并让内容水平、垂直绝对居中。
              - 如果后续有了文件列表，可以直接用脚本将该 <div> 隐藏，并渲染底部的 #fileList 容器。
            -->
            <div id="emptyState" class="flex-1 flex flex-col items-center justify-center text-slate-400">
                <!-- 文件夹虚线/扁平化图标 -->
                <svg class="w-16 h-16 text-slate-300 mb-4" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M2.25 12.75V12A2.25 2.25 0 014.5 9.75h15A2.25 2.25 0 0121.75 12v.75m-19.5 0A2.25 2.25 0 003 15.75h18a2.25 2.25 0 001.5-3M3.75 6H7.5m3 12h9.75m-9.75 0a1.5 1.5 0 01-3 0m3 0a1.5 1.5 0 00-3 0m-3.75 0H3.75m9.75-12h9.75"></path>
                </svg>
                <p class="text-sm font-semibold text-slate-500">此文件夹为空</p>
                <p class="text-xs text-slate-400 mt-1">点击上方的“上传”按钮或拖拽文件到此处</p>
            </div>

            <!-- 
              文件网格列表容器（默认空文件夹状态下不显示文件卡片）：
              - grid-cols-2 md:grid-cols-4 lg:grid-cols-6: 根据屏幕宽度自适应调整列数，手机端2列，普通电脑4-6列。
              - gap-5: 网格内部卡片之间的间隙。
              - hidden: 临时隐藏，当您需要渲染文件时，移除 hidden 样式，并将 emptyState 容器隐藏即可。
            -->
            <div id="fileList" class="hidden grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-6 gap-5">
                <!-- 动态卡片内容占位 -->
            </div>
        </div>

    </main>

</body>
</html>
